<style>
* { box-sizing:border-box; max-width:100%; min-width:0; }
p,span,div,h1,h2,h3,h4,h5,h6,a,li,label,button { overflow-wrap:break-word; word-wrap:break-word; }

.hero-banner {
  background:linear-gradient(135deg,rgba(91,94,244,.15),rgba(16,185,129,.08));
  border:1.5px solid rgba(91,94,244,.2); border-radius:var(--r-xl);

}
.hb-title { font-family:var(--fd); font-weight:900; font-size:1.2rem; color:var(--ink); margin-bottom:6px; }
.hb-sub   { font-size:.8rem; color:var(--ink-2); line-height:1.6; font-family:var(--fb); }
.hb-stat  { display:inline-block; margin-top:12px; background:var(--surface); border:1px solid var(--border); border-radius:100px; padding:5px 16px; font-family:var(--fd); font-weight:800; font-size:.82rem; color:var(--brand); }

.filter-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.ftag {
  padding:6px 14px; border-radius:100px; border:1.5px solid var(--border);

  font-weight:700; color:var(--ink-2); cursor:pointer; white-space:nowrap;
  transition:all .15s ease;
}
.ftag.on { background:var(--brand); border-color:var(--brand); color:#fff; }

.search-wrap { position:relative; margin-bottom:16px; }
.search-wrap .material-symbols-rounded {
  position:absolute; left:12px; top:50%; transform:translateY(-50%);
  color:var(--ink-3); font-size:1.1rem; pointer-events:none;
}
.search-wrap input { padding-left:38px; }

.schol-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:16px; margin-bottom:12px;
  transition:all .18s ease; cursor:pointer; position:relative; overflow:hidden;
}
.schol-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:5px; border-radius:5px 0 0 5px;
}
.schol-card:hover { border-color:rgba(91,94,244,.3); box-shadow:var(--sh-sm); transform:translateY(-1px); }

.sc-top { display:flex; align-items:flex-start; gap:12px; margin-bottom:10px; }
.sc-logo {
  width:46px; height:46px; border-radius:12px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:1.5rem;
  background:var(--surface-2); border:1px solid var(--border);
}
.sc-info { flex:1; min-width:0; }
.sc-name  { font-family:var(--fd); font-weight:800; font-size:.88rem; color:var(--ink); margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.sc-org   { font-size:.72rem; color:var(--ink-3); font-family:var(--fb); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sc-amount { font-family:var(--fd); font-weight:900; font-size:.95rem; color:var(--emerald); flex-shrink:0; text-align:right; }

.sc-desc { font-size:.78rem; color:var(--ink-2); line-height:1.6; margin-bottom:10px; font-family:var(--fb); display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }

.sc-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.sc-tag  { padding:3px 10px; border-radius:6px; font-size:.65rem; font-weight:700; font-family:var(--fb); }
.sc-tag.type-local     { background:rgba(91,94,244,.1); color:var(--brand); }
.sc-tag.type-intl      { background:rgba(16,185,129,.1); color:var(--emerald); }
.sc-tag.type-govt      { background:rgba(245,158,11,.1); color:var(--amber); }
.sc-tag.type-private   { background:rgba(139,92,246,.1); color:#8b5cf6; }
.sc-tag.level-undergrad { background:rgba(6,182,212,.1); color:#06b6d4; }
.sc-tag.level-postgrad  { background:rgba(244,63,94,.1); color:var(--rose); }
.sc-tag.level-secondary { background:rgba(16,185,129,.1); color:var(--emerald); }

.sc-footer { display:flex; align-items:center; justify-content:space-between; }
.sc-deadline { display:flex; align-items:center; gap:5px; font-size:.72rem; font-family:var(--fb); font-weight:700; }
.sc-deadline .mat { font-size:.9rem; }
.deadline-urgent { color:var(--rose); }
.deadline-soon   { color:var(--amber); }
.deadline-ok     { color:var(--emerald); }
.deadline-closed { color:var(--ink-3); }

.sc-apply { padding:7px 16px; border-radius:8px; font-size:.74rem; font-weight:800; font-family:var(--fd); cursor:pointer; border:none; transition:all .15s ease; white-space:nowrap; text-decoration:none; display:inline-flex; align-items:center; gap:5px; }
.sc-apply.open   { background:var(--brand); color:#fff; }
.sc-apply.closed { background:var(--surface-2); color:var(--ink-3); cursor:default; }
.sc-apply:hover:not(.closed) { opacity:.85; }

.saved-dot {
  position:absolute; top:12px; right:12px;
  width:8px; height:8px; border-radius:50%; background:var(--emerald);
  display:none;
}
.schol-card.saved .saved-dot { display:block; }

.save-btn { background:none; border:1px solid var(--border); border-radius:8px; padding:6px 10px; cursor:pointer; color:var(--ink-3); font-size:.9rem; transition:all .15s ease; }
.save-btn:hover { border-color:var(--amber); color:var(--amber); }
.save-btn.saved { border-color:var(--amber); color:var(--amber); background:var(--amber-p); }

.empty-state-scholarships { text-align:center; padding:48px 20px; }

// ── Load (built-in + Firestore if available) ───────────────────────────────
async function loadScholarships() {
  allScholarships = [...BUILT_IN];
  try {
    const snap = await getDocs(query(collection(db,'scholarships'), orderBy('deadline','asc')));
    snap.docs.forEach(d => {
      const data = { id:d.id, ...d.data() };
      if (!allScholarships.find(s=>s.id===data.id)) allScholarships.push(data);
    });
  } catch (_) { /* Firestore optional — built-ins always show */ }

  const openCount = allScholarships.filter(s=>s.open!==false).length;
  const badge = document.getElementById('countBadge');
  if (badge) badge.textContent = `${allScholarships.length} scholarships · ${openCount} open now`;

  renderList();
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('scholarshipList');
  let list = [...allScholarships];

  // Saved-only filter
  if (showSavedOnly) list = list.filter(s=>savedIds.has(s.id));

  // Category filter
  if (activeFilter !== 'all') {
    list = list.filter(s =>
      s.type === activeFilter || s.level === activeFilter
    );
  }

  // Search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(s =>
      (s.name||'').toLowerCase().includes(q) ||
      (s.org||'').toLowerCase().includes(q) ||
      (s.desc||'').toLowerCase().includes(q)
    );
  }

  // Sort: open first, then by deadline
  list.sort((a,b) => {
    if ((a.open!==false) !== (b.open!==false)) return (a.open!==false)?-1:1;
    return new Date(a.deadline) - new Date(b.deadline);
  });

  if (!list.length) {
    el.innerHTML = `
      <div class="empty-state-scholarships">
        <div style="font-size:2.5rem;margin-bottom:12px;">🔍</div>
        <div style="font-family:var(--fd);font-weight:800;font-size:.95rem;color:var(--ink);margin-bottom:8px;">No matches found</div>
        <div style="font-size:.78rem;color:var(--ink-3);">Try a different filter or search term</div>
      </div>`;
    return;
  }

  el.innerHTML = list.map(s => {
    const saved      = savedIds.has(s.id);
    const deadlineInfo = getDeadlineInfo(s.deadline, s.open);
    const isOpen     = s.open !== false && deadlineInfo.daysLeft >= 0;
    const color      = s.color || 'var(--brand)';
    return `
      <div class="schol-card ${saved?'saved':''}" id="card-${s.id}" style="border-left:5px solid ${color};">
        <div class="saved-dot"></div>
        <div class="sc-top">
          <div class="sc-logo" style="background:${color}18;">${s.icon||'🎓'}</div>
          <div class="sc-info">
            <div class="sc-name">${esc(s.name)}</div>
            <div class="sc-org">${esc(s.org)}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">
            <div class="sc-amount">${esc(s.amount||'Varies')}</div>
            <button class="save-btn ${saved?'saved':''}" onclick="toggleSave('${s.id}')" title="${saved?'Unsave':'Save'}">
              ${saved?'🔖':'🔖'}
            </button>
          </div>
        </div>
        <div class="sc-desc">${esc(s.desc||'')}</div>
        <div class="sc-tags">
          ${s.type  ? `<span class="sc-tag type-${s.type}">${typeName(s.type)}</span>` : ''}
          ${s.level ? `<span class="sc-tag level-${s.level}">${levelName(s.level)}</span>` : ''}
        </div>
        <div class="sc-footer">
          <div class="sc-deadline ${deadlineInfo.cls}">
            <span class="material-symbols-rounded mat">schedule</span>
            ${deadlineInfo.label}
          </div>
          ${isOpen
            ? `<a href="${esc(s.link||'#')}" target="_blank" rel="noopener" class="sc-apply open">
                Apply <span class="material-symbols-rounded" style="font-size:.9rem;">open_in_new</span>
               </a>`
            : `<span class="sc-apply closed">Closed</span>`}
        </div>
      </div>`;
  }).join('');
}

// ── Helpers ────────────────────────────────────────────────────────────────
function getDeadlineInfo(dateStr, isOpen) {
  if (!dateStr) return { label:'No deadline', cls:'deadline-ok', daysLeft:999 };
  if (isOpen === false) return { label:'Applications closed', cls:'deadline-closed', daysLeft:-1 };
  const now   = new Date(); now.setHours(0,0,0,0);
  const d     = new Date(dateStr);
  const days  = Math.ceil((d-now)/86400000);
  if (days < 0)  return { label:'Closed', cls:'deadline-closed', daysLeft:days };
  if (days === 0) return { label:'Closes TODAY!', cls:'deadline-urgent', daysLeft:0 };
  if (days <= 7)  return { label:`${days} days left`, cls:'deadline-urgent', daysLeft:days };
  if (days <= 30) return { label:`${days} days left`, cls:'deadline-soon', daysLeft:days };
  return { label:`Closes ${d.toLocaleDateString('en-NG',{day:'numeric',month:'short',year:'numeric'})}`, cls:'deadline-ok', daysLeft:days };
}
function typeName(t) { return {local:'🇳🇬 Local',intl:'🌍 International',govt:'🏛️ Government',private:'🏢 Private'}[t]||t; }
function levelName(l) { return {secondary:'Secondary',undergrad:'Undergraduate',postgrad:'Postgraduate'}[l]||l; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Save / unsave ──────────────────────────────────────────────────────────
function toggleSave(id) {
  if (savedIds.has(id)) { savedIds.delete(id); toast('Removed from saved','info'); }
  else                  { savedIds.add(id);    toast('Scholarship saved 🔖','success'); }
  localStorage.setItem('examora_saved_scholarships', JSON.stringify([...savedIds]));
  renderList();
}
window.toggleSave = toggleSave;

  activeFilter = btn.dataset.filter;
  document.querySelectorAll('.ftag').forEach(b=>b.classList.toggle('on', b===btn));
  renderList();

// ── Search ─────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value.trim();
  renderList();
});

// ── Saved toggle ──────────────────────────────────────────────────────────
document.getElementById('savedToggle').addEventListener('click', function() {
  showSavedOnly = !showSavedOnly;
  this.style.color = showSavedOnly ? 'var(--amber)' : '';
  toast(showSavedOnly ? 'Showing saved only' : 'Showing all', 'info');
  renderList();
});

// ── Toast ──────────────────────────────────────────────────────────────────
function toast(msg, type='info') {
  const icons={success:'✓',error:'✕',info:'ℹ',warning:'⚠'};
  const el=document.getElementById('toastEl');
  el.className='toast toast-'+type;
  document.getElementById('toastIcon').textContent=icons[type]||'ℹ';
  document.getElementById('toastMsg').textContent=msg;
  void el.offsetWidth; el.classList.add('show');
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>el.classList.remove('show'),2800);
}

// ── Init ───────────────────────────────────────────────────────────────────
const _auth = getAuth(app);
onAuthStateChanged(_auth, user => {
  if (!user) { window.location.href = 'login.html'; return; }
  loadScholarships();
});
</script>
