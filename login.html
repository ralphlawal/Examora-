<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign In — EXAMORA</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="logo.png"/>
<link rel="apple-touch-icon" href="logo.png"/>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
* { box-sizing:border-box; max-width:100%; min-width:0; }
:root { --max-width:480px; }
body { margin:0; background:var(--bg,#f1f5f9); }
.wrap { max-width:var(--max-width); margin:0 auto; min-height:100dvh; display:flex; flex-direction:column; justify-content:center; padding:24px 20px 48px; }
.logo-wrap { text-align:center; margin-bottom:28px; }
.logo-icon { width:72px; height:72px; border-radius:22px; background:linear-gradient(135deg,#6366f1,#8b5cf6); display:inline-flex; align-items:center; justify-content:center; margin-bottom:12px; box-shadow:0 8px 32px rgba(99,102,241,.35); overflow:hidden; }
.logo-icon img { width:72px; height:72px; object-fit:cover; border-radius:22px; display:block; }
.logo-fb { font-family:'Sora',sans-serif; font-weight:900; font-size:1.5rem; color:#fff; display:none; }
.logo-name { font-family:'Sora',sans-serif; font-weight:900; font-size:1.7rem; color:var(--text,#0f172a); letter-spacing:-.5px; }
.logo-sub  { font-size:.78rem; color:var(--text-3,#94a3b8); margin-top:3px; }
.card { background:var(--bg-card,#fff); border:1px solid var(--border,#e2e8f0); border-radius:24px; padding:24px 20px 20px; }
.tabs { display:flex; background:var(--bg-input,#f8fafc); border-radius:12px; padding:3px; margin-bottom:20px; }
.tab { flex:1; padding:9px; text-align:center; border-radius:9px; font-family:'Sora',sans-serif; font-weight:700; font-size:.8rem; cursor:pointer; transition:all .18s; color:var(--text-3,#94a3b8); border:none; background:none; }
.tab.on { background:var(--bg-card,#fff); color:#6366f1; box-shadow:0 2px 8px rgba(0,0,0,.08); }
.fg { margin-bottom:14px; }
.fl { display:block; font-weight:600; font-size:.76rem; color:var(--text-2,#475569); margin-bottom:6px; }
.fi { width:100%; padding:12px 14px; background:var(--bg-input,#f8fafc); border:1.5px solid var(--border,#e2e8f0); border-radius:12px; color:var(--text,#0f172a); font-family:'Outfit',sans-serif; font-size:.88rem; transition:all .18s; outline:none; }
.fi:focus { border-color:#6366f1; background:var(--bg-card,#fff); box-shadow:0 0 0 3px rgba(99,102,241,.12); }
.fi::placeholder { color:var(--text-3,#94a3b8); }
.pw-wrap { position:relative; }
.pw-eye { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--text-3,#94a3b8); padding:4px; font-size:.9rem; line-height:1; }
.forgot { display:block; text-align:right; font-size:.74rem; color:#6366f1; font-weight:600; cursor:pointer; margin-top:-6px; margin-bottom:16px; background:none; border:none; width:100%; }
.btn-main { width:100%; padding:13px; background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; border:none; border-radius:12px; font-family:'Sora',sans-serif; font-weight:800; font-size:.9rem; cursor:pointer; transition:all .2s; box-shadow:0 4px 16px rgba(99,102,241,.35); margin-bottom:4px; }
.btn-main:hover { transform:translateY(-1px); box-shadow:0 6px 24px rgba(99,102,241,.45); }
.btn-main:active { transform:scale(.98); }
.btn-main:disabled { opacity:.55; cursor:not-allowed; transform:none; box-shadow:none; }
.divider { display:flex; align-items:center; gap:10px; margin:14px 0; }
.divider-line { flex:1; height:1px; background:var(--border,#e2e8f0); }
.divider-txt { font-size:.7rem; color:var(--text-3,#94a3b8); font-weight:600; flex-shrink:0; }
.btn-google { width:100%; padding:12px 16px; border-radius:12px; border:1.5px solid var(--border,#e2e8f0); background:var(--bg-card,#fff); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; font-family:'Sora',sans-serif; font-weight:700; font-size:.88rem; color:var(--text,#0f172a); transition:all .18s; margin-bottom:8px; }
.btn-google:hover { border-color:#6366f1; background:rgba(99,102,241,.04); transform:translateY(-1px); }
.btn-google:active { transform:scale(.98); }
.btn-google:disabled { opacity:.55; cursor:not-allowed; transform:none; }
.btn-guest { width:100%; padding:11px; background:none; border:1.5px dashed var(--border,#e2e8f0); border-radius:10px; color:var(--text-2,#475569); font-family:'Outfit',sans-serif; font-weight:600; font-size:.8rem; cursor:pointer; margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:6px; transition:all .15s; }
.btn-guest:hover { border-color:#6366f1; color:#6366f1; }
.btn-guest:disabled { opacity:.55; cursor:not-allowed; }
.err { display:none; padding:10px 14px; background:rgba(244,63,94,.08); border:1px solid rgba(244,63,94,.25); border-radius:10px; font-size:.78rem; color:#f43f5e; font-weight:600; margin-bottom:12px; line-height:1.5; }
.err.on { display:block; }
.ok { display:none; padding:10px 14px; background:rgba(16,185,129,.08); border:1px solid rgba(16,185,129,.25); border-radius:10px; font-size:.78rem; color:#10b981; font-weight:600; margin-bottom:12px; line-height:1.5; }
.ok.on { display:block; }
.info-banner { display:none; padding:10px 14px; background:rgba(245,158,11,.07); border:1px solid rgba(245,158,11,.3); border-radius:10px; font-size:.76rem; color:#d97706; line-height:1.6; margin-top:10px; }
.info-banner.on { display:block; }
.tnote { font-size:.68rem; color:var(--text-3,#94a3b8); text-align:center; margin-top:14px; line-height:1.6; }
.tnote a { color:#6366f1; text-decoration:none; font-weight:600; }
</style>
</head>
<body>
<div class="wrap">

  <div class="logo-wrap">
    <div class="logo-icon">
      <img src="logo.png" alt="EXAMORA" onerror="this.style.display='none';document.querySelector('.logo-fb').style.display='block'"/>
      <span class="logo-fb">EX</span>
    </div>
    <div class="logo-name">EXAMORA</div>
    <div class="logo-sub">Nigeria's smartest exam prep — powered by AI</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab on" id="tab-in" >Sign In</button>
      <button class="tab"    id="tab-up" >Create Account</button>
    </div>

    <div class="err" id="errBox"></div>
    <div class="ok"  id="okBox"></div>

    <button class="btn-google" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <button class="btn-guest" id="guestBtn">
      <span style="font-size:1rem;">👤</span> Try as Guest (no account needed)
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-txt">or use email</div>
      <div class="divider-line"></div>
    </div>

    <div class="fg">
      <label class="fl" for="emailInput">Email address</label>
      <input class="fi" type="email" id="emailInput" placeholder="you@email.com" autocomplete="email" inputmode="email"/>
    </div>

    <div class="fg">
      <label class="fl" for="passInput">Password</label>
      <div class="pw-wrap">
        <input class="fi" type="password" id="passInput" placeholder="••••••••" autocomplete="current-password"/>
        <button class="pw-eye" type="button">👁</button>
      </div>
    </div>

    <button class="forgot" id="forgotBtn">Forgot password?</button>

    <button class="btn-main" id="mainBtn">Sign In →</button>

    <div class="info-banner" id="spamHint">
      📬 Check your <strong>inbox and spam/junk folder</strong> for the verification email.
    </div>
    <div class="info-banner" id="verifyBanner">
      📧 Email not verified yet.
      <button style="background:none;border:none;color:#d97706;font-weight:800;cursor:pointer;text-decoration:underline;font-size:.76rem;padding:0;">Resend email</button>
    </div>

    <div class="tnote">
      By continuing you agree to our <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp, getApps, getApp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getAuth, onAuthStateChanged,
  signInWithEmailAndPassword, createUserWithEmailAndPassword,
  sendPasswordResetEmail, sendEmailVerification,
  GoogleAuthProvider, signInWithPopup, signInWithRedirect,
  getRedirectResult, signInAnonymously
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// Safe init
const FB = { apiKey:'AIzaSyA5RUfGUA68-RNyMZPlxaVYj85h5OiJdJw', authDomain:'cbt-app-5907f.firebaseapp.com', projectId:'cbt-app-5907f', storageBucket:'cbt-app-5907f.firebasestorage.app', messagingSenderId:'705323924101', appId:'1:705323924101:web:ad9f153f25a0685a1287ec' };
const app = getApps().length ? getApp() : initializeApp(FB);
const auth = getAuth(app);
const db   = getFirestore(app);
const gp   = new GoogleAuthProvider();
gp.setCustomParameters({ prompt:'select_account' });

// Theme
document.documentElement.setAttribute('data-theme', localStorage.getItem('examora_theme')||'light');

// State
let _mode = 'login';
let _busy = false;

// Helpers
const $ = id => document.getElementById(id);
const showErr = m => { $('errBox').textContent=m; $('errBox').className='err on'; $('okBox').className='ok'; };
const showOk  = m => { $('okBox').textContent=m;  $('okBox').className='ok on';   $('errBox').className='err'; };
const clearMsg = () => { $('errBox').className='err'; $('okBox').className='ok'; };

function setBusy(on) {
  _busy = on;
  $('mainBtn').disabled  = on;
  $('googleBtn').disabled = on;
  $('guestBtn').disabled  = on;
  $('mainBtn').textContent = on ? 'Please wait…' : (_mode==='login' ? 'Sign In →' : 'Create Account →');
}

const ERRS = {
  'auth/user-not-found':       'No account found with that email.',
  'auth/wrong-password':       'Incorrect password.',
  'auth/invalid-credential':   'Invalid email or password.',
  'auth/invalid-email':        'Please enter a valid email address.',
  'auth/too-many-requests':    'Too many attempts — wait a few minutes.',
  'auth/email-already-in-use': 'An account already exists with this email. Sign in instead.',
  'auth/weak-password':        'Password must be at least 6 characters.',
  'auth/network-request-failed': 'No internet connection. Check your network.',
  'auth/popup-closed-by-user': '',
  'auth/cancelled-popup-request': '',
  'auth/popup-blocked':        'Popup blocked — trying redirect…'
};

async function makeDoc(user) {
  try {
    const ref  = doc(db,'users',user.uid);
    const snap = await getDoc(ref);
    const data = { displayName:user.displayName||user.email?.split('@')[0]||'Learner', email:user.email||'', photoURL:user.photoURL||'', updatedAt:serverTimestamp() };
    if(!snap.exists()) Object.assign(data,{ plan:'free',streak:0,totalExams:0,totalCorrect:0,totalQuestions:0,badges:[],xp:0,totalScore:0,createdAt:serverTimestamp(),onboarded:false });
    await setDoc(ref,data,{merge:true});
  } catch(e){ console.warn('makeDoc:',e.message); }
}

function goHome() { window.location.href='index.html'; }

// Auto-redirect if already logged in
onAuthStateChanged(auth, user => { if(user&&!_busy) goHome(); });

// Handle Google redirect result
getRedirectResult(auth).then(async r => {
  if(!r?.user) return;
  localStorage.setItem('examora_user_display', r.user.displayName||r.user.email?.split('@')[0]||'User');
  await makeDoc(r.user);
  goHome();
}).catch(e => { if(e.code&&e.code!=='auth/no-auth-event') showErr(ERRS[e.code]||e.message); });

// ── Expose to onclick handlers ───────────────────────────
function setMode(m) {
  _mode = m;
  $('tab-in').classList.toggle('on', m==='login');
  $('tab-up').classList.toggle('on', m==='register');
  $('mainBtn').textContent = m==='login' ? 'Sign In →' : 'Create Account →';
  $('forgotBtn').style.display = m==='login' ? '' : 'none';
  $('spamHint').className = 'info-banner'+(m==='register'?' on':'');
  clearMsg();
};

function togglePwFn() { const i=$('passInput'); i.type=i.type==='password'?'text':'password'; };

async function doAuth() {
  if(_busy) return;
  clearMsg();
  const email = $('emailInput').value.trim();
  const pass  = $('passInput').value;
  if(!email||!pass){ showErr('Please enter your email and password.'); return; }

  setBusy(true);
  try {
    if(_mode==='login') {
      const cred = await signInWithEmailAndPassword(auth, email, pass);
      localStorage.setItem('examora_user_display', cred.user.displayName||email.split('@')[0]);
      await makeDoc(cred.user);
      goHome();
    } else {
      if(pass.length<6){ setBusy(false); showErr('Password must be at least 6 characters.'); return; }
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await sendEmailVerification(cred.user);
      await makeDoc(cred.user);
      setBusy(false);
      showOk('✅ Account created! Check your inbox (and spam) for the verification email.');
      window.setMode('login');
    }
  } catch(e) {
    setBusy(false);
    const msg = ERRS[e.code]||e.message||'Sign in failed.';
    showErr(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential' ? msg+' Use "Forgot password?" to reset.' : msg);
  }
};

async function doGoogle() {
  if(_busy) return;
  _busy=true; $('googleBtn').disabled=true; clearMsg();
  try {
    const cred = await signInWithPopup(auth, gp);
    localStorage.setItem('examora_user_display', cred.user.displayName||cred.user.email?.split('@')[0]||'User');
    await makeDoc(cred.user);
    goHome();
  } catch(e) {
    _busy=false; $('googleBtn').disabled=false;
    if(e.code==='auth/popup-blocked'){ showErr(ERRS[e.code]); setTimeout(()=>signInWithRedirect(auth,gp),600); }
    else if(e.code!=='auth/popup-closed-by-user'&&e.code!=='auth/cancelled-popup-request') showErr(ERRS[e.code]||e.message||'Google sign-in failed.');
  }
};

async function doGuest() {
  if(_busy) return;
  if(!confirm("Guest accounts are temporary.\n\nYour progress won't be saved if you clear your browser. You can create a free account anytime to save your data.\n\nContinue as guest?")) return;
  _busy=true; $('guestBtn').disabled=true; clearMsg();
  try {
    const cred = await signInAnonymously(auth);
    localStorage.setItem('examora_user_display','Guest');
    localStorage.setItem('examora_user_level','secondary');
    await makeDoc(cred.user);
    goHome();
  } catch(e) {
    _busy=false; $('guestBtn').disabled=false;
    showErr(e.message||'Could not sign in as guest.');
  }
};

async function doForgot() {
  const email = $('emailInput').value.trim();
  if(!email){ showErr('Enter your email address first, then click Forgot password.'); return; }
  try { await sendPasswordResetEmail(auth,email); showOk('Password reset email sent — check your inbox.'); }
  catch(e){ showErr(ERRS[e.code]||e.message||'Could not send reset email.'); }
};

async function doResend() {
  try { if(auth.currentUser) await sendEmailVerification(auth.currentUser); showOk('Verification email sent!'); }
  catch(e){ showErr('Could not resend: '+e.message); }
};

// ── Wire ALL buttons via addEventListener (no onclick race conditions) ──
document.getElementById('mainBtn')  .addEventListener('click', doAuth);
document.getElementById('googleBtn').addEventListener('click', doGoogle);
document.getElementById('guestBtn') .addEventListener('click', doGuest);
document.getElementById('forgotBtn').addEventListener('click', doForgot);
document.getElementById('tab-in')   .addEventListener('click', () => setMode('login'));
document.getElementById('tab-up')   .addEventListener('click', () => setMode('register'));
document.getElementById('passInput').addEventListener('keydown', e => { if(e.key==='Enter') doAuth(); });
document.getElementById('emailInput').addEventListener('keydown', e => { if(e.key==='Enter') $('passInput').focus(); });

// pw toggle
document.querySelector('.pw-eye').addEventListener('click', () => {
  const i=$('passInput'); i.type=i.type==='password'?'text':'password';
});

// Resend verify
const resendBtn = document.querySelector('[onclick="doResend()"]');
if(resendBtn){ resendBtn.removeAttribute('onclick'); resendBtn.addEventListener('click', doResend); }

// Make functions available as window.* too (for any external calls)
window.setMode = setMode;
window.doAuth  = doAuth;
</script>
</body>
</html>
