<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Group Study — EXAMORA</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0" rel="stylesheet"/>
<style>
* { box-sizing:border-box; max-width:100%; min-width:0; }
p,span,div,h1,h2,h3,h4,h5,h6,a,li,label,button { overflow-wrap:break-word; word-wrap:break-word; }

/* Room cards */
.room-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:16px; margin-bottom:10px;
  transition:all .18s ease; cursor:pointer; position:relative; overflow:hidden;
}
.room-card:hover { border-color:rgba(91,94,244,.35); box-shadow:var(--sh-sm); transform:translateY(-1px); }
.room-card.live { border-color:rgba(16,185,129,.3); }
.room-card.live::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg,var(--brand),var(--emerald));
}
.rc-top { display:flex; align-items:flex-start; gap:12px; margin-bottom:10px; }
.rc-icon { width:46px; height:46px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:1.4rem; flex-shrink:0; }
.rc-info { flex:1; min-width:0; }
.rc-name { font-family:var(--fd); font-weight:800; font-size:.9rem; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rc-sub  { font-size:.72rem; color:var(--ink-3); margin-top:3px; font-family:var(--fb); }
.rc-badge { padding:4px 10px; border-radius:100px; font-size:.65rem; font-weight:800; font-family:var(--fb); flex-shrink:0; }
.badge-live   { background:rgba(16,185,129,.15); color:var(--emerald); border:1px solid rgba(16,185,129,.3); }
.badge-open   { background:rgba(91,94,244,.12); color:var(--brand); border:1px solid rgba(91,94,244,.25); }
.badge-full   { background:rgba(244,63,94,.1); color:var(--rose); border:1px solid rgba(244,63,94,.2); }

.rc-members { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.member-avatars { display:flex; }
.member-av {
  width:28px; height:28px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-family:var(--fd); font-weight:800; font-size:.62rem;
  color:#fff; border:2px solid var(--surface); margin-right:-8px; flex-shrink:0;
}
.rc-member-count { font-size:.72rem; color:var(--ink-3); margin-left:16px; font-family:var(--fb); }

.rc-footer { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.join-btn { flex:1; }

/* Active room view */
.room-view { display:none; }
.room-view.active { display:block; }
.room-header-card {
  background:linear-gradient(135deg,rgba(91,94,244,.12),rgba(16,185,129,.06));
  border:1.5px solid rgba(91,94,244,.2); border-radius:var(--r-lg);
  padding:16px; margin-bottom:16px;
}
.rh-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.rh-title { font-family:var(--fd); font-weight:900; font-size:1rem; color:var(--ink); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.live-dot { width:8px; height:8px; border-radius:50%; background:var(--emerald); box-shadow:0 0 0 3px rgba(16,185,129,.2); animation:pulse 2s infinite; flex-shrink:0; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 3px rgba(16,185,129,.2)} 50%{box-shadow:0 0 0 6px rgba(16,185,129,.08)} }
.members-strip { display:flex; gap:8px; flex-wrap:wrap; }
.member-chip {
  display:flex; align-items:center; gap:6px; padding:5px 10px;
  background:var(--surface); border:1px solid var(--border); border-radius:100px;
  font-family:var(--fb); font-size:.72rem; color:var(--ink-2);
}
.member-chip .av { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.58rem; font-weight:800; color:#fff; flex-shrink:0; }
.member-chip.me  { border-color:var(--brand); color:var(--brand); background:var(--brand-pale); }

/* Chat area */
.chat-area {
  background:var(--surface-2); border:1px solid var(--border);
  border-radius:var(--r-lg); overflow:hidden; margin-bottom:12px;
}
.chat-messages {
  height:280px; overflow-y:auto; padding:12px;
  display:flex; flex-direction:column; gap:8px;
  scroll-behavior:smooth;
}
.chat-msg { display:flex; gap:8px; align-items:flex-start; }
.chat-msg.me { flex-direction:row-reverse; }
.cm-av { width:28px; height:28px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:.6rem; font-weight:800; color:#fff; }
.cm-bubble {
  max-width:75%; padding:8px 12px; border-radius:12px;
  font-family:var(--fb); font-size:.8rem; line-height:1.5; color:var(--ink);
  background:var(--surface); border:1px solid var(--border);
}
.chat-msg.me .cm-bubble { background:var(--brand); color:#fff; border:none; border-radius:12px 12px 2px 12px; }
.chat-msg:not(.me) .cm-bubble { border-radius:12px 12px 12px 2px; }
.cm-name { font-size:.62rem; color:var(--ink-3); margin-bottom:2px; font-family:var(--fb); font-weight:700; }
.chat-msg.me .cm-name { text-align:right; color:rgba(91,94,244,.7); }
.cm-sys { text-align:center; font-size:.68rem; color:var(--ink-3); padding:4px 0; font-family:var(--fb); font-style:italic; }

.chat-input-row {
  display:flex; gap:8px; padding:10px 12px;
  background:var(--surface); border-top:1px solid var(--border);
}
.chat-input-row input { flex:1; font-size:.84rem; border-radius:10px; }
.send-btn { padding:9px 14px; border-radius:10px; background:var(--brand); border:none; color:#fff; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:opacity .15s ease; }
.send-btn:hover { opacity:.85; }
.send-btn:disabled { opacity:.5; cursor:default; }

/* Live poll / challenge */
.live-challenge {
  background:var(--surface); border:1.5px solid rgba(245,158,11,.3);
  border-radius:var(--r-lg); padding:16px; margin-bottom:12px;
}
.lc-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.lc-title { font-family:var(--fd); font-weight:800; font-size:.85rem; color:var(--ink); flex:1; }
.lc-timer { font-family:var(--fd); font-weight:900; font-size:1rem; color:var(--amber); }
.lc-q    { font-family:var(--fb); font-size:.84rem; color:var(--ink); line-height:1.55; margin-bottom:12px; }
.lc-opts { display:flex; flex-direction:column; gap:7px; }
.lc-opt  {
  padding:10px 14px; border-radius:10px; border:1.5px solid var(--border);
  background:var(--surface-2); font-family:var(--fb); font-size:.82rem;
  color:var(--ink); cursor:pointer; transition:all .18s ease; text-align:left;
  display:flex; align-items:center; gap:10px;
}
.lc-opt:hover:not(:disabled) { border-color:var(--brand); background:var(--brand-pale); color:var(--brand); }
.lc-opt.selected { border-color:var(--brand); background:var(--brand-pale); color:var(--brand); font-weight:700; }
.lc-opt.correct  { border-color:var(--emerald); background:rgba(16,185,129,.1); color:var(--emerald); font-weight:700; }
.lc-opt.wrong    { border-color:var(--rose); background:rgba(244,63,94,.07); color:var(--rose); }
.lc-opt:disabled { cursor:default; }
.lc-result { display:none; margin-top:10px; padding:10px 12px; border-radius:10px; font-size:.78rem; font-family:var(--fb); }
.lc-result.show { display:block; }

/* Create room */
.create-form { background:var(--surface); border:1.5px dashed var(--border); border-radius:var(--r-lg); padding:18px; margin-bottom:18px; }

/* Score leaderboard in room */
.room-scores { margin-top:12px; }
.rs-item { display:flex; align-items:center; gap:10px; padding:9px 12px; background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:6px; }
.rs-rank { font-family:var(--fd); font-weight:900; font-size:.85rem; width:24px; text-align:center; flex-shrink:0; }
.rs-name { flex:1; font-family:var(--fb); font-size:.8rem; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rs-score { font-family:var(--fd); font-weight:800; font-size:.82rem; color:var(--brand); flex-shrink:0; }
</style>
</head>
<body>

<header class="app-header">
  <a class="app-logo" href="index.html" style="text-decoration:none;display:flex;align-items:center;gap:9px;">
    <img class="app-logo-img" src="logo.png" alt="EXAMORA" style="width:34px;height:34px;border-radius:10px;object-fit:contain;display:block;"
      onerror="(function(i){i.style.display='none';var p=i.parentElement;var f=p&&p.querySelector('.app-logo-icon');if(f)f.style.display='flex';})(this)"/>
    <div class="app-logo-icon" style="display:none;">EX</div>
    <div><div class="app-logo-name">Group Study</div></div>
  </a>
  <div class="header-actions">
    <button class="header-btn" id="themeBtn"><span class="material-symbols-rounded">light_mode</span></button>
  </div>
</header>

<div class="page-wrapper">

  <!-- Lobby view -->
  <div id="lobbyView">

    <!-- Create room -->
    <div class="create-form">
      <div style="font-family:var(--fd);font-weight:800;font-size:.9rem;color:var(--ink);margin-bottom:14px;">➕ Create a Study Room</div>
      <div class="form-group">
        <label class="form-label">Room Name</label>
        <input id="roomName" class="form-input" type="text" placeholder="e.g. JAMB Maths Blitz 🔥" maxlength="50"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
        <div class="form-group" style="margin:0;">
          <label class="form-label">Subject</label>
          <select id="roomSubject" class="form-select">
            <option>Mathematics</option><option>Biology</option><option>Chemistry</option>
            <option>Physics</option><option>English</option><option>Geography</option>
            <option>Economics</option><option>Government</option><option>Mixed</option>
          </select>
        </div>
        <div class="form-group" style="margin:0;">
          <label class="form-label">Max Members</label>
          <select id="roomMax" class="form-select">
            <option value="4">4 students</option><option value="6">6 students</option>
            <option value="10">10 students</option><option value="20">20 students</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%;" onclick="createRoom()">
        <span class="material-symbols-rounded ms-sm">add_circle</span> Create Room
      </button>
    </div>

    <!-- Active rooms -->
    <div class="sec-label" style="margin-bottom:12px;">Active Rooms</div>
    <div id="roomsList">
      <div class="skeleton skeleton-card" style="margin-bottom:10px;"></div>
      <div class="skeleton skeleton-card" style="margin-bottom:10px;"></div>
    </div>

  </div>

  <!-- Active room view -->
  <div id="roomView" class="room-view">

    <div class="room-header-card">
      <div class="rh-top">
        <div class="live-dot"></div>
        <div class="rh-title" id="rvTitle">Room Name</div>
        <button class="btn btn-ghost btn-sm" onclick="leaveRoom()" style="flex-shrink:0;">Leave</button>
      </div>
      <div class="members-strip" id="membersStrip"></div>
    </div>

    <!-- Live challenge question -->
    <div class="live-challenge" id="challengeBox" style="display:none;">
      <div class="lc-header">
        <div style="font-size:1rem;">⚡</div>
        <div class="lc-title" id="lcTitle">Quick Challenge</div>
        <div class="lc-timer" id="lcTimer">30</div>
      </div>
      <div class="lc-q" id="lcQuestion"></div>
      <div class="lc-opts" id="lcOptions"></div>
      <div class="lc-result" id="lcResult"></div>
    </div>

    <!-- Room scores -->
    <div style="font-family:var(--fd);font-weight:800;font-size:.82rem;color:var(--ink);margin-bottom:8px;">🏆 Room Scores</div>
    <div class="room-scores" id="roomScores"></div>

    <!-- Challenge button (host only) -->
    <button class="btn btn-ghost btn-sm" id="startChallengeBtn" onclick="startChallenge()" style="width:100%;margin:10px 0;">
      ⚡ Send a Challenge Question
    </button>

    <!-- Chat -->
    <div style="font-family:var(--fd);font-weight:800;font-size:.82rem;color:var(--ink);margin-bottom:8px;">💬 Group Chat</div>
    <div class="chat-area">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-row">
        <input id="chatInput" class="form-input" type="text" placeholder="Message the group…" maxlength="300"/>
        <button class="send-btn" onclick="sendMessage()" id="sendBtn">
          <span class="material-symbols-rounded" style="font-size:1.1rem;">send</span>
        </button>
      </div>
    </div>

  </div>

</div>

  <a href="index.html"       class="nav-item"><span class="nav-icon">home</span><span class="nav-label">Home</span></a>
  <a href="exam.html"        class="nav-item"><span class="nav-icon">edit_note</span><span class="nav-label">Exam</span></a>

</nav>

<div id="toastEl" class="toast"><span class="toast-icon" id="toastIcon">✓</span><span id="toastMsg">Done</span></div>

<script type="module">
import { initializeApp }        from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {
  getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
  getDoc, getDocs, onSnapshot, query, orderBy, limit,
  serverTimestamp, arrayUnion, arrayRemove, where
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app  = initializeApp({
  apiKey:'AIzaSyA5RUfGUA68-RNyMZPlxaVYj85h5OiJdJw',
  authDomain:'cbt-app-5907f.firebaseapp.com',
  projectId:'cbt-app-5907f',
  storageBucket:'cbt-app-5907f.firebasestorage.app',
  messagingSenderId:'705323924101',
  appId:'1:705323924101:web:ad9f153f25a0685a1287ec'
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ── State ─────────────────────────────────────────────────────────────────
let uid        = null;
let userName   = 'Student';
let userColor  = '#5b5ef4';
let activeRoom = null;
let roomUnsub  = null;
let chatUnsub  = null;
let challengeTimer = null;
let myScore    = 0;

// ── Colours pool for avatars ───────────────────────────────────────────────
const COLORS = ['#5b5ef4','#10b981','#f59e0b','#f43f5e','#8b5cf6','#06b6d4','#ec4899','#84cc16'];

// ── Theme ─────────────────────────────────────────────────────────────────
const _t = localStorage.getItem('examora_theme') || 'light';
document.documentElement.setAttribute('data-theme', _t);
const themeBtn = document.getElementById('themeBtn');
if (themeBtn) {
  themeBtn.querySelector('span').textContent = _t === 'dark' ? 'light_mode' : 'dark_mode';
  themeBtn.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const nxt = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', nxt);
    localStorage.setItem('examora_theme', nxt);
    themeBtn.querySelector('span').textContent = nxt === 'dark' ? 'light_mode' : 'dark_mode';
  });
}

// ── Auth ───────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = 'login.html'; return; }
  uid       = user.uid;
  userName  = user.displayName || localStorage.getItem('examora_user_display') || user.email.split('@')[0];
  userColor = COLORS[uid.charCodeAt(0) % COLORS.length];
  loadRooms();
});

// ── Load rooms ─────────────────────────────────────────────────────────────
function loadRooms() {
  const q = query(collection(db,'study_rooms'), orderBy('createdAt','desc'), limit(20));
  onSnapshot(q, (snap) => {
    const rooms = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    renderRooms(rooms);
  }, () => {
    // Firestore permission error — show offline demo
    renderOfflineDemo();
  });
}

function renderRooms(rooms) {
  const el = document.getElementById('roomsList');
  // Clean up stale rooms (older than 4 hours with no activity)
  const active = rooms.filter(r => {
    if (!r.createdAt) return true;
    const age = Date.now() - (r.createdAt.toMillis ? r.createdAt.toMillis() : Date.now());
    return age < 4 * 3600 * 1000;
  });

  if (!active.length) {
    el.innerHTML = `
      <div style="text-align:center;padding:32px 20px;color:var(--ink-3);">
        <div style="font-size:2.2rem;margin-bottom:10px;">🏠</div>
        <div style="font-family:var(--fd);font-weight:800;font-size:.88rem;color:var(--ink-2);margin-bottom:6px;">No active rooms</div>
        <div style="font-size:.76rem;">Create one above and invite your friends!</div>
      </div>`;
    return;
  }

  el.innerHTML = active.map(room => {
    const members  = room.members || [];
    const isFull   = members.length >= (room.maxMembers || 10);
    const isIn     = members.some(m => m.uid === uid);
    const avatarColors = members.slice(0,4).map((_,i)=>COLORS[i%COLORS.length]);

    return `
      <div class="room-card ${room.live?'live':''}">
        <div class="rc-top">
          <div class="rc-icon" style="background:${room.color||'rgba(91,94,244,.1)'}22;">${room.icon||'📚'}</div>
          <div class="rc-info">
            <div class="rc-name">${esc(room.name)}</div>
            <div class="rc-sub">${esc(room.subject||'General')} · created by ${esc(room.hostName||'Host')}</div>
          </div>
          <div class="rc-badge ${isIn?'badge-live':isFull?'badge-full':'badge-open'}">
            ${isIn?'🟢 Joined':isFull?'🔴 Full':'🔵 Open'}
          </div>
        </div>
        <div class="rc-members">
          <div class="member-avatars">
            ${members.slice(0,4).map((m,i)=>`
              <div class="member-av" style="background:${avatarColors[i]};" title="${esc(m.name||'?')}">
                ${(m.name||'?')[0].toUpperCase()}
              </div>`).join('')}
          </div>
          <div class="rc-member-count">${members.length} / ${room.maxMembers||10} members</div>
        </div>
        <div class="rc-footer">
          <div style="font-size:.7rem;color:var(--ink-3);font-family:var(--fb);">${fmtAgo(room.createdAt)}</div>
          ${isIn
            ? `<button class="btn btn-primary btn-sm join-btn" onclick="joinRoom('${room.id}')">Re-enter Room</button>`
            : isFull
              ? `<button class="btn btn-ghost btn-sm join-btn" disabled>Room Full</button>`
              : `<button class="btn btn-primary btn-sm join-btn" onclick="joinRoom('${room.id}')">Join Room</button>`}
        </div>
      </div>`;
  }).join('');
}

function renderOfflineDemo() {
  // Show demo rooms so UI looks functional even without Firestore access
  const demoRooms = [
    { id:'demo1', name:'JAMB Maths Blitz 🔥', subject:'Mathematics', hostName:'Amaka', members:[{uid:'a',name:'Amaka'},{uid:'b',name:'Chidi'},{uid:'c',name:'Tolu'}], maxMembers:6, icon:'📐', color:'#5b5ef4', createdAt:null },
    { id:'demo2', name:'Biology Squad 🧬', subject:'Biology', hostName:'Emeka', members:[{uid:'d',name:'Emeka'},{uid:'e',name:'Zara'}], maxMembers:4, icon:'🧬', color:'#10b981', createdAt:null },
  ];
  renderRooms(demoRooms);
}

// ── Create room ────────────────────────────────────────────────────────────
async function createRoom() {
  const name    = (document.getElementById('roomName').value || '').trim();
  const subject = document.getElementById('roomSubject').value;
  const max     = parseInt(document.getElementById('roomMax').value) || 10;
  if (!name) { toast('Enter a room name','error'); return; }

  const subjectIcons = { Mathematics:'📐',Biology:'🧬',Chemistry:'⚗️',Physics:'⚡',English:'📖',Geography:'🌍',Economics:'💹',Government:'🏛️',Mixed:'📚' };
  try {
    const ref = await addDoc(collection(db,'study_rooms'), {
      name, subject, maxMembers:max,
      hostUid:uid, hostName:userName,
      icon:subjectIcons[subject]||'📚',
      color:userColor,
      members:[{ uid, name:userName, color:userColor, score:0 }],
      createdAt:serverTimestamp(),
      live:true
    });
    document.getElementById('roomName').value = '';
    toast('Room created! 🎉','success');
    joinRoom(ref.id);
  } catch (err) {
    toast('Could not create room: ' + err.message,'error');
  }
}
window.createRoom = createRoom;

// ── Join room ──────────────────────────────────────────────────────────────
async function joinRoom(roomId) {
  try {
    const roomRef  = doc(db,'study_rooms',roomId);
    const roomSnap = await getDoc(roomRef);
    if (!roomSnap.exists()) { toast('Room not found','error'); return; }
    const room = roomSnap.data();
    const members = room.members || [];

    // Add if not already in
    if (!members.some(m=>m.uid===uid)) {
      if (members.length >= (room.maxMembers||10)) { toast('Room is full','error'); return; }
      await updateDoc(roomRef, { members: arrayUnion({ uid, name:userName, color:userColor, score:0 }) });
    }

    activeRoom = { id:roomId, ...room };
    myScore    = (members.find(m=>m.uid===uid)?.score || 0);

    // Add system message
    await addDoc(collection(db,'study_rooms',roomId,'messages'), {
      type:'system', text:`${userName} joined the room`, createdAt:serverTimestamp()
    });

    enterRoomView(roomId);
  } catch (err) {
    toast('Could not join: ' + err.message,'error');
  }
}
window.joinRoom = joinRoom;

// ── Enter room UI ──────────────────────────────────────────────────────────
function enterRoomView(roomId) {
  document.getElementById('lobbyView').style.display = 'none';
  document.getElementById('roomView').classList.add('active');

  // Unsubscribe from previous listeners
  if (roomUnsub) roomUnsub();
  if (chatUnsub) chatUnsub();

  // Listen to room updates (members, challenge)
  roomUnsub = onSnapshot(doc(db,'study_rooms',roomId), (snap) => {
    if (!snap.exists()) { leaveRoom(); return; }
    const room = { id:snap.id, ...snap.data() };
    activeRoom = room;
    updateRoomHeader(room);
    updateScores(room);
    if (room.challenge && room.challenge.active) showChallenge(room.challenge);
    else hideChallenge();
  });

  // Listen to chat messages
  const msgQuery = query(collection(db,'study_rooms',roomId,'messages'), orderBy('createdAt','asc'), limit(100));
  chatUnsub = onSnapshot(msgQuery, (snap) => {
    snap.docChanges().forEach(change => {
      if (change.type === 'added') appendMessage(change.doc.data());
    });
  });

  // Enter key for chat
  document.getElementById('chatInput').onkeydown = (e) => { if(e.key==='Enter') sendMessage(); };
}

function updateRoomHeader(room) {
  const title = document.getElementById('rvTitle');
  if (title) title.textContent = room.name || 'Study Room';
  const strip = document.getElementById('membersStrip');
  if (!strip) return;
  const members = room.members || [];
  const isHost  = room.hostUid === uid;
  const hostBtn = document.getElementById('startChallengeBtn');
  if (hostBtn) hostBtn.style.display = isHost ? '' : 'none';

  strip.innerHTML = members.map(m => `
    <div class="member-chip ${m.uid===uid?'me':''}">
      <div class="av" style="background:${m.color||'#5b5ef4'};">${(m.name||'?')[0].toUpperCase()}</div>
      ${esc(m.name||'?')}${m.uid===uid?' (you)':''}${room.hostUid===m.uid?' 👑':''}
    </div>`).join('');
}

function updateScores(room) {
  const el = document.getElementById('roomScores');
  if (!el) return;
  const members = [...(room.members||[])].sort((a,b)=>(b.score||0)-(a.score||0));
  const medals  = ['🥇','🥈','🥉'];
  el.innerHTML = members.map((m,i) => `
    <div class="rs-item">
      <div class="rs-rank">${medals[i]||i+1}</div>
      <div class="rs-name">${esc(m.name||'?')}${m.uid===uid?' (you)':''}</div>
      <div class="rs-score">+${m.score||0} pts</div>
    </div>`).join('');
}

// ── Chat ───────────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text  = (input.value || '').trim();
  if (!text || !activeRoom) return;
  input.value = '';
  try {
    await addDoc(collection(db,'study_rooms',activeRoom.id,'messages'), {
      type:'chat', text, uid, name:userName, color:userColor, createdAt:serverTimestamp()
    });
  } catch (err) { toast('Send failed: '+err.message,'error'); }
}
window.sendMessage = sendMessage;

function appendMessage(msg) {
  const el = document.getElementById('chatMessages');
  if (!el) return;
  const div = document.createElement('div');

  if (msg.type === 'system') {
    div.className = 'cm-sys';
    div.textContent = msg.text || '';
  } else {
    const isMe = msg.uid === uid;
    div.className = 'chat-msg' + (isMe?' me':'');
    const color = msg.color || '#5b5ef4';
    div.innerHTML = `
      <div class="cm-av" style="background:${color};">${(msg.name||'?')[0].toUpperCase()}</div>
      <div>
        <div class="cm-name">${esc(msg.name||'?')}</div>
        <div class="cm-bubble">${esc(msg.text||'')}</div>
      </div>`;
  }
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

// ── Challenge questions ────────────────────────────────────────────────────
const SAMPLE_QUESTIONS = [
  { q:'What is the powerhouse of the cell?', opts:['Nucleus','Mitochondria','Ribosome','Cell membrane'], ans:1 },
  { q:'Solve: If 2x + 5 = 17, what is x?', opts:['5','6','7','8'], ans:1 },
  { q:'What gas do plants absorb during photosynthesis?', opts:['Oxygen','Carbon dioxide','Nitrogen','Hydrogen'], ans:1 },
  { q:'What is the chemical symbol for Gold?', opts:['Go','Gd','Au','Ag'], ans:2 },
  { q:'In which year did Nigeria gain independence?', opts:['1957','1958','1960','1963'], ans:2 },
  { q:'What is the speed of light (approximately)?', opts:['3×10⁶ m/s','3×10⁸ m/s','3×10¹⁰ m/s','3×10⁴ m/s'], ans:1 },
  { q:'The derivative of sin(x) is:', opts:['cos(x)','-cos(x)','tan(x)','-sin(x)'], ans:0 },
  { q:'What is the capital of Nigeria?', opts:['Lagos','Port Harcourt','Abuja','Kano'], ans:2 },
  { q:'pH of a neutral solution at 25°C is:', opts:['0','7','14','10'], ans:1 },
  { q:'Force = mass × ?', opts:['velocity','speed','acceleration','distance'], ans:2 },
];

let challengeTimerInterval = null;
let currentChallenge = null;
let hasAnswered = false;

async function startChallenge() {
  if (!activeRoom || activeRoom.hostUid !== uid) return;
  const q = SAMPLE_QUESTIONS[Math.floor(Math.random()*SAMPLE_QUESTIONS.length)];
  const challenge = { active:true, question:q.q, options:q.opts, answer:q.ans, startedAt:Date.now(), duration:30 };
  try {
    await updateDoc(doc(db,'study_rooms',activeRoom.id), { challenge });
    toast('Challenge sent to all members!','success');
  } catch (err) { toast('Error: '+err.message,'error'); }
}
window.startChallenge = startChallenge;

function showChallenge(challenge) {
  const box = document.getElementById('challengeBox');
  if (!box) return;
  box.style.display = '';
  currentChallenge = challenge;
  hasAnswered = false;

  const qEl   = document.getElementById('lcQuestion');
  const optsEl = document.getElementById('lcOptions');
  const resultEl = document.getElementById('lcResult');
  if (qEl)     qEl.textContent = challenge.question || '';
  if (resultEl) { resultEl.className='lc-result'; resultEl.textContent=''; }

  const elapsed = Math.floor((Date.now() - (challenge.startedAt||Date.now())) / 1000);
  let remaining = Math.max(0, (challenge.duration||30) - elapsed);

  if (optsEl) {
    optsEl.innerHTML = (challenge.options||[]).map((opt, i) => `
      <button class="lc-opt" id="opt-${i}" onclick="answerChallenge(${i})" ${remaining<=0?'disabled':''}>
        <span style="font-family:var(--fd);font-weight:800;color:var(--ink-3);font-size:.8rem;">${'ABCD'[i]}.</span>
        ${esc(opt)}
      </button>`).join('');
  }

  // Timer
  if (challengeTimerInterval) clearInterval(challengeTimerInterval);
  const timerEl = document.getElementById('lcTimer');
  function tick() {
    if (timerEl) timerEl.textContent = remaining;
    if (remaining <= 0) {
      clearInterval(challengeTimerInterval);
      if (!hasAnswered) showChallengeResult(-1, challenge.answer);
      disableOptions();
    }
    remaining = Math.max(0, remaining-1);
  }
  tick();
  challengeTimerInterval = setInterval(tick, 1000);
}

async function answerChallenge(idx) {
  if (hasAnswered || !currentChallenge) return;
  hasAnswered = true;
  disableOptions();
  const correct = idx === currentChallenge.answer;
  showChallengeResult(idx, currentChallenge.answer);

  // Update score
  if (correct && activeRoom) {
    myScore += 10;
    try {
      const members = (activeRoom.members||[]).map(m => m.uid===uid ? {...m, score:(m.score||0)+10} : m);
      await updateDoc(doc(db,'study_rooms',activeRoom.id), { members });
      // Notify chat
      await addDoc(collection(db,'study_rooms',activeRoom.id,'messages'), {
        type:'system', text:`${userName} answered correctly! (+10 pts)`, createdAt:serverTimestamp()
      });
    } catch (_) {}
  }
}
window.answerChallenge = answerChallenge;

function showChallengeResult(chosen, correct) {
  const resultEl = document.getElementById('lcResult');
  if (!resultEl) return;
  const isCorrect = chosen === correct;
  resultEl.className = 'lc-result show';
  resultEl.style.background = isCorrect ? 'rgba(16,185,129,.1)' : 'rgba(244,63,94,.07)';
  resultEl.style.color = isCorrect ? 'var(--emerald)' : 'var(--rose)';
  resultEl.innerHTML = isCorrect
    ? '✅ Correct! +10 points!'
    : `❌ Wrong. The correct answer was <strong>${'ABCD'[correct]}</strong>.`;
  // Colour the options
  document.querySelectorAll('.lc-opt').forEach((btn, i) => {
    if (i === correct) btn.classList.add('correct');
    else if (i === chosen) btn.classList.add('wrong');
  });
}

function disableOptions() {
  document.querySelectorAll('.lc-opt').forEach(btn => { btn.disabled = true; });
}

function hideChallenge() {
  const box = document.getElementById('challengeBox');
  if (box) box.style.display = 'none';
  if (challengeTimerInterval) clearInterval(challengeTimerInterval);
}

// ── Leave room ─────────────────────────────────────────────────────────────
async function leaveRoom() {
  if (!activeRoom) return;
  if (roomUnsub) roomUnsub();
  if (chatUnsub) chatUnsub();
  if (challengeTimerInterval) clearInterval(challengeTimerInterval);
  try {
    const member = (activeRoom.members||[]).find(m=>m.uid===uid);
    if (member) await updateDoc(doc(db,'study_rooms',activeRoom.id), { members:arrayRemove(member) });
    await addDoc(collection(db,'study_rooms',activeRoom.id,'messages'), {
      type:'system', text:`${userName} left the room`, createdAt:serverTimestamp()
    });
    // Delete room if empty/host left
    const snap = await getDoc(doc(db,'study_rooms',activeRoom.id));
    if (snap.exists() && (snap.data().members||[]).length === 0) {
      await deleteDoc(doc(db,'study_rooms',activeRoom.id));
    }
  } catch (_) {}
  activeRoom = null;
  document.getElementById('roomView').classList.remove('active');
  document.getElementById('lobbyView').style.display = '';
  document.getElementById('chatMessages').innerHTML = '';
}
window.leaveRoom = leaveRoom;

// ── Helpers ────────────────────────────────────────────────────────────────
function fmtAgo(ts) {
  if (!ts) return 'just now';
  try {
    const d    = ts.toDate ? ts.toDate() : new Date(ts);
    const mins = Math.floor((Date.now()-d.getTime())/60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    return Math.floor(mins/60) + 'h ago';
  } catch { return ''; }
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg, type='info') {
  const icons={success:'✓',error:'✕',info:'ℹ',warning:'⚠'};
  const el=document.getElementById('toastEl');
  el.className='toast toast-'+type;
  document.getElementById('toastIcon').textContent=icons[type]||'ℹ';
  document.getElementById('toastMsg').textContent=msg;
  void el.offsetWidth; el.classList.add('show');
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>el.classList.remove('show'),2800);
}
</script>
