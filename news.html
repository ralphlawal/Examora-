<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>News & Updates — EXAMORA</title>
<link rel="stylesheet" href="style.css"/>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet"/>
<style>
  :root { --fd:'Sora',sans-serif; --fb:'Outfit',sans-serif; }
  .news-hero {
    background: linear-gradient(140deg,#0c0e24 0%,#1a1050 55%,#0c0e24 100%);
    border-radius: 0; padding: 28px 16px 24px; margin-bottom: 20px;
    border-bottom: 1px solid rgba(91,94,244,.2); position: relative; overflow: hidden;
  }
  .news-hero::before { content:''; position:absolute; top:-60px; right:-40px; width:200px; height:200px; border-radius:50%; background:radial-gradient(circle,rgba(91,94,244,.2) 0%,transparent 70%); pointer-events:none; }
  .news-hero-label { font-size:.63rem; font-weight:700; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:6px; }
  .news-hero-title { font-family:var(--fd); font-weight:900; font-size:1.5rem; color:#fff; line-height:1.2; letter-spacing:-.5px; margin-bottom:6px; }
  .news-hero-sub { font-size:.76rem; color:rgba(255,255,255,.45); }
  .tab-bar { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:18px; overflow-x:auto; scrollbar-width:none; }
  .tab-bar::-webkit-scrollbar { display:none; }
  .tab-btn { flex-shrink:0; padding:10px 16px; font-family:var(--fd); font-size:.72rem; font-weight:700; color:var(--ink-3); border-bottom:2px solid transparent; transition:all .18s ease; cursor:pointer; white-space:nowrap; }
  .tab-btn.active { color:var(--brand); border-bottom-color:var(--brand); }
  .tab-btn:hover { color:var(--ink); }
  .news-loading { text-align:center; padding:40px 20px; color:var(--ink-3); font-size:.82rem; }
  .empty-news { text-align:center; padding:50px 20px; }
  .empty-news-icon { font-size:3rem; margin-bottom:12px; }
  .empty-news-title { font-family:var(--fd); font-weight:800; font-size:1rem; color:var(--ink); margin-bottom:6px; }
  .empty-news-sub { font-size:.78rem; color:var(--ink-3); line-height:1.6; }
  /* Article reader overlay */
  .article-overlay { display:none; position:fixed; inset:0; z-index:300; background:var(--bg); overflow-y:auto; }
  .article-overlay.open { display:block; animation:fadeIn .2s ease; }
  .article-overlay-header { position:sticky; top:0; background:var(--surface); border-bottom:1px solid var(--border); padding:14px 16px; display:flex; align-items:center; gap:12px; z-index:1; }
  .article-back { width:36px; height:36px; border-radius:11px; background:var(--surface-2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; font-size:1.1rem; transition:all .18s ease; }
  .article-back:active { transform:scale(.92); }
  .article-overlay-title { font-family:var(--fd); font-weight:800; font-size:.9rem; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .article-cover { width:100%; height:220px; object-fit:cover; display:flex; align-items:center; justify-content:center; font-size:4rem; overflow:hidden; background:linear-gradient(135deg,var(--brand-pale),var(--surface-2)); }
  .article-cover img { width:100%; height:100%; object-fit:cover; display:block; }
  .article-content { padding:20px 16px 40px; }
  .article-cat { display:inline-block; padding:3px 9px; background:var(--brand-pale); color:var(--brand); border-radius:100px; font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.4px; margin-bottom:10px; }
  .article-title { font-family:var(--fd); font-weight:900; font-size:1.45rem; color:var(--ink); line-height:1.28; margin-bottom:10px; letter-spacing:-.4px; }
  .article-meta { display:flex; align-items:center; gap:8px; font-size:.68rem; color:var(--ink-3); font-weight:600; margin-bottom:18px; flex-wrap:wrap; }
  .article-body { font-size:.91rem; color:var(--ink-2); line-height:1.88; }
  .article-body h2 { font-family:var(--fd); font-weight:800; font-size:1.08rem; color:var(--ink); margin:22px 0 9px; }
  .article-body h3 { font-family:var(--fd); font-weight:700; font-size:.94rem; color:var(--ink); margin:17px 0 7px; }
  .article-body p  { margin-bottom:14px; }
  .article-body ul,.article-body ol { padding-left:20px; margin-bottom:14px; }
  .article-body li { margin-bottom:5px; }
  .article-body strong { color:var(--ink); font-weight:700; }
  .article-body blockquote { border-left:3px solid var(--brand); padding:11px 14px; background:var(--brand-pale); border-radius:0 11px 11px 0; margin:14px 0; font-style:italic; color:var(--ink-2); overflow:hidden; }
  .share-row { display:flex; gap:9px; margin-top:24px; padding-top:20px; border-top:1px solid var(--border); }
  .share-btn { flex:1; padding:10px; border:1px solid var(--border); border-radius:11px; font-family:var(--fd); font-weight:700; font-size:.74rem; color:var(--ink-2); text-align:center; cursor:pointer; transition:all .18s ease; background:var(--surface); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .share-btn:hover { border-color:var(--brand); color:var(--brand); background:var(--brand-pale); }
  .share-btn:active { transform:scale(.97); }
  .related-label { font-family:var(--fd); font-weight:800; font-size:.88rem; color:var(--ink); margin:24px 0 12px; }
</style>
</head>
<body>
<div class="app-container">

  <div class="news-hero">
    <div class="news-hero-label">📰 EXAMORA BLOG</div>
    <div class="news-hero-title">News & Updates</div>
    <div class="news-hero-sub">Exam tips, study guides, results analysis &amp; more</div>
  </div>

  <div style="padding:0 15px;">
    <!-- Tab bar -->
    <div class="tab-bar" id="tabBar">
      <div class="tab-btn active" onclick="filterCat('All', this)">All</div>
      <div class="tab-btn" onclick="filterCat('Exam Tips', this)">Exam Tips</div>
      <div class="tab-btn" onclick="filterCat('Study Guide', this)">Study Guide</div>
      <div class="tab-btn" onclick="filterCat('Updates', this)">Updates</div>
      <div class="tab-btn" onclick="filterCat('Results', this)">Results</div>
      <div class="tab-btn" onclick="filterCat('Scholarships', this)">Scholarships</div>
    </div>

    <div id="newsFeed">
      <div class="news-loading">
        <div class="inline-spinner" style="margin:0 auto 10px;display:block;"></div>
        Loading posts…
      </div>
    </div>
  </div>

  <!-- Article Reader Overlay -->
  <div class="article-overlay" id="articleOverlay">
    <div class="article-overlay-header">
      <div class="article-back" onclick="closeArticle()">←</div>
      <div class="article-overlay-title" id="articleHeaderTitle">Article</div>
    </div>
    <div id="articleBody"></div>
  </div>
  <nav class="bottom-nav">
    <a href="index.html"      class="nav-item "><span class="nav-icon ">home</span><span class="nav-label">Home</span></a>
    <a href="exam.html"       class="nav-item "><span class="nav-icon ">edit_note</span><span class="nav-label">Exam</span></a>
    <a href="news.html"       class="nav-item active"><span class="nav-icon ms-fill">newspaper</span><span class="nav-label">News</span></a>
    <a href="leaderboard.html" class="nav-item "><span class="nav-icon ">emoji_events</span><span class="nav-label">Ranks</span></a>
    <a href="profile.html"    class="nav-item "><span class="nav-icon ">person</span><span class="nav-label">Profile</span></a>
  </nav>
</div>

<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('examora_theme') || 'dark');

var allPosts = [];
var currentCat = 'All';

function formatDate(ts) {
  if (!ts) return '';
  var d = ts.toDate ? ts.toDate() : new Date(ts);
  var now = new Date();
  var diff = (now - d) / 1000;
  if (diff < 60)   return 'Just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400)return Math.floor(diff/3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
  return d.toLocaleDateString('en-NG', {day:'numeric', month:'short', year:'numeric'});
}

function readTime(body) {
  var words = (body || '').split(/\s+/).length;
  return Math.max(1, Math.round(words / 200)) + ' min read';
}

function getCatColor(cat) {
  var map = {
    'Exam Tips':'#5b5ef4','Study Guide':'#10b981','Updates':'#f59e0b',
    'Results':'#f43f5e','Scholarships':'#8b5cf6','News':'#06b6d4'
  };
  return map[cat] || '#5b5ef4';
}

function renderFeed(posts) {
  var el = document.getElementById('newsFeed');
  if (!posts || posts.length === 0) {
    el.innerHTML = '<div class="empty-news"><div class="empty-news-icon">📭</div><div class="empty-news-title">No posts yet</div><div class="empty-news-sub">Check back soon for exam news, tips, and updates from EXAMORA.</div></div>';
    return;
  }

  var html = '';
  posts.forEach(function(p, i) {
    var cat = p.category || 'News';
    var col = getCatColor(cat);
    var thumb = p.emoji || '📰';
    var rTime = readTime(p.body);
    var date = formatDate(p.createdAt);

    if (i === 0) {
      // Featured card
      html += '<a class="news-featured" onclick="openArticle(\'' + p.id + '\')" href="javascript:void(0)">';
      if (p.imageUrl) {
        html += '<div class="news-featured-img"><img src="' + p.imageUrl + '" alt="' + escHtml(p.title) + '" onerror="this.parentNode.innerHTML=\'' + thumb + '\'" /></div>';
      } else {
        html += '<div class="news-featured-img">' + thumb + '</div>';
      }
      html += '<div class="news-featured-body">';
      html += '<span class="news-cat-pill" style="background:' + col + '22;color:' + col + ';border-color:' + col + '33;">' + escHtml(cat) + '</span>';
      html += '<div class="news-featured-title">' + escHtml(p.title) + '</div>';
      if (p.excerpt) html += '<div class="news-featured-excerpt">' + escHtml(p.excerpt) + '</div>';
      html += '<div class="news-meta"><span>' + date + '</span>';
      if (p.author) { html += '<span class="news-meta-dot"></span><span>' + escHtml(p.author) + '</span>'; }
      html += '<span class="news-meta-dot"></span><span>' + rTime + '</span></div>';
      html += '</div></a>';
    } else {
      // List card
      html += '<a class="news-card" onclick="openArticle(\'' + p.id + '\')" href="javascript:void(0)">';
      if (p.imageUrl) {
        html += '<div class="news-thumb"><img src="' + p.imageUrl + '" alt="" onerror="this.parentNode.innerHTML=\'' + thumb + '\'" /></div>';
      } else {
        html += '<div class="news-thumb">' + thumb + '</div>';
      }
      html += '<div class="news-info">';
      html += '<span class="news-cat-pill" style="background:' + col + '1a;color:' + col + ';border:none;">' + escHtml(cat) + '</span>';
      html += '<div class="news-info-title">' + escHtml(p.title) + '</div>';
      html += '<div class="news-info-meta">' + date + ' · ' + rTime + '</div>';
      html += '</div></a>';
    }
  });
  el.innerHTML = html;
}

function openArticle(id) {
  var post = allPosts.find(function(p) { return p.id === id; });
  if (!post) return;
  document.getElementById('articleHeaderTitle').textContent = post.title;
  var cat = post.category || 'News';
  var col = getCatColor(cat);
  var thumb = post.emoji || '📰';
  var rTime = readTime(post.body);
  var date = formatDate(post.createdAt);

  var html = '';
  if (post.imageUrl) {
    html += '<div class="article-cover"><img src="' + post.imageUrl + '" alt="' + escHtml(post.title) + '" onerror="this.parentNode.innerHTML=\'' + thumb + '\'" /></div>';
  } else {
    html += '<div class="article-cover" style="font-size:4rem;">' + thumb + '</div>';
  }
  html += '<div class="article-content">';
  html += '<span class="article-cat" style="background:' + col + '22;color:' + col + ';">' + escHtml(cat) + '</span>';
  html += '<div class="article-title">' + escHtml(post.title) + '</div>';
  html += '<div class="article-meta"><span>' + date + '</span>';
  if (post.author) html += '<span>·</span><span>' + escHtml(post.author) + '</span>';
  html += '<span>·</span><span>' + rTime + '</span></div>';
  html += '<div class="article-body">' + parseBody(post.body || '') + '</div>';
  html += '<div class="share-row">';
  html += '<button class="share-btn" onclick="shareArticle()">📤 Share</button>';
  html += '<button class="share-btn" onclick="copyLink()">🔗 Copy Link</button>';
  html += '</div>';

  // Related posts
  var related = allPosts.filter(function(p) { return p.id !== id && p.category === cat; }).slice(0, 3);
  if (related.length) {
    html += '<div class="related-label">More in ' + escHtml(cat) + '</div>';
    related.forEach(function(r) {
      var rThumb = r.emoji || '📰';
      html += '<a class="news-card" onclick="document.getElementById(\'articleOverlay\').scrollTop=0;openArticle(\'' + r.id + '\')" href="javascript:void(0)">';
      html += '<div class="news-thumb">' + (r.imageUrl ? '<img src="' + r.imageUrl + '" alt="" onerror="this.parentNode.innerHTML=\'' + rThumb + '\'" />' : rThumb) + '</div>';
      html += '<div class="news-info"><div class="news-info-title">' + escHtml(r.title) + '</div><div class="news-info-meta">' + formatDate(r.createdAt) + '</div></div></a>';
    });
  }
  html += '</div>';

  document.getElementById('articleBody').innerHTML = html;
  var ov = document.getElementById('articleOverlay');
  ov.classList.add('open');
  ov.scrollTop = 0;
  document.body.style.overflow = 'hidden';
  window._currentArticle = post;
}

function closeArticle() {
  document.getElementById('articleOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function shareArticle() {
  var post = window._currentArticle;
  if (!post) return;
  if (navigator.share) {
    navigator.share({ title: post.title, text: post.excerpt || post.title, url: window.location.href })
      .catch(function() {});
  } else {
    copyLink();
  }
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(function() {
    toast('Link copied!', 'success');
  }).catch(function() { toast('Could not copy', 'error'); });
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  var filtered = cat === 'All' ? allPosts : allPosts.filter(function(p) { return p.category === cat; });
  renderFeed(filtered);
}

function parseBody(body) {
  // Convert plain text with basic markdown-like formatting to HTML
  return body
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, function(m) { return '<ul>' + m + '</ul>'; })
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[hublip])(.)/m, '<p>$&')
    .replace(/([^>])$/m, '$1</p>');
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.toast = window.toast || function(msg, type) {
  var t = document.createElement('div');
  t.className = 'toast toast-' + (type || 'info') + ' show';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 2800);
};

// Close article on back button
window.addEventListener('popstate', function() {
  if (document.getElementById('articleOverlay').classList.contains('open')) {
    closeArticle();
    history.pushState(null, '', '');
  }
});
history.pushState(null, '', '');
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, query, orderBy, limit, getDocs, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyA5RUfGUA68-RNyMZPlxaVYj85h5OiJdJw",
  authDomain:"cbt-app-5907f.firebaseapp.com",
  projectId:"cbt-app-5907f",
  storageBucket:"cbt-app-5907f.firebasestorage.app",
  messagingSenderId:"705323924101",
  appId:"1:705323924101:web:ad9f153f25a0685a1287ec"
});
const auth = getAuth(app);
const db   = getFirestore(app);

onAuthStateChanged(auth, async function(user) {
  if (!user) { window.location.href = 'login.html'; return; }

  try {
    var q = query(
      collection(db, 'news_posts'),
      where('published', '==', true),
      orderBy('createdAt', 'desc'),
      limit(40)
    );
    var snap = await getDocs(q);
    allPosts = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
    renderFeed(allPosts);
  } catch(e) {
    // Try without published filter (older schema)
    try {
      var q2 = query(collection(db, 'news_posts'), orderBy('createdAt','desc'), limit(40));
      var snap2 = await getDocs(q2);
      allPosts = snap2.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
      renderFeed(allPosts);
    } catch(e2) {
      document.getElementById('newsFeed').innerHTML =
        '<div class="empty-news"><div class="empty-news-icon">📭</div><div class="empty-news-title">No posts yet</div><div class="empty-news-sub">The admin hasn\'t published any news posts yet. Check back soon!</div></div>';
    }
  }
});
</script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});</script>
</body>
</html>
