<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Focus Timer · EXAMORA</title>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0" rel="stylesheet"/>
<style>
*{box-sizing:border-box;}
.timer-hero{
  display:flex;flex-direction:column;align-items:center;
  padding:24px 20px 20px;margin-bottom:20px;
}
.session-label{
  font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:var(--ink-3,#9399c2);margin-bottom:4px;
  display:flex;align-items:center;gap:6px;
}
.phase-badge{
  padding:2px 10px;border-radius:100px;font-size:.65rem;font-weight:700;
}
.phase-focus{background:rgba(99,102,241,.12);color:var(--brand,#5b5ef4);}
.phase-short{background:rgba(16,185,129,.12);color:#10b981;}
.phase-long{background:rgba(6,182,212,.12);color:#06b6d4;}

/* SVG ring timer */
.ring-outer{position:relative;width:220px;height:220px;margin:16px 0;}
.ring-svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--border,#e2e5f1);stroke-width:10;}
.ring-fg{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .8s linear;}
.ring-center{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;
}
.timer-digits{
  font-family:'Sora',sans-serif;font-weight:900;font-size:3rem;
  color:var(--ink,#0d1030);line-height:1;
  letter-spacing:-2px;
}
.timer-phase{
  font-size:.72rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.6px;color:var(--ink-3,#9399c2);margin-top:4px;
}
.timer-controls{display:flex;align-items:center;gap:12px;margin-top:6px;}
.ctrl-btn{
  width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .18s;
}
.ctrl-btn .material-symbols-rounded{font-size:1.4rem;}
.btn-main{
  width:64px;height:64px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;
  box-shadow:0 6px 20px rgba(99,102,241,.4);
}
.btn-main:hover{transform:scale(1.07);box-shadow:0 8px 26px rgba(99,102,241,.5);}
.btn-main:active{transform:scale(.93);}
.btn-secondary{background:var(--surface,#fff);border:1.5px solid var(--border,#e2e5f1);color:var(--ink-2,#454c7a);}
.btn-secondary:hover{background:var(--surface-2,#eef0fa);}

/* Preset tabs */
.preset-tabs{
  display:flex;gap:8px;overflow-x:auto;padding:0 16px 4px;
  margin-bottom:16px;scrollbar-width:none;
}
.preset-tabs::-webkit-scrollbar{display:none;}
.preset-tab{
  flex-shrink:0;background:var(--surface,#fff);
  border:1.5px solid var(--border,#e2e5f1);border-radius:12px;
  padding:10px 14px;cursor:pointer;text-align:center;transition:all .15s;
}
.preset-tab.active{background:var(--brand-pale,rgba(91,94,244,.1));border-color:var(--brand,#5b5ef4);}
.preset-tab .pt-name{font-family:'Sora',sans-serif;font-weight:700;font-size:.78rem;color:var(--ink,#0d1030);}
.preset-tab .pt-desc{font-size:.63rem;color:var(--ink-3,#9399c2);margin-top:2px;}

/* Subject picker */
.subject-row{
  display:flex;gap:8px;overflow-x:auto;padding:0 16px 4px;
  margin-bottom:16px;scrollbar-width:none;
}
.subject-row::-webkit-scrollbar{display:none;}
.subj-chip{
  flex-shrink:0;padding:7px 14px;border-radius:100px;
  border:1.5px solid var(--border,#e2e5f1);background:var(--surface,#fff);
  font-size:.74rem;font-weight:600;cursor:pointer;transition:all .15s;color:var(--ink-2,#454c7a);
}
.subj-chip.active{background:var(--brand,#5b5ef4);border-color:var(--brand,#5b5ef4);color:#fff;}

/* Session log */
.session-log{padding:0 16px;margin-bottom:80px;}
.log-item{
  background:var(--surface,#fff);border:1px solid var(--border,#e2e5f1);
  border-radius:12px;padding:12px 14px;margin-bottom:8px;
  display:flex;align-items:center;gap:12px;
}
.log-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
}
.log-text{flex:1;}
.log-title{font-size:.82rem;font-weight:600;color:var(--ink,#0d1030);}
.log-sub{font-size:.68rem;color:var(--ink-3,#9399c2);}
.log-time{font-family:'Sora',sans-serif;font-weight:800;font-size:.82rem;color:var(--brand,#5b5ef4);}

/* Stats bar */
.stats-mini{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  padding:0 16px;margin-bottom:20px;
}
.stat-mini-card{
  background:var(--surface,#fff);border:1px solid var(--border,#e2e5f1);
  border-radius:12px;padding:12px;text-align:center;
}
.stat-mini-val{font-family:'Sora',sans-serif;font-weight:900;font-size:1.2rem;color:var(--ink,#0d1030);}
.stat-mini-lbl{font-size:.62rem;color:var(--ink-3,#9399c2);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}
</style>
</head>
<body>
<div class="app-header">
  <a href="index.html" class="back-btn"><span class="material-symbols-rounded">arrow_back</span></a>
  <div class="header-title">Focus Timer</div>
  <a href="chat.html?q=Give+me+a+study+motivation+tip" style="color:var(--brand,#5b5ef4);font-size:.75rem;font-weight:700;text-decoration:none;padding:6px 10px;background:var(--brand-pale,rgba(91,94,244,.1));border-radius:8px;">Ask Nova</a>
</div>

<div style="padding-top:68px;">

  <!-- Today's stats -->
  <div class="stats-mini">
    <div class="stat-mini-card">
      <div class="stat-mini-val" id="statSessions">0</div>
      <div class="stat-mini-lbl">Sessions</div>
    </div>
    <div class="stat-mini-card">
      <div class="stat-mini-val" id="statFocus">0m</div>
      <div class="stat-mini-lbl">Focus Time</div>
    </div>
    <div class="stat-mini-card">
      <div class="stat-mini-val" id="statGoal">–</div>
      <div class="stat-mini-lbl">Daily Goal</div>
    </div>
  </div>

  <!-- Preset tabs -->
  <div class="preset-tabs" id="presetTabs"></div>

  <!-- Subject picker -->
  <div class="subject-row" id="subjRow"></div>

  <!-- Timer ring -->
  <div class="timer-hero">
    <div class="session-label">
      <span id="sessionNum">Session 1 of 4</span>
      <span class="phase-badge phase-focus" id="phaseBadge">Focus</span>
    </div>
    <div class="ring-outer">
      <svg class="ring-svg" width="220" height="220" viewBox="0 0 220 220">
        <defs>
          <linearGradient id="tGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6366f1"/>
            <stop offset="100%" style="stop-color:#8b5cf6"/>
          </linearGradient>
          <linearGradient id="tGradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#10b981"/>
            <stop offset="100%" style="stop-color:#06b6d4"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="110" cy="110" r="95"/>
        <circle class="ring-fg" id="timerRing" cx="110" cy="110" r="95"
          stroke="url(#tGrad)" stroke-dasharray="597" stroke-dashoffset="0"/>
      </svg>
      <div class="ring-center">
        <div class="timer-digits" id="timerDisplay">25:00</div>
        <div class="timer-phase" id="timerPhaseLabel">Focus</div>
      </div>
    </div>
    <div class="timer-controls">
      <button class="ctrl-btn btn-secondary" onclick="resetTimer()" title="Reset">
        <span class="material-symbols-rounded">restart_alt</span>
      </button>
      <button class="ctrl-btn btn-main" id="playPauseBtn" onclick="toggleTimer()">
        <span class="material-symbols-rounded">play_arrow</span>
      </button>
      <button class="ctrl-btn btn-secondary" onclick="skipPhase()" title="Skip">
        <span class="material-symbols-rounded">skip_next</span>
      </button>
    </div>
  </div>

  <!-- Session log -->
  <div style="padding:0 16px;margin-bottom:12px;">
    <div style="font-family:'Sora',sans-serif;font-weight:800;font-size:.92rem;color:var(--ink,#0d1030);display:flex;align-items:center;gap:6px;margin-bottom:10px;">
      <span class="material-symbols-rounded" style="color:var(--brand,#5b5ef4)">history</span>
      Today's Sessions
    </div>
  </div>
  <div class="session-log" id="sessionLog">
    <div style="text-align:center;padding:20px;color:var(--ink-3,#9399c2);font-size:.8rem;">No sessions yet today — start your first focus session! 🎯</div>
  </div>

</div>

<nav class="bottom-nav">
  <a href="index.html"       class="nav-item"><span class="nav-icon material-symbols-rounded">home</span><span class="nav-label">Home</span></a>
  <a href="exam.html"        class="nav-item"><span class="nav-icon material-symbols-rounded">edit_note</span><span class="nav-label">Exam</span></a>
  <a href="daily-brief.html" class="nav-item active"><span class="nav-icon material-symbols-rounded">wb_sunny</span><span class="nav-label">Brief</span></a>
  <a href="nova.html"        class="nav-item"><span class="nav-icon material-symbols-rounded">auto_awesome</span><span class="nav-label">Nova</span></a>
  <a href="profile.html"     class="nav-item"><span class="nav-icon material-symbols-rounded">person</span><span class="nav-label">Profile</span></a>
</nav>

<script>
(function(){var t=localStorage.getItem('examora_theme')||'light';document.documentElement.setAttribute('data-theme',t);})();

var _level = localStorage.getItem('examora_user_level')||'secondary';

// ── Presets ───────────────────────────────────────────────────
var PRESETS = [
  {name:'Pomodoro',     desc:'Classic 25/5',      focus:25,shortBreak:5, longBreak:15,sessions:4},
  {name:'Short Burst',  desc:'Quick 15/3',         focus:15,shortBreak:3, longBreak:10,sessions:4},
  {name:'Deep Work',    desc:'90 min flow',        focus:90,shortBreak:20,longBreak:30,sessions:2},
  {name:'Primary',      desc:'Kid-friendly 10/5',  focus:10,shortBreak:5, longBreak:10,sessions:3},
  {name:'Marathon',     desc:'Exam crunch 50/10',  focus:50,shortBreak:10,longBreak:20,sessions:4},
];
var _preset = _level==='primary'?3:0;

var SUBJECTS=['Maths','English','Biology','Chemistry','Physics','Economics','Government','Literature','History','Geography','Commerce','CRK/IRK','Agric','Coding'];

// ── Timer state ────────────────────────────────────────────────
var _phase='focus'; // focus | short | long
var _session=1;
var _running=false;
var _interval=null;
var _secondsLeft=0;
var _totalSeconds=0;
var _subject=SUBJECTS[0];
var LOG_KEY='examora_timer_log_'+new Date().toDateString();
var STATS_KEY='examora_timer_stats_'+new Date().toDateString();

function getStats(){return JSON.parse(localStorage.getItem(STATS_KEY)||'{"sessions":0,"focusMin":0}');}
function saveStats(s){localStorage.setItem(STATS_KEY,JSON.stringify(s));}
function getLog(){return JSON.parse(localStorage.getItem(LOG_KEY)||'[]');}
function saveLog(l){localStorage.setItem(LOG_KEY,JSON.stringify(l));}

function getPreset(){return PRESETS[_preset];}

function initTimer(){
  var p=getPreset();
  var mins=_phase==='focus'?p.focus:_phase==='short'?p.shortBreak:p.longBreak;
  _secondsLeft=mins*60;
  _totalSeconds=mins*60;
  updateDisplay();
  updateRing();
}

function updateDisplay(){
  var m=Math.floor(_secondsLeft/60),s=_secondsLeft%60;
  document.getElementById('timerDisplay').textContent=pad(m)+':'+pad(s);
  var phaseLabels={focus:'Focus',short:'Short Break',long:'Long Break'};
  document.getElementById('timerPhaseLabel').textContent=phaseLabels[_phase];
  document.getElementById('sessionNum').textContent='Session '+_session+' of '+getPreset().sessions;
  // Phase badge
  var badge=document.getElementById('phaseBadge');
  badge.textContent=phaseLabels[_phase];
  badge.className='phase-badge '+(_phase==='focus'?'phase-focus':_phase==='short'?'phase-short':'phase-long');
  // Title bar
  document.title=pad(m)+':'+pad(s)+' '+(_phase==='focus'?'🎯':'☕')+' EXAMORA Timer';
}

function updateRing(){
  var circumference=597;
  var offset=circumference-(circumference*(_secondsLeft/_totalSeconds));
  var ring=document.getElementById('timerRing');
  ring.style.strokeDashoffset=offset;
  ring.setAttribute('stroke',_phase==='focus'?'url(#tGrad)':'url(#tGradGreen)');
}

function pad(n){return n<10?'0'+n:n;}

function toggleTimer(){
  _running=!_running;
  var icon=document.getElementById('playPauseBtn').querySelector('.material-symbols-rounded');
  icon.textContent=_running?'pause':'play_arrow';
  if(_running){
    _interval=setInterval(tick,1000);
    // Request wake lock if available
    if('wakeLock' in navigator){
      navigator.wakeLock.request('screen').catch(()=>{});
    }
  } else {
    clearInterval(_interval);
  }
}

function tick(){
  if(_secondsLeft<=0){onPhaseEnd();return;}
  _secondsLeft--;
  updateDisplay();
  updateRing();
}

function onPhaseEnd(){
  clearInterval(_interval);_running=false;
  document.getElementById('playPauseBtn').querySelector('.material-symbols-rounded').textContent='play_arrow';
  // Sound notification
  beep();
  // Native notification
  if(Notification.permission==='granted'){
    var p=getPreset();
    var msgs={focus:'Focus session complete! 🎉 Take a break.',short:'Break over! Back to work 💪',long:'Long break done! Ready for more? 🔥'};
    new Notification('EXAMORA Timer',{body:msgs[_phase],icon:'/logo.png'});
  }
  // Log completed focus sessions
  if(_phase==='focus'){
    var stats=getStats();stats.sessions++;stats.focusMin+=getPreset().focus;saveStats(stats);
    var log=getLog();
    log.unshift({subject:_subject,mins:getPreset().focus,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),session:_session});
    saveLog(log.slice(0,20));
    updateStats();renderLog();
  }
  // Advance phase
  var p=getPreset();
  if(_phase==='focus'){
    if(_session>=p.sessions){_phase='long';_session=1;}
    else{_phase='short';}
  } else if(_phase==='short'){
    _phase='focus';_session=Math.min(_session+1,p.sessions);
  } else {
    _phase='focus';_session=1;
  }
  initTimer();
  document.title='EXAMORA Timer ✅';
}

function skipPhase(){
  clearInterval(_interval);_running=false;
  document.getElementById('playPauseBtn').querySelector('.material-symbols-rounded').textContent='play_arrow';
  onPhaseEnd();
}

function resetTimer(){
  clearInterval(_interval);_running=false;_phase='focus';_session=1;
  document.getElementById('playPauseBtn').querySelector('.material-symbols-rounded').textContent='play_arrow';
  initTimer();
  document.title='EXAMORA Timer';
}

// ── Beep notification ─────────────────────────────────────────
function beep(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var osc=ctx.createOscillator();var gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.value=_phase==='focus'?523:392;
    osc.type='sine';gain.gain.setValueAtTime(0.4,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.8);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.8);
  }catch(e){}
}

// ── Stats ─────────────────────────────────────────────────────
function updateStats(){
  var s=getStats();
  document.getElementById('statSessions').textContent=s.sessions;
  document.getElementById('statFocus').textContent=s.focusMin+'m';
  var goal=parseInt(localStorage.getItem('examora_study_goal_min')||'120',10);
  var pct=Math.min(100,Math.round(s.focusMin/goal*100));
  document.getElementById('statGoal').textContent=pct+'%';
}

// ── Session log ───────────────────────────────────────────────
function renderLog(){
  var log=getLog();var el=document.getElementById('sessionLog');
  if(!log.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--ink-3,#9399c2);font-size:.8rem;">No sessions yet today — start your first focus session! 🎯</div>';return;}
  var colors=['#6366f1','#8b5cf6','#06b6d4','#10b981','#f59e0b'];
  el.innerHTML=log.map(function(l,i){return '<div class="log-item"><div class="log-dot" style="background:'+colors[i%colors.length]+';"></div><div class="log-text"><div class="log-title">'+l.subject+'</div><div class="log-sub">Session '+l.session+' · '+l.time+'</div></div><div class="log-time">'+l.mins+'m</div></div>';}).join('');
}

// ── Build UI ──────────────────────────────────────────────────
function buildPresets(){
  var tabs=document.getElementById('presetTabs');
  PRESETS.forEach(function(p,i){
    var tab=document.createElement('div');tab.className='preset-tab'+(i===_preset?' active':'');
    tab.innerHTML='<div class="pt-name">'+p.name+'</div><div class="pt-desc">'+p.desc+'</div>';
    tab.onclick=function(){
      _preset=i;document.querySelectorAll('.preset-tab').forEach(function(t,j){t.className='preset-tab'+(j===i?' active':'');});
      resetTimer();
    };
    tabs.appendChild(tab);
  });
}

function buildSubjects(){
  var row=document.getElementById('subjRow');
  SUBJECTS.forEach(function(s){
    var chip=document.createElement('div');chip.className='subj-chip'+(s===_subject?' active':'');
    chip.textContent=s;
    chip.onclick=function(){
      _subject=s;document.querySelectorAll('.subj-chip').forEach(function(c){c.className='subj-chip';});chip.className='subj-chip active';
    };
    row.appendChild(chip);
  });
}

// ── Request notification permission ───────────────────────────
if(Notification&&Notification.permission==='default'){
  Notification.requestPermission();
}

buildPresets();buildSubjects();initTimer();updateStats();renderLog();
</script>
