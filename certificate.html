<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Certificate — EXAMORA</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0" rel="stylesheet"/>
<style>
* { box-sizing: border-box; max-width: 100%; min-width: 0; }
p,span,div,h1,h2,h3,h4,h5,h6,a,li,label,button { overflow-wrap: break-word; word-wrap: break-word; }

.cert-picker { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
.cert-type-btn {
  flex:1; min-width:140px; padding:14px 12px; border-radius:var(--r-md);
  border:1.5px solid var(--border); background:var(--surface);
  cursor:pointer; text-align:center; transition:all .18s ease;
}
.cert-type-btn .ct-icon { font-size:1.6rem; margin-bottom:6px; }
.cert-type-btn .ct-name { font-family:var(--fd); font-weight:800; font-size:.82rem; color:var(--ink); }
.cert-type-btn .ct-desc { font-size:.68rem; color:var(--ink-3); margin-top:3px; font-family:var(--fb); }
.cert-type-btn.on { border-color:var(--brand); background:var(--brand-pale); }
.cert-type-btn.on .ct-name { color:var(--brand); }

.cert-canvas-wrap {
  background:var(--surface-2); border:1px solid var(--border);
  border-radius:var(--r-lg); overflow:hidden; margin-bottom:16px;
  display:flex; justify-content:center; align-items:center;
  padding:16px; min-height:220px;
}
#certCanvas { max-width:100%; border-radius:10px; box-shadow:0 8px 32px rgba(0,0,0,.18); display:block; }

.cert-actions { display:flex; gap:10px; }
.share-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:12px; }
.share-btn {
  display:flex; align-items:center; gap:10px; padding:12px 14px;
  border-radius:var(--r-md); border:1.5px solid var(--border);
  background:var(--surface); cursor:pointer; transition:all .18s ease;
  font-family:var(--fb); font-size:.82rem; font-weight:600; color:var(--ink-2);
}
.share-btn:hover { border-color:var(--brand); color:var(--brand); background:var(--brand-pale); }
.share-btn .sb-icon { font-size:1.3rem; flex-shrink:0; }

.score-ring-wrap { display:flex; justify-content:center; margin-bottom:14px; }
.score-summary {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:18px;
}
.ss-item { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md); padding:14px 10px; text-align:center; }
.ss-val { font-family:var(--fd); font-weight:900; font-size:1.4rem; color:var(--brand); letter-spacing:-1px; }
.ss-lbl { font-size:.66rem; color:var(--ink-3); text-transform:uppercase; letter-spacing:.8px; margin-top:3px; font-family:var(--fb); }

.recent-list { margin-bottom:6px; }
.rl-item {
  display:flex; align-items:center; gap:12px; padding:12px 14px;
  background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md);
  margin-bottom:8px; cursor:pointer; transition:all .18s ease;
}
.rl-item:hover { border-color:var(--brand); }
.rl-item .rl-score { font-family:var(--fd); font-weight:900; font-size:1.1rem; flex-shrink:0; width:52px; text-align:center; }
.rl-item .rl-info { flex:1; min-width:0; }
.rl-item .rl-title { font-family:var(--fd); font-weight:700; font-size:.82rem; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rl-item .rl-meta  { font-size:.68rem; color:var(--ink-3); margin-top:2px; }
.rl-item .rl-arrow { color:var(--ink-3); font-size:1rem; flex-shrink:0; }

.empty-certs { text-align:center; padding:40px 20px; color:var(--ink-3); }
.empty-certs .ec-icon { font-size:2.5rem; margin-bottom:12px; }
.empty-certs .ec-text { font-family:var(--fd); font-weight:700; font-size:.9rem; color:var(--ink-2); }
.empty-certs .ec-sub  { font-size:.78rem; margin-top:6px; }

/* Grade colours */
.grade-A { color: #10b981; }
.grade-B { color: #5b5ef4; }
.grade-C { color: #f59e0b; }
.grade-F { color: #f43f5e; }
</style>
</head>
<body>

<header class="app-header">
  <a class="app-logo" href="index.html" style="text-decoration:none;display:flex;align-items:center;gap:9px;">
    <img class="app-logo-img" src="logo.png" alt="EXAMORA" style="width:34px;height:34px;border-radius:10px;object-fit:contain;display:block;"
      onerror="(function(i){i.style.display='none';var p=i.parentElement;var f=p&&p.querySelector('.app-logo-icon');if(f)f.style.display='flex';})(this)"/>
    <div class="app-logo-icon" style="display:none;">EX</div>
    <div><div class="app-logo-name">EXAMORA</div></div>
  </a>
  <div class="header-actions">
    <button class="header-btn" id="themeBtn" title="Toggle theme">
      <span class="material-symbols-rounded">light_mode</span>
    </button>
  </div>
</header>

<div class="page-wrapper">

  <!-- Score summary cards -->
  <div class="score-summary" id="scoreSummary">
    <div class="ss-item"><div class="ss-val" id="ssTotal">—</div><div class="ss-lbl">Exams Done</div></div>
    <div class="ss-item"><div class="ss-val" id="ssAvg" style="color:var(--emerald);">—</div><div class="ss-lbl">Avg Score</div></div>
    <div class="ss-item"><div class="ss-val" id="ssBest" style="color:var(--amber);">—</div><div class="ss-lbl">Best Score</div></div>
  </div>

  <!-- Recent exams to generate cert for -->
  <div class="sec-label">Choose an Exam</div>
  <div id="recentList" class="recent-list">
    <div class="skeleton skeleton-card" style="margin-bottom:8px;"></div>
    <div class="skeleton skeleton-card" style="margin-bottom:8px;"></div>
    <div class="skeleton skeleton-card"></div>
  </div>

  <!-- Certificate generator (shown after picking exam) -->
  <div id="certSection" style="display:none;">
    <div class="sec-label" style="margin-top:20px;">Certificate Style</div>
    <div class="cert-picker">
      <div class="cert-type-btn on" id="styleAchieve" onclick="selectStyle('achievement')">
        <div class="ct-icon">🏆</div>
        <div class="ct-name">Achievement</div>
        <div class="ct-desc">Classic gold seal</div>
      </div>
      <div class="cert-type-btn" id="styleExcellence" onclick="selectStyle('excellence')">
        <div class="ct-icon">⭐</div>
        <div class="ct-name">Excellence</div>
        <div class="ct-desc">Modern dark</div>
      </div>
      <div class="cert-type-btn" id="styleMinimal" onclick="selectStyle('minimal')">
        <div class="ct-icon">✦</div>
        <div class="ct-name">Minimal</div>
        <div class="ct-desc">Clean & sharp</div>
      </div>
    </div>

    <div class="cert-canvas-wrap">
      <canvas id="certCanvas" width="900" height="636"></canvas>
    </div>

    <div class="cert-actions">
      <button class="btn btn-primary" onclick="downloadCert()" style="flex:2;">
        <span class="material-symbols-rounded ms-sm">download</span> Download
      </button>
      <button class="btn btn-ghost" onclick="shareCert()" style="flex:1;">
        <span class="material-symbols-rounded ms-sm">share</span> Share
      </button>
    </div>

    <div class="share-grid">
      <div class="share-btn" onclick="copyShareText()">
        <span class="sb-icon">📋</span> Copy Caption
      </div>
      <div class="share-btn" onclick="shareWhatsApp()">
        <span class="sb-icon">💬</span> WhatsApp
      </div>
      <div class="share-btn" onclick="shareTwitter()">
        <span class="sb-icon">🐦</span> X / Twitter
      </div>
      <div class="share-btn" onclick="shareInstagram()">
        <span class="sb-icon">📸</span> Instagram Tips
      </div>
    </div>
  </div>

</div>

<nav class="bottom-nav">
  <a href="index.html"       class="nav-item"><span class="nav-icon">home</span><span class="nav-label">Home</span></a>
  <a href="exam.html"        class="nav-item"><span class="nav-icon">edit_note</span><span class="nav-label">Exam</span></a>
  <a href="news.html"        class="nav-item"><span class="nav-icon">newspaper</span><span class="nav-label">News</span></a>
  <a href="leaderboard.html" class="nav-item"><span class="nav-icon">emoji_events</span><span class="nav-label">Ranks</span></a>
  <a href="profile.html"     class="nav-item"><span class="nav-icon">person</span><span class="nav-label">Profile</span></a>
</nav>

<div id="toastEl" class="toast"><span class="toast-icon" id="toastIcon">✓</span><span id="toastMsg">Done</span></div>

<script type="module">
import { initializeApp }       from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, query, where, orderBy, limit, getDocs }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── Init ──────────────────────────────────────────────────────────────────
const app  = initializeApp({
  apiKey:'AIzaSyA5RUfGUA68-RNyMZPlxaVYj85h5OiJdJw',
  authDomain:'cbt-app-5907f.firebaseapp.com',
  projectId:'cbt-app-5907f',
  storageBucket:'cbt-app-5907f.firebasestorage.app',
  messagingSenderId:'705323924101',
  appId:'1:705323924101:web:ad9f153f25a0685a1287ec'
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ── State ─────────────────────────────────────────────────────────────────
let uid          = null;
let userName     = 'Student';
let selectedExam = null;
let certStyle    = 'achievement';
let allResults   = [];

// ── Theme ─────────────────────────────────────────────────────────────────
const _t = localStorage.getItem('examora_theme') || 'light';
document.documentElement.setAttribute('data-theme', _t);
const themeBtn = document.getElementById('themeBtn');
if (themeBtn) {
  themeBtn.querySelector('span').textContent = _t === 'dark' ? 'light_mode' : 'dark_mode';
  themeBtn.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const nxt = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', nxt);
    localStorage.setItem('examora_theme', nxt);
    themeBtn.querySelector('span').textContent = nxt === 'dark' ? 'light_mode' : 'dark_mode';
  });
}

// ── Auth guard ────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = 'login.html'; return; }
  uid      = user.uid;
  userName = user.displayName || localStorage.getItem('examora_user_display') || user.email.split('@')[0];
  await loadResults();
});

// ── Load exam results ─────────────────────────────────────────────────────
async function loadResults() {
  const el = document.getElementById('recentList');
  try {
    const q    = query(collection(db,'results'), where('userId','==',uid), orderBy('completedAt','desc'), limit(20));
    const snap = await getDocs(q);
    allResults = snap.docs.map(d => ({ id:d.id, ...d.data() }));

    // Fallback: try 'exam_results' collection name
    if (allResults.length === 0) {
      const q2    = query(collection(db,'exam_results'), where('userId','==',uid), orderBy('completedAt','desc'), limit(20));
      const snap2 = await getDocs(q2);
      allResults  = snap2.docs.map(d => ({ id:d.id, ...d.data() }));
    }

    // Also check localStorage for recent results
    const localRes = localStorage.getItem('examora_last_result');
    if (localRes && allResults.length === 0) {
      try {
        const r = JSON.parse(localRes);
        if (r && r.score !== undefined) {
          allResults = [{ id:'local', ...r, completedAt: { toDate:()=>new Date(r.date||Date.now()) } }];
        }
      } catch (_) {}
    }

    if (allResults.length === 0) {
      el.innerHTML = `
        <div class="empty-certs">
          <div class="ec-icon">📋</div>
          <div class="ec-text">No completed exams yet</div>
          <div class="ec-sub">Complete a practice exam to earn your first certificate</div>
          <a href="exam.html" class="btn btn-primary" style="margin-top:16px;display:inline-flex;">Start an Exam</a>
        </div>`;
      return;
    }

    renderSummary(allResults);
    renderList(allResults);

    // Auto-select latest
    pickExam(allResults[0]);

  } catch (err) {
    el.innerHTML = `<div class="alert alert-error show">Could not load results: ${err.message}</div>`;
  }
}

function renderSummary(results) {
  const total  = results.length;
  const scores = results.map(r => getScore(r));
  const avg    = total ? Math.round(scores.reduce((a,b)=>a+b,0)/total) : 0;
  const best   = total ? Math.max(...scores) : 0;
  const el = (id,val) => { const e = document.getElementById(id); if(e) e.textContent = val; };
  el('ssTotal', total);
  el('ssAvg',   avg + '%');
  el('ssBest',  best + '%');
}

function renderList(results) {
  const el = document.getElementById('recentList');
  el.innerHTML = results.slice(0,10).map((r,i) => {
    const score = getScore(r);
    const grade = getGrade(score);
    const color = score>=70?'var(--emerald)':score>=50?'var(--brand)':score>=40?'var(--amber)':'var(--rose)';
    const date  = fmtDate(r.completedAt);
    const subj  = r.subject || r.category || r.examType || 'Practice Exam';
    return `
      <div class="rl-item" onclick="pickExam(window._results[${i}])">
        <div class="rl-score" style="color:${color}">${score}%</div>
        <div class="rl-info">
          <div class="rl-title">${esc(subj)}</div>
          <div class="rl-meta">${r.totalQuestions||r.total||10} questions · ${date} · Grade ${grade}</div>
        </div>
        <span class="material-symbols-rounded rl-arrow">chevron_right</span>
      </div>`;
  }).join('');
  window._results = results;
}

// ── Pick exam and render cert ─────────────────────────────────────────────
function pickExam(exam) {
  selectedExam = exam;
  document.getElementById('certSection').style.display = '';
  // Highlight selected
  document.querySelectorAll('.rl-item').forEach((el,i) => {
    el.style.borderColor = (window._results[i] && window._results[i].id === exam.id)
      ? 'var(--brand)' : 'var(--border)';
    el.style.background  = (window._results[i] && window._results[i].id === exam.id)
      ? 'var(--brand-pale)' : '';
  });
  renderCertificate();
  document.getElementById('certSection').scrollIntoView({ behavior:'smooth', block:'start' });
}
window.pickExam = pickExam;

// ── Style selector ────────────────────────────────────────────────────────
function selectStyle(style) {
  certStyle = style;
  ['achieve','excellence','minimal'].forEach(s => {
    const map = { achieve:'styleAchieve', excellence:'styleExcellence', minimal:'styleMinimal' };
    document.getElementById(map[s]).classList.remove('on');
  });
  const idMap = { achievement:'styleAchieve', excellence:'styleExcellence', minimal:'styleMinimal' };
  document.getElementById(idMap[style]).classList.add('on');
  renderCertificate();
}
window.selectStyle = selectStyle;

// ── Certificate renderer ──────────────────────────────────────────────────
function renderCertificate() {
  if (!selectedExam) return;
  const canvas = document.getElementById('certCanvas');
  const ctx    = canvas.getContext('2d');
  const W = 900, H = 636;
  canvas.width  = W;
  canvas.height = H;
  ctx.clearRect(0,0,W,H);

  const score  = getScore(selectedExam);
  const grade  = getGrade(score);
  const subj   = selectedExam.subject || selectedExam.category || selectedExam.examType || 'Practice Exam';
  const date   = fmtDateFull(selectedExam.completedAt);
  const correct   = selectedExam.correct   || selectedExam.score || Math.round(score/100*(selectedExam.totalQuestions||10));
  const total     = selectedExam.totalQuestions || selectedExam.total || 10;

  if (certStyle === 'achievement') drawAchievement(ctx, W, H, userName, subj, score, grade, date, correct, total);
  else if (certStyle === 'excellence') drawExcellence(ctx, W, H, userName, subj, score, grade, date, correct, total);
  else drawMinimal(ctx, W, H, userName, subj, score, grade, date, correct, total);
}

// ── Style 1: Achievement (Gold) ───────────────────────────────────────────
function drawAchievement(ctx, W, H, name, subj, score, grade, date, correct, total) {
  // Background
  ctx.fillStyle = '#0f0e17';
  ctx.fillRect(0,0,W,H);

  // Gold border frame
  const bw = 18;
  const grad1 = ctx.createLinearGradient(0,0,W,H);
  grad1.addColorStop(0,'#f59e0b'); grad1.addColorStop(.5,'#fbbf24'); grad1.addColorStop(1,'#d97706');
  ctx.strokeStyle = grad1; ctx.lineWidth = bw;
  ctx.strokeRect(bw/2,bw/2,W-bw,H-bw);

  // Inner border
  ctx.strokeStyle = 'rgba(251,191,36,.3)'; ctx.lineWidth = 1;
  ctx.strokeRect(36,36,W-72,H-72);

  // Corner ornaments
  [[[40,40],[80,40],[40,80]], [[W-40,40],[W-80,40],[W-40,80]],
   [[40,H-40],[80,H-40],[40,H-80]], [[W-40,H-40],[W-80,H-40],[W-40,H-80]]].forEach(pts => {
    ctx.beginPath(); ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 2.5;
    ctx.moveTo(pts[0][0],pts[0][1]); ctx.lineTo(pts[1][0],pts[1][1]);
    ctx.moveTo(pts[0][0],pts[0][1]); ctx.lineTo(pts[2][0],pts[2][1]);
    ctx.stroke();
  });

  // Background glow
  const radGrad = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,320);
  radGrad.addColorStop(0,'rgba(251,191,36,.08)'); radGrad.addColorStop(1,'transparent');
  ctx.fillStyle = radGrad; ctx.fillRect(0,0,W,H);

  // EXAMORA label
  ctx.fillStyle = '#fbbf24'; ctx.font = 'bold 13px "Sora",sans-serif';
  ctx.textAlign = 'center'; ctx.letterSpacing = '4px';
  ctx.fillText('✦  E X A M O R A  ✦', W/2, 90);

  // Certificate of Achievement
  ctx.fillStyle = 'rgba(255,255,255,.7)'; ctx.font = '15px "Outfit",sans-serif';
  ctx.letterSpacing = '2px';
  ctx.fillText('CERTIFICATE OF ACHIEVEMENT', W/2, 130);

  // Divider
  ctx.beginPath();
  const dg = ctx.createLinearGradient(160,0,W-160,0);
  dg.addColorStop(0,'transparent'); dg.addColorStop(.5,'#fbbf24'); dg.addColorStop(1,'transparent');
  ctx.strokeStyle = dg; ctx.lineWidth = 1; ctx.letterSpacing = '0px';
  ctx.moveTo(160,148); ctx.lineTo(W-160,148); ctx.stroke();

  // "This certifies that"
  ctx.fillStyle = 'rgba(255,255,255,.45)'; ctx.font = '14px "Outfit",sans-serif';
  ctx.fillText('This certifies that', W/2, 185);

  // Name
  ctx.fillStyle = '#ffffff'; ctx.font = 'bold 42px "Sora",sans-serif';
  ctx.fillText(name, W/2, 240);

  // "has successfully completed"
  ctx.fillStyle = 'rgba(255,255,255,.45)'; ctx.font = '14px "Outfit",sans-serif';
  ctx.fillText('has successfully completed', W/2, 275);

  // Subject
  ctx.fillStyle = '#fbbf24'; ctx.font = 'bold 22px "Sora",sans-serif';
  ctx.fillText(subj, W/2, 316);

  // Score badge
  const sx = W/2 - 130, sy = 345;
  ctx.fillStyle = 'rgba(251,191,36,.15)';
  roundRect(ctx, sx, sy, 260, 72, 14);
  ctx.fill();
  ctx.strokeStyle = 'rgba(251,191,36,.4)'; ctx.lineWidth = 1.5;
  roundRect(ctx, sx, sy, 260, 72, 14);
  ctx.stroke();

  const scoreColor = score>=70?'#10b981':score>=50?'#818cf8':'#f59e0b';
  ctx.fillStyle = scoreColor; ctx.font = 'bold 38px "Sora",sans-serif';
  ctx.fillText(score + '%', W/2 - 40, sy+48);
  ctx.fillStyle = '#fbbf24'; ctx.font = 'bold 28px "Sora",sans-serif';
  ctx.fillText('Grade ' + grade, W/2 + 55, sy+48);

  ctx.fillStyle = 'rgba(255,255,255,.35)'; ctx.font = '12px "Outfit",sans-serif';
  ctx.fillText(correct + ' / ' + total + ' correct', W/2, sy+68);

  // Bottom row
  ctx.fillStyle = 'rgba(255,255,255,.3)'; ctx.font = '12px "Outfit",sans-serif';
  ctx.textAlign = 'left';  ctx.fillText('Date: ' + date, 72, H-62);
  ctx.textAlign = 'right'; ctx.fillText('examora.app', W-72, H-62);
  ctx.textAlign = 'center'; ctx.fillStyle='rgba(255,255,255,.15)';
  ctx.fillText('Powered by EXAMORA · AI-Driven Exam Preparation', W/2, H-62);
}

// ── Style 2: Excellence (Dark Indigo) ─────────────────────────────────────
function drawExcellence(ctx, W, H, name, subj, score, grade, date, correct, total) {
  // BG gradient
  const bg = ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#05060f'); bg.addColorStop(1,'#0d0c1e');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  // Top accent bar
  const topGrad = ctx.createLinearGradient(0,0,W,0);
  topGrad.addColorStop(0,'#5b5ef4'); topGrad.addColorStop(.5,'#818cf8'); topGrad.addColorStop(1,'#10b981');
  ctx.fillStyle = topGrad; ctx.fillRect(0,0,W,5);

  // Grid dots
  ctx.fillStyle = 'rgba(91,94,244,.06)';
  for (let x=0; x<W; x+=40) for (let y=0; y<H; y+=40) { ctx.beginPath(); ctx.arc(x,y,1,0,Math.PI*2); ctx.fill(); }

  // Glow orb
  const orb = ctx.createRadialGradient(W*.75,H*.25,0,W*.75,H*.25,250);
  orb.addColorStop(0,'rgba(91,94,244,.18)'); orb.addColorStop(1,'transparent');
  ctx.fillStyle = orb; ctx.fillRect(0,0,W,H);

  // Logo mark
  const lx=72, ly=52;
  ctx.fillStyle='#5b5ef4';
  roundRect(ctx,lx,ly,42,42,10); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 14px "Sora",sans-serif'; ctx.textAlign='left';
  ctx.fillText('EX',lx+9,ly+27);

  ctx.fillStyle='#fff'; ctx.font='bold 16px "Sora",sans-serif';
  ctx.fillText('EXAMORA',lx+52,ly+19);
  ctx.fillStyle='rgba(255,255,255,.35)'; ctx.font='11px "Outfit",sans-serif';
  ctx.fillText('examora.app',lx+52,ly+36);

  // Right: date
  ctx.textAlign='right'; ctx.fillStyle='rgba(255,255,255,.3)'; ctx.font='11px "Outfit",sans-serif';
  ctx.fillText(date, W-72, ly+27);

  // Centre content
  ctx.textAlign='center';
  ctx.fillStyle='rgba(129,140,248,.7)'; ctx.font='11px "Outfit",sans-serif'; ctx.letterSpacing='3px';
  ctx.fillText('CERTIFICATE OF EXCELLENCE', W/2, 160); ctx.letterSpacing='0px';

  ctx.fillStyle='#ffffff'; ctx.font='bold 40px "Sora",sans-serif';
  ctx.fillText(name, W/2, 220);

  ctx.fillStyle='rgba(255,255,255,.4)'; ctx.font='14px "Outfit",sans-serif';
  ctx.fillText('achieved outstanding results in', W/2, 255);

  ctx.fillStyle='#818cf8'; ctx.font='bold 20px "Sora",sans-serif';
  ctx.fillText(subj, W/2, 292);

  // Score pills
  const pillData = [
    { label:'SCORE', val:score+'%', color:'#5b5ef4' },
    { label:'GRADE', val:'Grade '+grade, color:'#10b981' },
    { label:'CORRECT', val:correct+'/'+total, color:'#f59e0b' },
  ];
  const pillW=160, pillH=68, gap=20;
  const totalW=pillData.length*(pillW+gap)-gap;
  let px=(W-totalW)/2;
  pillData.forEach(p => {
    ctx.fillStyle='rgba(255,255,255,.05)';
    roundRect(ctx,px,325,pillW,pillH,12); ctx.fill();
    ctx.strokeStyle=p.color+'55'; ctx.lineWidth=1.5;
    roundRect(ctx,px,325,pillW,pillH,12); ctx.stroke();
    ctx.fillStyle=p.color; ctx.font='bold 26px "Sora",sans-serif';
    ctx.fillText(p.val,px+pillW/2,325+42);
    ctx.fillStyle='rgba(255,255,255,.3)'; ctx.font='10px "Outfit",sans-serif';
    ctx.letterSpacing='1.5px'; ctx.fillText(p.label,px+pillW/2,325+62); ctx.letterSpacing='0px';
    px+=pillW+gap;
  });

  // Bottom line
  ctx.fillStyle='rgba(255,255,255,.15)'; ctx.font='11px "Outfit",sans-serif';
  ctx.fillText('Prepared on EXAMORA · AI-Driven Exam Preparation Platform', W/2, H-45);
}

// ── Style 3: Minimal (Clean white/light) ──────────────────────────────────
function drawMinimal(ctx, W, H, name, subj, score, grade, date, correct, total) {
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,W,H);

  // Left colour stripe
  const stripe = ctx.createLinearGradient(0,0,0,H);
  stripe.addColorStop(0,'#5b5ef4'); stripe.addColorStop(1,'#10b981');
  ctx.fillStyle = stripe; ctx.fillRect(0,0,8,H);

  // Score circle (left side)
  const cx=155, cy=H/2;
  ctx.beginPath();
  ctx.arc(cx,cy,80,0,Math.PI*2);
  ctx.fillStyle='#f8f8ff'; ctx.fill();
  ctx.strokeStyle='#e8e8f0'; ctx.lineWidth=2; ctx.stroke();

  // Score arc
  const startAngle=-Math.PI/2;
  const endAngle=startAngle+(2*Math.PI*score/100);
  ctx.beginPath(); ctx.arc(cx,cy,70,startAngle,endAngle);
  const arcColor = score>=70?'#10b981':score>=50?'#5b5ef4':'#f59e0b';
  ctx.strokeStyle=arcColor; ctx.lineWidth=8; ctx.lineCap='round'; ctx.stroke();

  ctx.fillStyle='#1a1a2e'; ctx.font='bold 30px "Sora",sans-serif'; ctx.textAlign='center';
  ctx.fillText(score+'%',cx,cy+8);
  ctx.fillStyle='#888'; ctx.font='11px "Outfit",sans-serif';
  ctx.fillText('Grade '+grade,cx,cy+26);

  // Right content
  ctx.textAlign='left';
  const rx=275;

  ctx.fillStyle='#5b5ef4'; ctx.font='bold 11px "Outfit",sans-serif'; ctx.letterSpacing='2px';
  ctx.fillText('CERTIFICATE OF COMPLETION',rx,H/2-115); ctx.letterSpacing='0px';

  ctx.fillStyle='#1a1a2e'; ctx.font='bold 36px "Sora",sans-serif';
  ctx.fillText(name,rx,H/2-68);

  ctx.fillStyle='#888'; ctx.font='14px "Outfit",sans-serif';
  ctx.fillText('successfully completed',rx,H/2-38);

  ctx.fillStyle='#1a1a2e'; ctx.font='bold 20px "Sora",sans-serif';
  ctx.fillText(subj,rx,H/2);

  // Stats row
  const stats=[['Questions',total],['Correct',correct],['Date',date]];
  stats.forEach((s,i)=>{
    const sx=rx + i*170;
    ctx.fillStyle='#f0f0f8'; roundRect(ctx,sx,H/2+22,155,52,8); ctx.fill();
    ctx.fillStyle='#1a1a2e'; ctx.font='bold 15px "Sora",sans-serif';
    ctx.fillText(s[1],sx+12,H/2+50);
    ctx.fillStyle='#aaa'; ctx.font='11px "Outfit",sans-serif';
    ctx.fillText(s[0],sx+12,H/2+67);
  });

  // Footer
  ctx.fillStyle='#ddd'; ctx.fillRect(rx,H-55,W-rx-40,1);
  ctx.fillStyle='#aaa'; ctx.font='11px "Outfit",sans-serif';
  ctx.fillText('EXAMORA · examora.app · AI-Powered Exam Preparation',rx,H-35);

  // EX logo mark
  ctx.fillStyle='#5b5ef4'; roundRect(ctx,W-90,H-85,44,44,10); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 14px "Sora",sans-serif'; ctx.textAlign='center';
  ctx.fillText('EX',W-68,H-57);
}

// ── Draw helpers ──────────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ── Download ──────────────────────────────────────────────────────────────
function downloadCert() {
  if (!selectedExam) { toast('Pick an exam first','error'); return; }
  renderCertificate();
  const canvas = document.getElementById('certCanvas');
  const link   = document.createElement('a');
  const subj   = (selectedExam.subject || selectedExam.examType || 'Exam').replace(/\s+/g,'-');
  link.download = `EXAMORA-Certificate-${subj}.png`;
  link.href     = canvas.toDataURL('image/png', 1.0);
  link.click();
  toast('Certificate downloaded! 🎉','success');
}
window.downloadCert = downloadCert;

// ── Share ─────────────────────────────────────────────────────────────────
function shareCert() {
  if (!selectedExam) return;
  const score = getScore(selectedExam);
  const subj  = selectedExam.subject || selectedExam.examType || 'Practice Exam';
  const canvas = document.getElementById('certCanvas');
  canvas.toBlob(async (blob) => {
    if (navigator.share && blob) {
      try {
        const file = new File([blob], 'certificate.png', { type:'image/png' });
        await navigator.share({ title:'My EXAMORA Certificate', text: getShareText(score,subj), files:[file] });
      } catch (e) {
        if (e.name !== 'AbortError') copyShareText();
      }
    } else {
      copyShareText();
    }
  });
}
window.shareCert = shareCert;

function getShareText(score, subj) {
  const score_ = score || getScore(selectedExam);
  const subj_  = subj  || (selectedExam ? selectedExam.subject || 'Exam' : 'Exam');
  return `🎓 I just scored ${score_}% in ${subj_} on EXAMORA!\n\nStudying smarter with AI-powered exam prep 🚀\n\nJoin me: examora.app`;
}

function copyShareText() {
  if (!selectedExam) return;
  const score = getScore(selectedExam);
  const subj  = selectedExam.subject || selectedExam.examType || 'Exam';
  const text  = getShareText(score,subj);
  navigator.clipboard.writeText(text).then(()=>toast('Caption copied!','success')).catch(()=>toast('Copy failed','error'));
}
window.copyShareText = copyShareText;

function shareWhatsApp() {
  if (!selectedExam) return;
  const text = encodeURIComponent(getShareText());
  window.open('https://wa.me/?text=' + text, '_blank');
}
window.shareWhatsApp = shareWhatsApp;

function shareTwitter() {
  if (!selectedExam) return;
  const text = encodeURIComponent(getShareText() + ' #EXAMORA #JAMB #WAEC');
  window.open('https://twitter.com/intent/tweet?text=' + text, '_blank');
}
window.shareTwitter = shareTwitter;

function shareInstagram() {
  downloadCert();
  toast('Image saved! Open Instagram and post it to your story or feed 📸','info');
}
window.shareInstagram = shareInstagram;

// ── Utilities ─────────────────────────────────────────────────────────────
function getScore(r) {
  if (r.percentage !== undefined) return Math.round(r.percentage);
  if (r.score      !== undefined && r.score <= 100) return Math.round(r.score);
  if (r.correct    !== undefined && r.totalQuestions) return Math.round(r.correct/r.totalQuestions*100);
  return 0;
}
function getGrade(s) {
  if (s>=80) return 'A'; if (s>=65) return 'B'; if (s>=50) return 'C'; if (s>=40) return 'D'; return 'F';
}
function fmtDate(ts) {
  if (!ts) return '';
  try { const d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString('en-NG',{day:'numeric',month:'short',year:'numeric'}); } catch { return ''; }
}
function fmtDateFull(ts) {
  if (!ts) return new Date().toLocaleDateString('en-NG',{day:'numeric',month:'long',year:'numeric'});
  try { const d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString('en-NG',{day:'numeric',month:'long',year:'numeric'}); } catch { return ''; }
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Toast ─────────────────────────────────────────────────────────────────
function toast(msg, type='info') {
  const icons={ success:'✓', error:'✕', info:'ℹ', warning:'⚠' };
  const el=document.getElementById('toastEl');
  el.className='toast toast-'+type;
  document.getElementById('toastIcon').textContent=icons[type]||'ℹ';
  document.getElementById('toastMsg').textContent=msg;
  void el.offsetWidth; el.classList.add('show');
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>el.classList.remove('show'),3200);
}
</script>
