<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Model Answers — EXAMORA</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0" rel="stylesheet"/>
<script src="ai-engine.js"></script>
<style>
  /* ── overflow protection patch ── */
  * { box-sizing: border-box; max-width: 100%; min-width: 0; }
  p,span,div,h1,h2,h3,h4,h5,h6,a,li,td,th,label,button,small,strong,em {
    overflow-wrap: break-word; word-wrap: break-word;
  }
.page-header{padding:16px 16px 0;display:flex;align-items:center;gap:12px;}
.back-btn{width:38px;height:38px;border-radius:12px;background:var(--bg-card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;flex-shrink:0;}
.page-title{font-family:var(--fd, 'Sora', sans-serif);font-weight:800;font-size:1.1rem;color:var(--text);}
.page-sub{font-size:0.72rem;color:var(--text-3);}
.content{padding:16px;}
.tabs{display:flex;background:var(--bg-input);border-radius:12px;padding:3px;margin-bottom:16px;}
.tab{flex:1;padding:8px;text-align:center;border-radius:9px;font-family:var(--fd, 'Sora', sans-serif);font-weight:700;font-size:0.74rem;cursor:pointer;transition:all .18s;color:var(--text-3);}
.tab.active{background:var(--bg-card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.08);}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:18px;}
.label{font-family:var(--fd, 'Sora', sans-serif);font-weight:700;font-size:0.78rem;color:var(--text-2);margin-bottom:8px;}
.input{width:100%;padding:12px 14px;background:var(--bg-input);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--fb, 'Outfit', sans-serif);font-size:0.88rem;outline:none;box-sizing:border-box;transition:all .18s;}
.input:focus{border-color:var(--c-brand);box-shadow:0 0 0 3px rgba(99,102,241,.12);}
textarea.input{min-height:100px;resize:vertical;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.chip{padding:5px 12px;border-radius:100px;background:var(--bg-input);border:1.5px solid var(--border);font-size:0.74rem;font-weight:600;cursor:pointer;transition:all .18s;color:var(--text-2);}
.chip.active{background:var(--c-brand);border-color:var(--c-brand);color:#fff;}
.btn-ai{width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:14px;font-family:var(--fd, 'Sora', sans-serif);font-weight:800;font-size:.9rem;cursor:pointer;transition:all .18s;box-shadow:0 4px 16px rgba(99,102,241,.3);display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;}
.btn-ai:hover{transform:translateY(-1px);}
.btn-ai:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.result-box{background:var(--bg-input);border:1px solid var(--c-brand);border-radius:16px;padding:16px;margin-top:16px;display:none;white-space:pre-wrap;font-size:.84rem;color:var(--text-2);line-height:1.7;}
.result-box.show{display:block;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.simplify-section{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.simplify-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--c-brand);margin-bottom:6px;}
.simplify-text{font-size:.83rem;color:var(--text-2);line-height:1.55;}
.ai-badge{font-size:.68rem;color:var(--text-3);margin-top:10px;}
.copy-btn{float:right;padding:6px 14px;border-radius:9px;background:var(--bg-input);border:1px solid var(--border);font-size:.74rem;font-weight:700;cursor:pointer;color:var(--text-2);margin-bottom:8px;}
.copy-btn:active{background:var(--c-brand);color:#fff;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app-container">

  <div class="page-header">
    <div class="back-btn" onclick="history.back()">←</div>
    <div>
      <div class="page-title">✍️ Model Answers</div>
      <div class="page-sub">Perfect answers &amp; question simplifier</div>
    </div>
  </div>

  <div class="content">
    <div class="tabs">
      <div class="tab active" id="tab-model" onclick="switchMode('model')">✍️ Model Answer</div>
      <div class="tab" id="tab-simplify" onclick="switchMode('simplify')">🔍 Simplify Question</div>
    </div>

    <!-- Model Answer -->
    <div id="modelPanel">
      <div class="card">
        <div class="label">Question</div>
        <textarea class="input" id="modelQ" placeholder="Paste your exam question here…"></textarea>
        <div class="label" style="margin-top:12px;">Subject</div>
        <input class="input" id="modelSubject" placeholder="e.g. Physics, Economics, Biology…"/>
        <div class="label" style="margin-top:12px;">Exam Type</div>
        <div class="chips" id="examChips">
          <div class="chip active" onclick="pickExam(this,'WAEC')">WAEC</div>
          <div class="chip" onclick="pickExam(this,'JAMB')">JAMB</div>
          <div class="chip" onclick="pickExam(this,'NECO')">NECO</div>
          <div class="chip" onclick="pickExam(this,'Post-UTME')">Post-UTME</div>
        </div>
        <button class="btn-ai" id="modelBtn" onclick="doModelAnswer()">
          <span>✍️ Write Model Answer</span>
        </button>
      </div>
      <div class="result-box" id="modelResult">
        <button class="copy-btn" onclick="copyResult()">📋 Copy</button>
        <div id="modelText"></div>
        <div class="ai-badge" id="modelBadge"></div>
      </div>
    </div>

    <!-- Simplify Question -->
    <div id="simplifyPanel" style="display:none;">
      <div class="card">
        <div class="label">Confusing Question</div>
        <textarea class="input" id="simplifyQ" placeholder="Paste the question you don't understand…"></textarea>
        <div class="label" style="margin-top:12px;">Subject (optional)</div>
        <input class="input" id="simplifySubject" placeholder="e.g. Mathematics, Chemistry…"/>
        <button class="btn-ai" id="simplifyBtn" onclick="doSimplify()">
          <span>🔍 Simplify &amp; Explain</span>
        </button>
      </div>
      <div id="simplifyResult" style="margin-top:16px;display:none;"></div>
    </div>
  </div>
  <nav class="bottom-nav">
    <a href="index.html"      class="nav-item "><span class="nav-icon ">home</span><span class="nav-label">Home</span></a>
    <a href="exam.html"       class="nav-item "><span class="nav-icon ">edit_note</span><span class="nav-label">Exam</span></a>
    <a href="news.html"       class="nav-item "><span class="nav-icon ">newspaper</span><span class="nav-label">News</span></a>
    <a href="leaderboard.html" class="nav-item "><span class="nav-icon ">emoji_events</span><span class="nav-label">Ranks</span></a>
    <a href="profile.html"    class="nav-item "><span class="nav-icon ">person</span><span class="nav-label">Profile</span></a>
  </nav>
</div>

<script>
var _exam = 'WAEC';
document.documentElement.setAttribute('data-theme', localStorage.getItem('examora_theme')||'light');

function switchMode(m) {
  document.getElementById('tab-model').classList.toggle('active', m==='model');
  document.getElementById('tab-simplify').classList.toggle('active', m==='simplify');
  document.getElementById('modelPanel').style.display = m==='model'?'block':'none';
  document.getElementById('simplifyPanel').style.display = m==='simplify'?'block':'none';
}

function pickExam(el, ex) {
  _exam = ex;
  document.querySelectorAll('#examChips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
}

async function doModelAnswer() {
  var q = document.getElementById('modelQ').value.trim();
  var subj = document.getElementById('modelSubject').value.trim() || 'General';
  if (!q) { window.toast('Paste a question first.','warning'); return; }
  var btn = document.getElementById('modelBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Writing…';
  try {
    var r = await EXAMORA_AI.writeModelAnswer(q, subj, _exam);
    var res = document.getElementById('modelResult');
    document.getElementById('modelText').textContent = r.text || 'No answer generated.';
    document.getElementById('modelBadge').textContent = '✨ via '+(r.model||'AI').split('/').pop();
    res.classList.add('show');
    res.scrollIntoView({behavior:'smooth'});
  } catch(e) {
    var msg = e.message||'';
    if (msg.includes('AI_KEY_MISSING')) window.toast('Add OpenRouter key in Admin → AI Keys','warning');
    else window.toast('Could not generate. Try again.','error');
  }
  btn.disabled = false;
  btn.innerHTML = '<span>✍️ Write Model Answer</span>';
}

function copyResult() {
  var text = document.getElementById('modelText').textContent;
  navigator.clipboard.writeText(text).then(function() {
    window.toast('Copied!','success');
  }).catch(function() {
    window.toast('Could not copy.','error');
  });
}

async function doSimplify() {
  var q = document.getElementById('simplifyQ').value.trim();
  var subj = document.getElementById('simplifySubject').value.trim();
  if (!q) { window.toast('Paste a question first.','warning'); return; }
  var btn = document.getElementById('simplifyBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Simplifying…';
  try {
    var r = await EXAMORA_AI.simplifyQuestion(q, subj);
    var text = r.text || '';
    var res = document.getElementById('simplifyResult');
    res.style.display = 'block';
    // Parse into sections if possible
    var sections = [
      {key:'1.', label:'Simple Version'},
      {key:'2.', label:'What\'s being asked'},
      {key:'3.', label:'Key information'},
      {key:'4.', label:'Approach / Formula'}
    ];
    var html = '';
    var lines = text.split('\n');
    var currentSection = null;
    var currentText = [];
    lines.forEach(function(line) {
      var matched = sections.find(function(s){return line.trim().startsWith(s.key);});
      if (matched) {
        if (currentSection) {
          html += '<div class="simplify-section"><div class="simplify-label">'+currentSection+'</div>'
            + '<div class="simplify-text">'+currentText.join('<br>')+'</div></div>';
        }
        currentSection = matched.label;
        currentText = [line.replace(/^\d+\./, '').trim()];
      } else if (currentSection && line.trim()) {
        currentText.push(line.trim());
      }
    });
    if (currentSection) {
      html += '<div class="simplify-section"><div class="simplify-label">'+currentSection+'</div>'
        + '<div class="simplify-text">'+currentText.join('<br>')+'</div></div>';
    }
    if (!html) {
      html = '<div class="simplify-section"><div class="simplify-text" style="white-space:pre-wrap;">'+text+'</div></div>';
    }
    html += '<div class="ai-badge" style="font-size:.68rem;color:var(--text-3);margin-top:6px;">✨ via '+(r.model||'AI').split('/').pop()+'</div>';
    res.innerHTML = html;
    res.scrollIntoView({behavior:'smooth'});
  } catch(e) {
    var msg = e.message||'';
    if (msg.includes('AI_KEY_MISSING')) window.toast('Add OpenRouter key in Admin → AI Keys','warning');
    else window.toast('Could not simplify. Try again.','error');
  }
  btn.disabled = false;
  btn.innerHTML = '<span>🔍 Simplify &amp; Explain</span>';
}

window.toast = window.toast || function(msg,type) {
  var t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 18px;border-radius:12px;font-size:.82rem;z-index:9999;font-weight:600;';
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
};
</script>

</body>
</html>
