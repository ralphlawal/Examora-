<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign In — EXAMORA</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0" rel="stylesheet"/>
<style>
* { box-sizing:border-box; max-width:100%; min-width:0; }
p,span,div,h1,h2,h3,h4,h5,h6,a,li,td,th,label,button,small,strong,em {
  overflow-wrap:break-word; word-wrap:break-word;
}
:root { --max-width:480px; }

.wrap {
  max-width:var(--max-width); margin:0 auto; min-height:100dvh;
  display:flex; flex-direction:column; justify-content:center;
  padding:24px 20px 48px;
}

/* Logo */
.logo-wrap  { text-align:center; margin-bottom:28px; }
.logo-icon  {
  width:68px; height:68px; border-radius:22px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:inline-flex; align-items:center; justify-content:center;
  font-size:2rem; margin-bottom:12px;
  box-shadow:0 8px 32px rgba(99,102,241,.35);
}
.logo-name  { font-family:'Sora',sans-serif; font-weight:900; font-size:1.7rem; color:var(--ink,#0f172a); letter-spacing:-.5px; }
.logo-sub   { font-size:.78rem; color:var(--ink-3,#94a3b8); margin-top:3px; }

/* Card */
.card {
  background:var(--surface,#fff); border:1px solid var(--border,#e2e8f0);
  border-radius:24px; padding:24px 20px 20px;
}

/* Tabs */
.tabs { display:flex; background:var(--surface-2,#f8fafc); border-radius:12px; padding:3px; margin-bottom:20px; }
.tab  {
  flex:1; padding:9px; text-align:center; border-radius:9px;
  font-family:'Sora',sans-serif; font-weight:700; font-size:.8rem;
  cursor:pointer; transition:all .18s; color:var(--ink-3,#94a3b8);
}
.tab.on { background:var(--surface,#fff); color:#6366f1; box-shadow:0 2px 8px rgba(0,0,0,.08); }

/* Fields */
.fg  { margin-bottom:14px; }
.fl  { display:block; font-weight:600; font-size:.76rem; color:var(--ink-2,#475569); margin-bottom:6px; }
.fi  {
  width:100%; padding:12px 14px;
  background:var(--surface-2,#f8fafc); border:1.5px solid var(--border,#e2e8f0);
  border-radius:12px; color:var(--ink,#0f172a); font-family:'Outfit',sans-serif;
  font-size:.88rem; transition:all .18s; outline:none;
}
.fi:focus { border-color:#6366f1; background:var(--surface,#fff); box-shadow:0 0 0 3px rgba(99,102,241,.12); }
.fi::placeholder { color:var(--ink-3,#94a3b8); }
.pw-wrap { position:relative; }
.pw-eye  {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer; color:var(--ink-3,#94a3b8);
  padding:4px; font-size:.9rem; line-height:1;
}

/* Forgot */
.forgot {
  display:block; text-align:right; font-size:.74rem; color:#6366f1;
  font-weight:600; cursor:pointer; margin-top:-6px; margin-bottom:16px;
}

/* Primary button */
.btn-main {
  width:100%; padding:13px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff;
  border:none; border-radius:12px; font-family:'Sora',sans-serif;
  font-weight:800; font-size:.9rem; cursor:pointer; transition:all .2s;
  box-shadow:0 4px 16px rgba(99,102,241,.35);
}
.btn-main:hover   { transform:translateY(-1px); box-shadow:0 6px 24px rgba(99,102,241,.45); }
.btn-main:active  { transform:scale(.98); }
.btn-main:disabled { opacity:.6; cursor:not-allowed; transform:none; }

/* Divider */
.divider { display:flex; align-items:center; gap:10px; margin:16px 0; }
.divider-line { flex:1; height:1px; background:var(--border,#e2e8f0); }
.divider-txt  { font-size:.7rem; color:var(--ink-3,#94a3b8); font-weight:600; flex-shrink:0; white-space:nowrap; }

/* Google button */
.btn-google {
  width:100%; padding:12px 16px; border-radius:12px;
  border:1.5px solid var(--border,#e2e8f0);
  background:var(--surface,#fff); cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:10px;
  font-family:'Sora',sans-serif; font-weight:700; font-size:.88rem;
  color:var(--ink,#0f172a); transition:all .18s;
}
.btn-google:hover   { border-color:#6366f1; background:rgba(99,102,241,.04); transform:translateY(-1px); box-shadow:0 4px 12px rgba(0,0,0,.08); }
.btn-google:active  { transform:scale(.98); }
.btn-google:disabled { opacity:.6; cursor:not-allowed; transform:none; }
.btn-google svg     { flex-shrink:0; }

/* Messages */
.err { display:none; padding:10px 14px; background:rgba(244,63,94,.08); border:1px solid rgba(244,63,94,.25); border-radius:10px; font-size:.78rem; color:#f43f5e; font-weight:600; margin-bottom:12px; line-height:1.5; }
.err.on { display:block; }
.ok  { display:none; padding:10px 14px; background:rgba(16,185,129,.08); border:1px solid rgba(16,185,129,.25); border-radius:10px; font-size:.78rem; color:#10b981; font-weight:600; margin-bottom:12px; line-height:1.5; }
.ok.on  { display:block; }
.info-banner { display:none; padding:10px 14px; background:rgba(245,158,11,.07); border:1px solid rgba(245,158,11,.3); border-radius:10px; font-size:.76rem; color:#d97706; line-height:1.6; margin-top:10px; }
.info-banner.on { display:block; }

/* Footer note */
.tnote { font-size:.68rem; color:var(--ink-3,#94a3b8); text-align:center; margin-top:14px; line-height:1.6; }
.tnote a { color:#6366f1; text-decoration:none; font-weight:600; }
</style>
<script src="security.js"></script>
</head>
<body>
<div class="wrap">

  <div class="logo-wrap">
    <div class="logo-icon">📚</div>
    <div class="logo-name">EXAMORA</div>
    <div class="logo-sub">Nigeria's smartest exam prep — powered by AI</div>
  </div>

  <div class="card">

    <div class="tabs">
      <div class="tab on" id="tab-in" onclick="setMode('login')">Sign In</div>
      <div class="tab"    id="tab-up" onclick="setMode('register')">Create Account</div>
    </div>

    <div class="err" id="errBox"></div>
    <div class="ok"  id="okBox"></div>

    <!-- Google button -->
    <button class="btn-google" id="googleBtn" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <!-- GitHub + Microsoft buttons -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
      <button id="githubBtn" onclick="signInWithGithub()" style="display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 10px;background:#24292e;border:none;border-radius:10px;color:#fff;font-family:Sora,sans-serif;font-weight:700;font-size:.78rem;cursor:pointer;transition:opacity .18s;">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
        GitHub
      </button>
      <button id="msBtn" onclick="signInWithMicrosoft()" style="display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 10px;background:#2f2f2f;border:none;border-radius:10px;color:#fff;font-family:Sora,sans-serif;font-weight:700;font-size:.78rem;cursor:pointer;transition:opacity .18s;">
        <svg width="17" height="17" viewBox="0 0 21 21" fill="none"><rect width="10" height="10" fill="#F25022"/><rect x="11" width="10" height="10" fill="#7FBA00"/><rect y="11" width="10" height="10" fill="#00A4EF"/><rect x="11" y="11" width="10" height="10" fill="#FFB900"/></svg>
        Microsoft
      </button>
    </div>

    <!-- Anonymous / Guest -->
    <button id="guestBtn" onclick="signInAsGuest()" style="width:100%;padding:11px;background:none;border:1.5px dashed var(--border,#e2e5f1);border-radius:10px;color:var(--text-2,#454c7a);font-family:Outfit,sans-serif;font-weight:600;font-size:.8rem;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;">
      <span style="font-size:1rem;">👤</span> Try as Guest (no account needed)
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-txt">or use email</div>
      <div class="divider-line"></div>
    </div>

    <!-- Email -->
    <div class="fg">
      <label class="fl">Email address</label>
      <input class="fi" type="email" id="emailInput" placeholder="you@email.com" autocomplete="email"/>
    </div>

    <!-- Password -->
    <div class="fg">
      <label class="fl">Password</label>
      <div class="pw-wrap">
        <input class="fi" type="password" id="passInput" placeholder="••••••••"
               autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuth()"/>
        <button class="pw-eye" onclick="togglePw()" type="button">👁</button>
      </div>
    </div>

    <span class="forgot" id="forgotBtn" onclick="forgotPw()">Forgot password?</span>

    <button class="btn-main" id="mainBtn" onclick="doAuth()">Sign In →</button>

    <!-- Spam hint shown on register -->
    <div id="spamHint" class="info-banner">
      📬 Check your <strong>inbox and spam/junk folder</strong> for the verification email after signing up.
    </div>

    <!-- Soft verify reminder (non-blocking) -->
    <div id="verifyBanner" class="info-banner">
      📧 Email not verified yet.
      <button onclick="resendVerification()" style="background:none;border:none;color:#d97706;font-weight:800;cursor:pointer;text-decoration:underline;font-size:.76rem;padding:0;">Resend email</button>
    </div>

    <div class="tnote">
      By continuing you agree to our <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a>
    </div>
  </div>

</div>

<!-- ── Plain script: UI logic (global scope) ── -->
<script>
// Theme
var _t = localStorage.getItem('examora_theme') || 'light';
document.documentElement.setAttribute('data-theme', _t);

var _mode = 'login';

function setMode(m) {
  _mode = m;
  document.getElementById('tab-in').classList.toggle('on', m === 'login');
  document.getElementById('tab-up').classList.toggle('on', m === 'register');
  document.getElementById('mainBtn').textContent = m === 'login' ? 'Sign In →' : 'Create Account →';
  document.getElementById('forgotBtn').style.display = m === 'login' ? 'block' : 'none';
  document.getElementById('spamHint').classList.toggle('on', m === 'register');
  clearMsg();
}

function showErr(msg) {
  var e = document.getElementById('errBox');
  e.textContent = msg; e.classList.add('on');
  document.getElementById('okBox').classList.remove('on');
}
function showOk(msg) {
  var e = document.getElementById('okBox');
  e.textContent = msg; e.classList.add('on');
  document.getElementById('errBox').classList.remove('on');
}
function clearMsg() {
  document.getElementById('errBox').classList.remove('on');
  document.getElementById('okBox').classList.remove('on');
}

function togglePw() {
  var i = document.getElementById('passInput');
  i.type = i.type === 'password' ? 'text' : 'password';
}

function busyBtn(id, on, defaultText) {
  var b = document.getElementById(id);
  if (!b) return;
  b.disabled = on;
  if (on) b.textContent = 'Please wait…';
  else    b.textContent = defaultText;
}

function doAuth() { _mode === 'login' ? signIn() : register(); }

var ERRS = {
  'auth/user-not-found':        'No account with that email.',
  'auth/wrong-password':        'Incorrect password.',
  'auth/invalid-credential':    'Invalid email or password.',
  'auth/invalid-email':         'Invalid email address.',
  'auth/too-many-requests':     'Too many attempts — try again later.',
  'auth/email-already-in-use':  'An account with this email already exists.',
  'auth/weak-password':         'Password must be at least 6 characters.',
  'auth/network-request-failed':'No internet connection.',
  'auth/popup-closed-by-user':  'Sign-in popup was closed. Please try again.',
  'auth/popup-blocked':         'Popup blocked by browser — trying redirect…',
  'auth/cancelled-popup-request':'Another sign-in is in progress.',
  'auth/account-exists-with-different-credential':
    'An account exists with this email using a different sign-in method.'
};

// ── Email sign-in ──────────────────────────────────────────────────────────
async function signIn() {
  var email = document.getElementById('emailInput').value.trim();
  var pass  = document.getElementById('passInput').value;
  if (!email || !pass) { showErr('Please fill in all fields.'); return; }

  // Brute-force protection
  if (window.EXAMORA && window.EXAMORA.authGate) {
    var gate = window.EXAMORA.authGate.check();
    if (gate.blocked) {
      showErr('🔒 Too many failed attempts. Try again in ' + gate.minutes + ' minute' + (gate.minutes !== 1 ? 's' : '') + '.');
      return;
    }
  }

  if (window.EXAMORA && !window.EXAMORA.isValidEmail(email)) {
    showErr('Please enter a valid email address.');
    return;
  }

  window._signingIn = true;
  busyBtn('mainBtn', true, '');
  try {
    var cred = await window._signIn(email, pass);
    if (window.EXAMORA && window.EXAMORA.authGate) window.EXAMORA.authGate.recordSuccess();
    localStorage.setItem('examora_user_display', cred.user.displayName || email.split('@')[0]);
    if (!cred.user.emailVerified) {
      window._pendingVerifyUser = cred.user;
      document.getElementById('verifyBanner').classList.add('on');
    }
    window.location.href = 'index.html';
  } catch(e) {
    window._signingIn = false;
    busyBtn('mainBtn', false, 'Sign In →');
    // Record failed attempt for brute-force protection
    if (window.EXAMORA && window.EXAMORA.authGate &&
        (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential' || e.code === 'auth/user-not-found')) {
      var result = window.EXAMORA.authGate.recordFail();
      if (result.locked) {
        showErr('🔒 Too many failed attempts. Account locked for 15 minutes.');
        return;
      }
      if (result.remaining <= 2) {
        showErr((ERRS[e.code] || 'Incorrect password.') + ' (' + result.remaining + ' attempt' + (result.remaining !== 1 ? 's' : '') + ' left before lockout)');
        return;
      }
    }
    var msg = ERRS[e.code] || e.message || 'Sign in failed.';
    if (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') {
      showErr(msg + ' Use "Forgot password?" to reset.');
    } else {
      showErr(msg);
    }
  }
}

// ── Google sign-in ─────────────────────────────────────────────────────────
// ── GitHub sign-in ─────────────────────────────────────────────────────────
async function signInWithGithub() {
  if (window._signingIn) return;
  window._signingIn = true;
  busyBtn('githubBtn', true, 'GitHub');
  try {
    var cred = await window._githubSignIn();
    localStorage.setItem('examora_user_display', cred.user.displayName || cred.user.email?.split('@')[0] || 'User');
    if (window._createDoc) await window._createDoc(cred.user);
    window.location.href = 'index.html';
  } catch(e) {
    window._signingIn = false;
    busyBtn('githubBtn', false, '<svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg> GitHub');
    if (e.code === 'auth/popup-blocked') {
      window._githubRedirect && window._githubRedirect();
    } else {
      showErr(ERRS[e.code] || e.message || 'GitHub sign-in failed.');
    }
  }
}

// ── Microsoft sign-in ───────────────────────────────────────────────────────
async function signInWithMicrosoft() {
  if (window._signingIn) return;
  window._signingIn = true;
  busyBtn('msBtn', true, 'Microsoft');
  try {
    var cred = await window._microsoftSignIn();
    localStorage.setItem('examora_user_display', cred.user.displayName || cred.user.email?.split('@')[0] || 'User');
    if (window._createDoc) await window._createDoc(cred.user);
    window.location.href = 'index.html';
  } catch(e) {
    window._signingIn = false;
    busyBtn('msBtn', false, '<svg width="17" height="17" viewBox="0 0 21 21" fill="none"><rect width="10" height="10" fill="#F25022"/><rect x="11" width="10" height="10" fill="#7FBA00"/><rect y="11" width="10" height="10" fill="#00A4EF"/><rect x="11" y="11" width="10" height="10" fill="#FFB900"/></svg> Microsoft');
    if (e.code === 'auth/popup-blocked') {
      window._microsoftRedirect && window._microsoftRedirect();
    } else {
      showErr(ERRS[e.code] || e.message || 'Microsoft sign-in failed.');
    }
  }
}

// ── Anonymous / Guest sign-in ───────────────────────────────────────────────
async function signInAsGuest() {
  if (window._signingIn) return;
  if (!confirm('Guest accounts are temporary. Your data won't be saved if you clear your browser.\n\nCreate a free account later to save your progress. Continue as guest?')) return;
  window._signingIn = true;
  busyBtn('guestBtn', true, '');
  try {
    var cred = await window._anonymousSignIn();
    localStorage.setItem('examora_user_display', 'Guest');
    localStorage.setItem('examora_user_level', 'secondary');
    if (window._createDoc) await window._createDoc(cred.user);
    window.location.href = 'index.html';
  } catch(e) {
    window._signingIn = false;
    busyBtn('guestBtn', false, '👤 Try as Guest (no account needed)');
    showErr(e.message || 'Could not sign in as guest.');
  }
}

async function signInWithGoogle() {
  window._signingIn = true;
  busyBtn('googleBtn', true, '');
  clearMsg();
  try {
    var cred = await window._googleSignIn();
    localStorage.setItem('examora_user_display', cred.user.displayName || cred.user.email.split('@')[0]);
    // Create Firestore doc BEFORE navigating — index.html must find it
    await window._createDoc(cred.user);
    window.location.href = 'index.html';
  } catch(e) {
    window._signingIn = false;
    busyBtn('googleBtn', false, 'Continue with Google');
    if (e.code === 'auth/popup-blocked') {
      showErr(ERRS[e.code]);
      setTimeout(function() { window._googleRedirect && window._googleRedirect(); }, 800);
    } else if (e.code !== 'auth/popup-closed-by-user' && e.code !== 'auth/cancelled-popup-request') {
      showErr(ERRS[e.code] || e.message || 'Google sign-in failed.');
    }
  }
}

// ── Register ───────────────────────────────────────────────────────────────
async function register() {
  var email = document.getElementById('emailInput').value.trim();
  var pass  = document.getElementById('passInput').value;
  if (!email || !pass) { showErr('Please fill in all fields.'); return; }
  if (pass.length < 6)  { showErr('Password must be at least 6 characters.'); return; }
  window._signingIn = true;
  busyBtn('mainBtn', true, '');
  try {
    var cred = await window._register(email, pass);
    await window._sendVerification(cred.user);
    await window._createDoc(cred.user);
    showOk('✅ Account created! Check your inbox (and spam folder) for the verification email.');
    setMode('login');
  } catch(e) {
    showErr(ERRS[e.code] || e.message || 'Registration failed.');
  }
  window._signingIn = false;
  busyBtn('mainBtn', false, 'Create Account →');
}

// ── Forgot password ────────────────────────────────────────────────────────
async function forgotPw() {
  var email = document.getElementById('emailInput').value.trim();
  if (!email) { showErr('Enter your email address first.'); return; }
  try {
    await window._resetPw(email);
    showOk('Password reset email sent — check your inbox.');
  } catch(e) { showErr('Could not send reset email. Check the address.'); }
}

// ── Resend verification ────────────────────────────────────────────────────
async function resendVerification() {
  if (!window._pendingVerifyUser) return;
  try {
    await window._sendVerification(window._pendingVerifyUser);
    document.getElementById('verifyBanner').textContent = '✅ Verification email resent!';
  } catch(_) {}
}

// Expose to window (called by onclick attributes)
window.resendVerification = resendVerification;
</script>

<!-- ── Module script: Firebase init ── -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  sendPasswordResetEmail,
  sendEmailVerification,
  GoogleAuthProvider,
  GithubAuthProvider,
  OAuthProvider,
  signInWithPopup,
  signInWithRedirect,
  getRedirectResult,
  signInAnonymously,
  onAuthStateChanged
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey:            'AIzaSyA5RUfGUA68-RNyMZPlxaVYj85h5OiJdJw',
  authDomain:        'cbt-app-5907f.firebaseapp.com',
  projectId:         'cbt-app-5907f',
  storageBucket:     'cbt-app-5907f.firebasestorage.app',
  messagingSenderId: '705323924101',
  appId:             '1:705323924101:web:ad9f153f25a0685a1287ec'
});
const auth     = getAuth(app);
const db       = getFirestore(app);
const provider = new GoogleAuthProvider();
provider.setCustomParameters({ prompt: 'select_account' });

// ── Auto-redirect if already logged in ──────────────────────────────────
// NOTE: Only redirect if we're NOT currently in the middle of a sign-in flow.
// During signInWithPopup the auth state fires before we finish creating the
// Firestore doc — if we redirect immediately, index.html won't find the doc
// and will bounce the user back here, creating an infinite loop.
let _signingIn = false;  // set true during active sign-in, prevents premature redirect

onAuthStateChanged(auth, user => {
  if (user && !_signingIn) window.location.href = 'index.html';
});

// ── Handle redirect result (for browsers that blocked the popup) ─────────
getRedirectResult(auth).then(async result => {
  if (!result || !result.user) return;
  // Redirect login returned a user
  localStorage.setItem('examora_user_display',
    result.user.displayName || result.user.email.split('@')[0]);
  await makeDoc(result.user);
  window.location.href = 'index.html';
}).catch(err => {
  if (err.code && err.code !== 'auth/no-auth-event') {
    // Show error to user
    var errBox = document.getElementById('errBox');
    if (errBox) {
      errBox.textContent = err.message || 'Google sign-in failed.';
      errBox.classList.add('on');
    }
  }
});

// ── Create / update Firestore user document ──────────────────────────────
async function makeDoc(user) {
  try {
    const ref  = doc(db, 'users', user.uid);
    const snap = await getDoc(ref);
    const data = {
      displayName:    user.displayName || user.email.split('@')[0],
      email:          user.email || '',
      photoURL:       user.photoURL  || '',
      updatedAt:      serverTimestamp()
    };
    if (!snap.exists()) {
      // New user — set all defaults
      Object.assign(data, {
        plan: 'free', streak: 0, totalExams: 0,
        totalCorrect: 0, totalQuestions: 0,
        badges: [], xp: 0,
        createdAt: serverTimestamp(),
        onboarded: false
      });
    }
    await setDoc(ref, data, { merge: true });
  } catch(e) {
    console.warn('makeDoc error (non-fatal):', e.message);
  }
}

// ── Expose functions to plain script ─────────────────────────────────────
window._signIn           = (e, p) => signInWithEmailAndPassword(auth, e, p);
window._register         = (e, p) => createUserWithEmailAndPassword(auth, e, p);
window._sendVerification = u      => sendEmailVerification(u);
window._resetPw          = e      => sendPasswordResetEmail(auth, e);
window._createDoc        = makeDoc;
window._googleSignIn     = ()     => signInWithPopup(auth, provider);
window._googleRedirect   = ()     => signInWithRedirect(auth, provider);

// GitHub
const githubProvider = new GithubAuthProvider();
githubProvider.addScope('user:email');
window._githubSignIn   = () => signInWithPopup(auth, githubProvider);
window._githubRedirect = () => signInWithRedirect(auth, githubProvider);

// Microsoft
const msProvider = new OAuthProvider('microsoft.com');
msProvider.setCustomParameters({ prompt: 'select_account' });
window._microsoftSignIn   = () => signInWithPopup(auth, msProvider);
window._microsoftRedirect = () => signInWithRedirect(auth, msProvider);

// Anonymous
window._anonymousSignIn = () => signInAnonymously(auth);
</script>
