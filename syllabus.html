<style>
* { box-sizing:border-box; max-width:100%; min-width:0; }
p,span,div,h1,h2,h3,h4,h5,h6,a,li,label,button { overflow-wrap:break-word; word-wrap:break-word; }

.exam-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.exam-tab {
  padding:7px 16px; border-radius:100px;
  border:1.5px solid var(--border); background:var(--surface);
  font-family:var(--fb); font-size:.78rem; font-weight:700;
  color:var(--ink-2); cursor:pointer; transition:all .18s ease; white-space:nowrap;
}
.exam-tab.on { background:var(--brand); border-color:var(--brand); color:#fff; }

.subj-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
.subj-tab {
  padding:7px 14px; border-radius:10px;
  border:1.5px solid var(--border); background:var(--surface-2);
  font-family:var(--fb); font-size:.75rem; font-weight:600;
  color:var(--ink-2); cursor:pointer; transition:all .18s ease; white-space:nowrap;
}
.subj-tab.on { border-color:var(--brand); color:var(--brand); background:var(--brand-pale); }

.progress-bar-wrap { margin-bottom:20px; }
.pb-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.pb-title { font-family:var(--fd); font-weight:800; font-size:.9rem; color:var(--ink); }
.pb-pct { font-family:var(--fd); font-weight:900; font-size:1.1rem; color:var(--brand); }
.pb-track { height:10px; background:var(--surface-2); border-radius:100px; overflow:hidden; border:1px solid var(--border); }
.pb-fill { height:100%; border-radius:100px; transition:width .5s cubic-bezier(.34,1.56,.64,1); background:linear-gradient(90deg,var(--brand),var(--emerald)); }
.pb-sub { font-size:.7rem; color:var(--ink-3); margin-top:5px; font-family:var(--fb); }

.topic-section { margin-bottom:20px; }
.topic-section-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px; background:var(--surface-2); border-radius:var(--r-md);
  cursor:pointer; margin-bottom:2px; border:1px solid var(--border);
  transition:all .18s ease;
}
.topic-section-header:hover { border-color:var(--brand); }
.tsh-left { display:flex; align-items:center; gap:10px; }
.tsh-icon { font-size:1.2rem; }
.tsh-name { font-family:var(--fd); font-weight:800; font-size:.84rem; color:var(--ink); }
.tsh-count { font-size:.7rem; color:var(--ink-3); font-family:var(--fb); }
.tsh-pct { font-family:var(--fd); font-weight:800; font-size:.82rem; color:var(--brand); }
.tsh-chevron { color:var(--ink-3); transition:transform .2s ease; font-size:1.1rem; }
.tsh-chevron.open { transform:rotate(180deg); }

.topic-items { display:none; border:1px solid var(--border); border-top:none; border-radius:0 0 var(--r-md) var(--r-md); overflow:hidden; }
.topic-items.open { display:block; }
.topic-item {
  display:flex; align-items:center; gap:12px; padding:12px 14px;
  border-bottom:1px solid var(--border); background:var(--surface);
  cursor:pointer; transition:background .15s ease; user-select:none;
}
.topic-item:last-child { border-bottom:none; }
.topic-item:hover { background:var(--surface-2); }
.topic-item.done { background:rgba(16,185,129,.04); }
.ti-check {
  width:22px; height:22px; border-radius:6px; flex-shrink:0;
  border:2px solid var(--border); display:flex; align-items:center;
  justify-content:center; transition:all .18s ease; font-size:.75rem;
}
.topic-item.done .ti-check { background:var(--emerald); border-color:var(--emerald); color:#fff; }
.ti-text { flex:1; font-family:var(--fb); font-size:.84rem; color:var(--ink); line-height:1.4; }
.topic-item.done .ti-text { color:var(--ink-3); text-decoration:line-through; }
.ti-badge { font-size:.62rem; font-weight:700; padding:2px 7px; border-radius:4px; flex-shrink:0; }
.ti-badge.high { background:rgba(244,63,94,.1); color:var(--rose); }
.ti-badge.med  { background:rgba(245,158,11,.1); color:var(--amber); }
.ti-badge.low  { background:rgba(16,185,129,.1); color:var(--emerald); }

.cert-cta {
  background:linear-gradient(135deg,rgba(91,94,244,.12),rgba(16,185,129,.08));
  border:1.5px solid rgba(91,94,244,.25); border-radius:var(--r-lg);
  padding:18px; text-align:center; margin-top:8px; display:none;
}
.cert-cta.show { display:block; }
.cert-cta-title { font-family:var(--fd); font-weight:900; font-size:.95rem; color:var(--ink); margin-bottom:8px; }
.cert-cta-sub   { font-size:.78rem; color:var(--ink-2); margin-bottom:14px; font-family:var(--fb); }

.stats-row { display:flex; gap:10px; margin-bottom:20px; }
.stat-mini { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md); padding:12px; text-align:center; }
.stat-mini .sm-val { font-family:var(--fd); font-weight:900; font-size:1.2rem; color:var(--brand); }
.stat-mini .sm-lbl { font-size:.66rem; color:var(--ink-3); text-transform:uppercase; letter-spacing:.6px; margin-top:2px; font-family:var(--fb); }
</style>

const examTypes = Object.keys(SYLLABUS);
const examTabsEl = document.getElementById('examTabs');
examTypes.forEach((ex, i) => {
  const btn = document.createElement('button');
  btn.className = 'exam-tab' + (i===0?' on':'');
  btn.textContent = ex;
  btn.addEventListener('click', () => switchExam(ex));
  examTabsEl.appendChild(btn);
});

function switchExam(exam) {
  activeExam = exam;
  document.querySelectorAll('.exam-tab').forEach(b => b.classList.toggle('on', b.textContent===exam));
  buildSubjectTabs();
}

function buildSubjectTabs() {
  const subjects = Object.keys(SYLLABUS[activeExam] || {});
  const el = document.getElementById('subjTabs');
  el.innerHTML = '';
  subjects.forEach((s,i) => {
    const btn = document.createElement('button');
    btn.className = 'subj-tab' + (i===0?' on':'');
    btn.textContent = s;
    btn.addEventListener('click', () => switchSubject(s));
    el.appendChild(btn);
  });
  if (subjects.length) switchSubject(subjects[0]);
}

function switchSubject(subj) {
  activeSubject = subj;
  document.querySelectorAll('.subj-tab').forEach(b => b.classList.toggle('on', b.textContent===subj));
  renderTopics();
}

  const sections = SYLLABUS[activeExam]?.[activeSubject] || {};
  const container = document.getElementById('topicsContainer');

  Object.entries(sections).forEach(([secName, topics]) => {
    const secDone = topics.filter(t => checkedMap[topicKey(t.t)]).length;
    const secPct  = topics.length ? Math.round(secDone/topics.length*100) : 0;
    totalTopics  += topics.length;
    doneTopics   += secDone;
    topics.forEach(t => { if(!checkedMap[topicKey(t.t)] && t.p==='high') highLeft++; });

    const wrap = document.createElement('div');
    wrap.className = 'topic-section';

    const header = document.createElement('div');
    header.className = 'topic-section-header';
    header.innerHTML = `
      <div class="tsh-left">
        <span class="tsh-icon">${getSecIcon(secName)}</span>
        <div>
          <div class="tsh-name">${esc(secName)}</div>
          <div class="tsh-count">${secDone}/${topics.length} done</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="tsh-pct">${secPct}%</span>
        <span class="material-symbols-rounded tsh-chevron">expand_more</span>
      </div>`;

    const itemsWrap = document.createElement('div');
    itemsWrap.className = 'topic-items';

    topics.forEach(topic => {
      const key  = topicKey(topic.t);
      const done = !!checkedMap[key];
      const item = document.createElement('div');
      item.className = 'topic-item' + (done?' done':'');
      item.innerHTML = `
        <div class="ti-check">${done?'✓':''}</div>
        <div class="ti-text">${esc(topic.t)}</div>
        <span class="ti-badge ${topic.p}">${topic.p==='high'?'Hot':topic.p==='med'?'Med':'Low'}</span>`;
      item.addEventListener('click', () => toggleTopic(key, item));
      itemsWrap.appendChild(item);
    });

    // Auto-open first section
    if (!container.hasChildNodes()) {
      itemsWrap.classList.add('open');
      header.querySelector('.tsh-chevron').classList.add('open');
    }

    header.addEventListener('click', () => {
      const isOpen = itemsWrap.classList.toggle('open');
      header.querySelector('.tsh-chevron').classList.toggle('open', isOpen);
    });

    wrap.appendChild(header);
    wrap.appendChild(itemsWrap);
    container.appendChild(wrap);
  });

  updateProgressUI(totalTopics, doneTopics, highLeft);
}

function toggleTopic(key, el) {
  checkedMap[key] = !checkedMap[key];
  saveProgress();
  const done = checkedMap[key];
  el.classList.toggle('done', done);
  const check = el.querySelector('.ti-check');
  if (check) check.textContent = done ? '✓' : '';
  renderProgressOnly();
}

function renderProgressOnly() {
  const sections = SYLLABUS[activeExam]?.[activeSubject] || {};
  let total=0, done=0, highLeft=0;
  Object.values(sections).forEach(topics => {
    total += topics.length;
    done  += topics.filter(t=>checkedMap[topicKey(t.t)]).length;
    topics.forEach(t=>{ if(!checkedMap[topicKey(t.t)] && t.p==='high') highLeft++; });
  });
  updateProgressUI(total, done, highLeft);
}

function updateProgressUI(total, done, highLeft) {
  const pct = total ? Math.round(done/total*100) : 0;
  const pbFill  = document.getElementById('pbFill');
  const pbPct   = document.getElementById('pbPct');
  const pbTitle = document.getElementById('pbTitle');
  const pbSub   = document.getElementById('pbSub');
  const certCta = document.getElementById('certCta');

  if (pbFill)  pbFill.style.width  = pct + '%';
  if (pbPct)   pbPct.textContent   = pct + '%';
  if (pbTitle) pbTitle.textContent = activeSubject;
  if (pbSub)   pbSub.textContent   = done + ' of ' + total + ' topics covered';

  const el = (id,v) => { const e=document.getElementById(id); if(e) e.textContent=v; };
  el('statDone', done);
  el('statLeft', total-done);
  el('statHigh', highLeft);
  el('statPct',  pct+'%');

  if (certCta) certCta.classList.toggle('show', pct===100 && total>0);
}

function topicKey(topicText) {
  return `${activeExam}|${activeSubject}|${topicText}`;
}
function getSecIcon(name) {
  if (/cell/i.test(name))    return '🔬';
  if (/genet/i.test(name))   return '🧬';
  if (/organ/i.test(name))   return '⚗️';
  if (/physi/i.test(name))   return '💪';
  if (/ecol/i.test(name))    return '🌿';
  if (/atom/i.test(name))    return '⚛️';
  if (/organ/i.test(name))   return '🔗';
  if (/alg/i.test(name))     return '📐';
  if (/calc/i.test(name))    return '∫';
  if (/stat/i.test(name))    return '📊';
  if (/geom/i.test(name))    return '📏';
  if (/mech/i.test(name))    return '⚙️';
  if (/wave/i.test(name))    return '〰️';
  if (/elect/i.test(name))   return '⚡';
  if (/modern/i.test(name))  return '☢️';
  if (/human/i.test(name))   return '🫀';
  if (/gram/i.test(name))    return '✍️';
  if (/vocab/i.test(name))   return '📖';
  return '📋';
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Reset button ───────────────────────────────────────────────────────────
document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm(`Reset progress for ${activeSubject}? This cannot be undone.`)) return;
  const sections = SYLLABUS[activeExam]?.[activeSubject] || {};
  Object.values(sections).forEach(topics => {
    topics.forEach(t => { delete checkedMap[topicKey(t.t)]; });
  });
  saveProgress();
  renderTopics();
  toast('Progress reset for ' + activeSubject, 'info');
});

// ── Toast ──────────────────────────────────────────────────────────────────
function toast(msg, type='info') {
  const icons={ success:'✓', error:'✕', info:'ℹ', warning:'⚠' };
  const el=document.getElementById('toastEl');
  el.className='toast toast-'+type;
  document.getElementById('toastIcon').textContent=icons[type]||'ℹ';
  document.getElementById('toastMsg').textContent=msg;
  void el.offsetWidth; el.classList.add('show');
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>el.classList.remove('show'),2800);
}

// ── Init ───────────────────────────────────────────────────────────────────
buildSubjectTabs();
</script>

<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});</script>
