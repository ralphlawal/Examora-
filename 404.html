<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EXAMORA — Page Not Found</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" type="image/png" href="logo.png"/>
  <meta name="theme-color" content="#0f172a"/>
  <style>
  /* ── overflow protection patch ── */
  * { box-sizing: border-box; max-width: 100%; min-width: 0; }
  p,span,div,h1,h2,h3,h4,h5,h6,a,li,td,th,label,button,small,strong,em {
    overflow-wrap: break-word; word-wrap: break-word;
  }
    body { min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .notfound-wrap {
      text-align:center; padding:40px 24px; max-width:320px; margin:0 auto;
    }
    .nf-code {
      font-family:'Sora',sans-serif; font-weight:800;
      font-size:5rem; letter-spacing:-4px; line-height:1;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text; margin-bottom:8px; display:block;
    }
    .nf-icon { font-size:2.5rem; display:block; margin-bottom:12px; }
    .nf-title {
      font-family:'Sora',sans-serif; font-weight:800;
      font-size:1.2rem; color:var(--text); margin-bottom:8px;
    }
    .nf-sub { font-size:0.82rem; color:var(--text-3); line-height:1.6; margin-bottom:24px; }
    .nf-bar {
      width:120px; height:3px; background:var(--bg-input);
      border-radius:100px; overflow:hidden; margin:0 auto 24px;
    }
    .nf-bar-fill {
      height:100%; background:linear-gradient(90deg,#6366f1,#10b981);
      border-radius:100px; width:0%;
      animation:nfLoad 3s ease forwards;
    }
    @keyframes nfLoad { to { width:100%; } }
    .nf-count { font-size:0.72rem; color:var(--text-3); margin-bottom:16px; }
  </style>
</head>
<body>
<script>
  const t=localStorage.getItem("examora_theme")||"light";
  document.documentElement.setAttribute("data-theme",t);
</script>

<div class="notfound-wrap animate-in">
  <span class="nf-code">404</span>
  <span class="nf-icon">🔍</span>
  <div class="nf-title">Page not found</div>
  <div class="nf-sub">The page you're looking for doesn't exist or has been moved.</div>
  <div class="nf-bar"><div class="nf-bar-fill"></div></div>
  <div class="nf-count" id="nfCount">Redirecting in 3s...</div>
  <a href="index.html" class="btn btn-primary">🏠 Go Home</a>
</div>

<script>
  let n=3;
  const el=document.getElementById("nfCount");
  const t=setInterval(()=>{
    n--;
    el.textContent="Redirecting in "+n+"s...";
    if(n<=0){ clearInterval(t); window.location.href="index.html"; }
  },1000);
</script>
<script>
  if("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(()=>{});
</script>
</body>
</html>
