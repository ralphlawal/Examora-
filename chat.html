<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>AI Tutor — EXAMORA</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{
      font-family:var(--font-body);
      background:var(--bg);
      color:var(--text);
      display:flex;
      flex-direction:column;
      height:100dvh;
    }

    /* ── Header ── */
    .ch{
      background:var(--bg-card);
      border-bottom:1px solid var(--border);
      padding:0 14px;
      height:60px;
      display:flex;align-items:center;gap:10px;
      flex-shrink:0;
      box-shadow:var(--shadow-sm);
    }
    .ch-back{
      width:36px;height:36px;border-radius:50%;
      background:none;border:none;cursor:pointer;
      color:var(--text-2);display:flex;align-items:center;justify-content:center;
      transition:var(--transition);flex-shrink:0;
    }
    .ch-back:hover{background:var(--bg-input);}
    .ch-avatar{
      width:40px;height:40px;border-radius:50%;flex-shrink:0;
      background:linear-gradient(135deg,#6366f1,#7c3aed);
      display:flex;align-items:center;justify-content:center;
      font-size:1.15rem;
      box-shadow:0 0 0 2px var(--bg-card),0 0 0 4px rgba(99,102,241,0.25);
      position:relative;
    }
    .ch-avatar::after{
      content:'';position:absolute;bottom:1px;right:1px;
      width:10px;height:10px;border-radius:50%;
      background:#10b981;border:2px solid var(--bg-card);
    }
    .ch-info{flex:1;min-width:0;}
    .ch-name{font-family:var(--font-display);font-weight:700;font-size:0.93rem;}
    .ch-status{font-size:0.67rem;color:var(--c-green);font-weight:600;display:flex;align-items:center;gap:3px;margin-top:1px;}
    .ch-status-dot{width:6px;height:6px;border-radius:50%;background:var(--c-green);display:inline-block;}
    .ch-menu{
      width:36px;height:36px;border-radius:50%;background:none;border:none;
      cursor:pointer;color:var(--text-2);display:flex;align-items:center;justify-content:center;
      transition:var(--transition);
    }
    .ch-menu:hover{background:var(--bg-input);}

    /* ── Suggestions ── */
    .suggestions{
      padding:8px 12px 4px;
      display:flex;gap:6px;overflow-x:auto;flex-shrink:0;
      scrollbar-width:none;
    }
    .suggestions::-webkit-scrollbar{display:none;}
    .sug-chip{
      flex-shrink:0;
      background:var(--bg-card);border:1px solid var(--border);
      border-radius:100px;padding:5px 11px;
      font-size:0.71rem;font-family:var(--font-body);
      color:var(--text-2);cursor:pointer;
      transition:var(--transition);white-space:nowrap;font-weight:500;
    }
    .sug-chip:hover{background:var(--c-brand-pale);border-color:var(--c-brand);color:var(--c-brand);}

    /* ── Messages area ── */
    .msgs{
      flex:1;overflow-y:auto;
      padding:12px 14px 8px;
      display:flex;flex-direction:column;gap:3px;
      scroll-behavior:smooth;
    }
    .msgs::-webkit-scrollbar{width:3px;}
    .msgs::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px;}

    .msg-date{
      text-align:center;margin:8px 0 4px;
      font-size:0.63rem;color:var(--text-3);font-weight:600;
      text-transform:uppercase;letter-spacing:0.5px;
    }

    .msg-row{display:flex;align-items:flex-end;gap:6px;margin-bottom:1px;}
    .msg-row.user{flex-direction:row-reverse;}

    .msg-av{
      width:26px;height:26px;border-radius:50%;flex-shrink:0;
      background:linear-gradient(135deg,#6366f1,#7c3aed);
      display:flex;align-items:center;justify-content:center;
      font-size:0.68rem;margin-bottom:2px;
    }
    .msg-av.hide{visibility:hidden;}

    .msg-wrap{display:flex;flex-direction:column;max-width:80%;}
    .msg-row.user .msg-wrap{align-items:flex-end;}
    .msg-row.bot  .msg-wrap{align-items:flex-start;}

    .msg-bubble{
      padding:9px 13px;border-radius:18px;
      font-size:0.83rem;line-height:1.65;word-break:break-word;
      animation:bubbleIn 0.2s ease;
    }
    @keyframes bubbleIn{from{opacity:0;transform:translateY(6px) scale(0.97);}to{opacity:1;transform:none;}}

    .msg-row.user .msg-bubble{
      background:var(--c-brand);color:#fff;
      border-bottom-right-radius:4px;
    }
    .msg-row.bot .msg-bubble{
      background:var(--bg-card);color:var(--text);
      border:1px solid var(--border);
      border-bottom-left-radius:4px;
    }
    .msg-time{
      font-size:0.6rem;color:var(--text-3);margin-top:3px;
      padding:0 4px;
    }

    /* Typing indicator */
    .typing-bubble{
      background:var(--bg-card);border:1px solid var(--border);
      border-radius:18px;border-bottom-left-radius:4px;
      padding:12px 16px;display:flex;align-items:center;gap:5px;
    }
    .typing-dot{
      width:7px;height:7px;border-radius:50%;
      background:var(--text-3);
      animation:typingDot 1.3s infinite ease-in-out;
    }
    .typing-dot:nth-child(2){animation-delay:0.18s;}
    .typing-dot:nth-child(3){animation-delay:0.36s;}
    @keyframes typingDot{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}

    /* ── Gate card ── */
    .gate-card{
      background:var(--bg-card);border:1px solid var(--border);
      border-radius:16px;padding:18px;text-align:center;
      max-width:280px;align-self:center;margin:8px 0;
      animation:bubbleIn 0.25s ease;
    }
    .gate-card .gate-icon{font-size:1.8rem;margin-bottom:8px;}
    .gate-card h4{font-family:var(--font-display);font-weight:800;font-size:0.9rem;margin-bottom:6px;}
    .gate-card p{font-size:0.75rem;color:var(--text-3);line-height:1.55;margin-bottom:14px;}
    .gate-card a{
      display:inline-block;background:var(--c-brand);color:#fff;
      padding:9px 22px;border-radius:100px;font-weight:700;
      font-size:0.8rem;text-decoration:none;
      transition:var(--transition);
    }
    .gate-card a:hover{opacity:0.88;}

    /* ── Input bar ── */
    .input-bar{
      background:var(--bg-card);
      border-top:1px solid var(--border);
      padding:10px 12px;
      padding-bottom:calc(10px + env(safe-area-inset-bottom));
      display:flex;align-items:flex-end;gap:8px;
      flex-shrink:0;
    }
    .input-wrap{
      flex:1;display:flex;align-items:center;gap:6px;
      background:var(--bg-input);
      border:1.5px solid var(--border);
      border-radius:24px;padding:8px 14px;
      transition:var(--transition);
    }
    .input-wrap:focus-within{border-color:var(--c-brand);}
    #chatInput{
      flex:1;background:none;border:none;outline:none;
      font-family:var(--font-body);font-size:0.84rem;
      color:var(--text);resize:none;
      max-height:100px;line-height:1.4;
    }
    #chatInput::placeholder{color:var(--text-3);}
    .input-send{
      width:40px;height:40px;border-radius:50%;flex-shrink:0;
      background:var(--c-brand);border:none;
      color:#fff;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:var(--transition-spring);
      box-shadow:0 4px 14px rgba(99,102,241,0.4);
    }
    .input-send:hover{transform:scale(1.08);}
    .input-send:active{transform:scale(0.92);}
    .input-send:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
    .input-send .material-symbols-rounded{font-size:1.1rem;}

    /* Clear button */
    .clear-btn{
      font-size:0.68rem;color:var(--text-3);background:none;border:none;
      cursor:pointer;padding:4px 8px;border-radius:100px;
      transition:var(--transition);flex-shrink:0;
    }
    .clear-btn:hover{background:var(--bg-input);color:var(--c-red);}

    /* Upgrade banner at top when free */
    .upgrade-banner{
      background:linear-gradient(135deg,rgba(99,102,241,0.12),rgba(124,58,237,0.1));
      border-bottom:1px solid rgba(99,102,241,0.2);
      padding:8px 16px;
      display:flex;align-items:center;gap:10px;
      flex-shrink:0;font-size:0.74rem;
    }
    .upgrade-banner span{flex:1;color:var(--text-2);}
    .upgrade-banner a{
      color:var(--c-brand);font-weight:700;text-decoration:none;
      white-space:nowrap;font-size:0.73rem;
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="ch">
  <button class="ch-back" onclick="history.back()">
    <span class="material-symbols-rounded" style="font-size:1.3rem;">arrow_back</span>
  </button>
  <div class="ch-avatar">🤖</div>
  <div class="ch-info">
    <div class="ch-name">EXAMORA AI Tutor</div>
    <div class="ch-status"><span class="ch-status-dot"></span>Online · NexaCore Labs</div>
  </div>
  <button class="ch-menu" onclick="clearChat()" title="Clear chat">
    <span class="material-symbols-rounded" style="font-size:1.2rem;">delete_sweep</span>
  </button>
</div>

<!-- Upgrade banner (shown for free users) -->
<div class="upgrade-banner" id="upgradeBanner" style="display:none;">
  <span>🔒 You're on a free session — <strong>upgrade for unlimited AI</strong></span>
  <a href="upgrade.html">Start Trial →</a>
</div>

<!-- Suggested prompts -->
<div class="suggestions" id="suggestionsRow">
  <button class="sug-chip" onclick="sendSuggestion(this)">Explain photosynthesis</button>
  <button class="sug-chip" onclick="sendSuggestion(this)">JAMB Maths tips</button>
  <button class="sug-chip" onclick="sendSuggestion(this)">How does osmosis work?</button>
  <button class="sug-chip" onclick="sendSuggestion(this)">WAEC English grammar</button>
  <button class="sug-chip" onclick="sendSuggestion(this)">Newton's laws explained</button>
  <button class="sug-chip" onclick="sendSuggestion(this)">Economics: demand & supply</button>
  <button class="sug-chip" onclick="sendSuggestion(this)">Government: federalism</button>
</div>

<!-- Messages -->
<div class="msgs" id="msgs">
  <div class="msg-date">Today</div>
  <!-- Welcome message -->
  <div class="msg-row bot" id="welcomeRow">
    <div class="msg-av">🤖</div>
    <div class="msg-wrap">
      <div class="msg-bubble">Hey! I'm your EXAMORA AI Tutor 👋<br/>Ask me anything — concepts, past questions, exam tips, or just revision help. What are you studying today? 📚</div>
      <div class="msg-time" id="welcomeTime"></div>
    </div>
  </div>
</div>

<!-- Input bar -->
<div class="input-bar">
  <div class="input-wrap">
    <textarea id="chatInput" rows="1" placeholder="Ask anything…" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
  </div>
  <button class="input-send" id="sendBtn" onclick="sendMsg()">
    <span class="material-symbols-rounded">send</span>
  </button>
</div>

<script src="ai-engine.js"></script>
<script>
  // ── Theme ──
  const _t = localStorage.getItem('examora_theme') || 'light';
  document.documentElement.setAttribute('data-theme', _t);

  // ── Time helper ──
  function nowTime() {
    return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }
  document.getElementById('welcomeTime').textContent = nowTime();

  // ── AI access gate ──
  function _checkAIAccess() {
    var plan = localStorage.getItem('examora_plan') || 'free';
    if (plan === 'premium' || plan === 'trial') return true;
    if (!sessionStorage.getItem('examora_session_ai')) {
      sessionStorage.setItem('examora_session_ai', '1');
      return true;
    }
    return false;
  }

  // Show upgrade banner for free users
  (function(){
    var plan = localStorage.getItem('examora_plan') || 'free';
    if (plan === 'free') {
      document.getElementById('upgradeBanner').style.display = 'flex';
    }
  })();

  // ── Auto-resize textarea ──
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMsg();
    }
  }

  // ── Chat history ──
  var _history = [];
  var _msgCount = 0;
  var _lastSender = null;

  // ── Add a message bubble ──
  function addBubble(role, text, isTyping) {
    var msgs = document.getElementById('msgs');
    _msgCount++;

    // Hide suggestions after first user message
    if (role === 'user') {
      document.getElementById('suggestionsRow').style.display = 'none';
    }

    var row = document.createElement('div');
    row.className = 'msg-row ' + role;

    // Avatar — only show when sender changes
    var showAv = (role === 'bot' && _lastSender !== 'bot');
    var avEl = document.createElement('div');
    avEl.className = 'msg-av' + (showAv ? '' : ' hide');
    avEl.textContent = '🤖';

    var wrap = document.createElement('div');
    wrap.className = 'msg-wrap';

    var bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    if (isTyping) {
      bubble.className = 'typing-bubble';
      bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    } else {
      // Simple markdown: bold **text**, newlines
      bubble.innerHTML = text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/\n/g,'<br/>');
    }

    var timeEl = document.createElement('div');
    timeEl.className = 'msg-time';
    if (!isTyping) timeEl.textContent = nowTime();

    wrap.appendChild(bubble);
    if (!isTyping) wrap.appendChild(timeEl);

    if (role === 'bot') {
      row.appendChild(avEl);
      row.appendChild(wrap);
    } else {
      row.appendChild(wrap);
    }

    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
    _lastSender = role;
    return { row, bubble, timeEl };
  }

  // ── Add gate card ──
  function addGateCard() {
    var msgs = document.getElementById('msgs');
    var card = document.createElement('div');
    card.className = 'gate-card';
    card.innerHTML = '<div class="gate-icon">🔒</div>'
      + '<h4>AI is a Premium Feature</h4>'
      + '<p>You\'ve used your free session. Start a free trial for unlimited AI tutor access.</p>'
      + '<a href="upgrade.html">🚀 Start Free Trial</a>';
    msgs.appendChild(card);
    msgs.scrollTop = msgs.scrollHeight;
  }

  // ── Send message ──
  async function sendMsg() {
    var input = document.getElementById('chatInput');
    var msg = input.value.trim();
    if (!msg) return;

    if (!_checkAIAccess()) {
      addBubble('user', msg);
      input.value = ''; input.style.height = 'auto';
      addGateCard();
      return;
    }

    input.value = ''; input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    addBubble('user', msg);
    _history.push({role:'user', content:msg});

    var typingRef = addBubble('bot', '', true);

    try {
      var res = await EXAMORA_AI.chat(msg, '', _history.slice(-10));
      _history.push({role:'assistant', content:res.text});

      // Replace typing with real response
      typingRef.bubble.className = 'msg-bubble';
      typingRef.bubble.innerHTML = res.text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/\n/g,'<br/>');
      typingRef.timeEl.textContent = nowTime();

    } catch(e) {
      typingRef.bubble.className = 'msg-bubble';
      if ((e.message||'').includes('AI_KEY_MISSING')) {
        typingRef.bubble.textContent = '🔑 AI not configured yet. Ask your admin to add the OpenRouter key.';
      } else {
        typingRef.bubble.textContent = '⚠️ Could not reach AI right now. Please try again.';
      }
      typingRef.timeEl.textContent = nowTime();
    }

    document.getElementById('sendBtn').disabled = false;
    document.getElementById('msgs').scrollTop = 99999;
  }

  // ── Suggestion chip ──
  function sendSuggestion(el) {
    document.getElementById('chatInput').value = el.textContent;
    sendMsg();
  }

  // ── Clear chat ──
  function clearChat() {
    if (!confirm('Clear this chat?')) return;
    var msgs = document.getElementById('msgs');
    msgs.innerHTML = '<div class="msg-date">Today</div>';
    _history = [];
    _lastSender = null;
    document.getElementById('suggestionsRow').style.display = 'flex';
    addBubble('bot', 'Chat cleared! What would you like to study? 📚');
  }
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey:"AIzaSyA5RUfGUA68-RNyMZPlxaVYj85h5OiJdJw",
    authDomain:"cbt-app-5907f.firebaseapp.com",
    projectId:"cbt-app-5907f",
    storageBucket:"cbt-app-5907f.appspot.com",
    messagingSenderId:"705323924101",
    appId:"1:705323924101:web:ad9f153f25a0685a1287ec"
  });

  const auth = getAuth(app);
  const db   = getFirestore(app);

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = 'login.html'; return; }
    try {
      const snap = await getDoc(doc(db,'users',user.uid));
      const ud   = snap.data() || {};
      localStorage.setItem('examora_plan', ud.plan||'free');
      // Sync AI keys from Firestore
      const aiSnap = await getDoc(doc(db,'settings','ai')).catch(()=>null);
      if (aiSnap && aiSnap.exists()) {
        const keys = aiSnap.data().openRouterKeys || [];
        if (keys.length) localStorage.setItem('examora_ai_keys', JSON.stringify(keys));
      }
      // Show/hide upgrade banner
      if (ud.plan === 'premium' || ud.plan === 'trial') {
        document.getElementById('upgradeBanner').style.display = 'none';
      }
    } catch(_) {}
  });
</script>

<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
</html>
