<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Daily Discover — EXAMORA</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0" rel="stylesheet"/>
<style>
*{box-sizing:border-box;max-width:100%;min-width:0;}
p,span,div,h1,h2,h3,h4,h5,h6,a,li,td,th,label,button,small,strong,em{overflow-wrap:break-word;word-wrap:break-word;}

.page-header{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px;background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
}
.ph-back{width:36px;height:36px;border-radius:var(--r-sm);border:none;background:var(--surface-2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-2);flex-shrink:0;transition:var(--ease);}
.ph-back:hover{background:var(--border);}
.ph-title{font-family:'Sora',sans-serif;font-weight:800;font-size:1rem;color:var(--ink);flex:1;}
.ph-sub{font-size:.68rem;color:var(--ink-3);margin-top:1px;}
.ph-nova{
  width:36px;height:36px;border-radius:var(--r-sm);
  background:linear-gradient(135deg,#6366f1,#06b6d4);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;
  transition:var(--ease);
}
.ph-nova:hover{opacity:.88;transform:scale(1.05);}
.ph-nova svg{width:22px;height:22px;}

/* Feed */
.feed{padding:12px 14px;display:flex;flex-direction:column;gap:14px;}

/* Discover cards */
.dc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden;animation:fadeUp .35s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* Card header */
.dc-head{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px 10px;
}
.dc-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:var(--r-full);
  font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;
}
.dc-refresh{
  margin-left:auto;width:28px;height:28px;border-radius:50%;
  border:none;background:var(--surface-2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-3);transition:all .2s;flex-shrink:0;
}
.dc-refresh:hover{background:var(--border);transform:rotate(180deg);}
.dc-refresh .material-symbols-rounded{font-size:.9rem;}

/* NASA card */
.nasa-img{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--surface-2);display:block;}
.nasa-img-placeholder{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#0d1030,#1a1060);display:flex;align-items:center;justify-content:center;font-size:3rem;}
.dc-body{padding:14px;}
.dc-title{font-family:'Sora',sans-serif;font-weight:800;font-size:.92rem;color:var(--ink);margin-bottom:6px;line-height:1.35;}
.dc-text{font-size:.82rem;line-height:1.7;color:var(--ink-2);}
.dc-text-clamp{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
.dc-expand{background:none;border:none;color:var(--brand);font-size:.75rem;font-weight:700;cursor:pointer;padding:2px 0;margin-top:4px;}

/* Actions row */
.dc-actions{display:flex;gap:8px;padding:0 14px 14px;}
.dc-btn{
  flex:1;padding:9px 10px;border-radius:var(--r-md);
  border:1.5px solid var(--border);background:var(--surface-2);
  font-family:'Sora',sans-serif;font-weight:700;font-size:.72rem;
  color:var(--ink-2);cursor:pointer;transition:all .18s;
  display:flex;align-items:center;justify-content:center;gap:5px;
  text-decoration:none;
}
.dc-btn.primary{background:var(--brand-pale);border-color:var(--brand);color:var(--brand);}
.dc-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-pale);}

/* Stat cards */
.dc-stat{display:flex;align-items:center;gap:14px;padding:14px;}
.dc-stat-icon{font-size:2.4rem;flex-shrink:0;}
.dc-stat-body{flex:1;min-width:0;}
.dc-stat-num{font-family:'Sora',sans-serif;font-weight:900;font-size:1.6rem;color:var(--ink);line-height:1;}
.dc-stat-label{font-size:.7rem;color:var(--ink-3);margin-top:3px;}

/* Quote card */
.quote-body{padding:18px 14px 10px;}
.quote-mark{font-size:3rem;line-height:1;color:var(--brand);opacity:.3;font-family:Georgia,serif;margin-bottom:-12px;}
.quote-text{font-size:.92rem;line-height:1.7;color:var(--ink);font-style:italic;font-weight:500;}
.quote-author{font-size:.75rem;color:var(--brand);font-weight:700;margin-top:8px;}

/* Research card */
.research-item{
  padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:3px;
}
.research-item:last-child{border-bottom:none;}
.ri-title{font-family:'Sora',sans-serif;font-weight:700;font-size:.8rem;color:var(--ink);line-height:1.4;}
.ri-meta{font-size:.68rem;color:var(--ink-3);}
.ri-doi{font-size:.68rem;color:var(--brand);text-decoration:none;}

/* Trivia card */
.trivia-q{padding:14px;font-family:'Sora',sans-serif;font-weight:700;font-size:.9rem;color:var(--ink);line-height:1.5;}
.trivia-opts{padding:0 14px 8px;display:flex;flex-direction:column;gap:6px;}
.tri-opt{
  padding:10px 14px;border-radius:var(--r-md);
  border:1.5px solid var(--border);background:var(--surface-2);
  font-size:.82rem;color:var(--ink-2);cursor:pointer;
  text-align:left;font-family:'Outfit',sans-serif;
  transition:all .18s;
}
.tri-opt:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-pale);}
.tri-opt.correct{background:rgba(16,185,129,.1);border-color:#10b981;color:#065f46;}
.tri-opt.wrong{background:rgba(244,63,94,.08);border-color:#f43f5e;color:#be123c;}
.tri-opt:disabled{cursor:default;}

/* Skeleton */
.skel{background:var(--surface-2);border-radius:var(--r-sm);animation:shimmer 1.4s infinite linear;}
@keyframes shimmer{0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}

.bottom-spacer{height:90px;}
</style>
</head>
<body>

<!-- Header -->
<div class="page-header">
  <button class="ph-back" onclick="history.back()">
    <span class="material-symbols-rounded" style="font-size:1.2rem">arrow_back</span>
  </button>
  <div>
    <div class="ph-title">Daily Discover</div>
    <div class="ph-sub" id="todayDate">Today's learning feed</div>
  </div>
  <a href="nova.html" class="ph-nova" title="Nova Hub">
    <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="13" cy="11" r="3.5" fill="white"/>
      <circle cx="13" cy="41" r="3.5" fill="white"/>
      <circle cx="39" cy="11" r="3.5" fill="white"/>
      <circle cx="39" cy="41" r="3.5" fill="white"/>
      <circle cx="26" cy="26" r="2.8" fill="white" opacity=".75"/>
      <line x1="13" y1="11" x2="13" y2="41" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity=".9"/>
      <line x1="13" y1="11" x2="39" y2="41" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity=".9"/>
      <line x1="39" y1="11" x2="39" y2="41" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity=".9"/>
      <path d="M44 4L45.2 7.2L48.4 8.4L45.2 9.6L44 12.8L42.8 9.6L39.6 8.4L42.8 7.2Z" fill="white" opacity=".85"/>
    </svg>
  </a>
</div>

<!-- Feed -->
<div class="feed" id="feed">

  <!-- NASA APOD Card -->
  <div class="dc" id="nasaCard">
    <div class="dc-head">
      <span class="dc-badge" style="background:linear-gradient(135deg,#0d1030,#1a1060);color:#a5b4fc">🔭 NASA · Space</span>
      <button class="dc-refresh" onclick="loadNASA()" title="Refresh">
        <span class="material-symbols-rounded">refresh</span>
      </button>
    </div>
    <div id="nasaContent">
      <div class="nasa-img-placeholder"><span style="animation:none">🔭</span></div>
      <div class="dc-body">
        <div class="skel" style="height:16px;width:70%;margin-bottom:8px;"></div>
        <div class="skel" style="height:12px;width:100%;margin-bottom:4px;"></div>
        <div class="skel" style="height:12px;width:85%;"></div>
      </div>
    </div>
    <div class="dc-actions">
      <button class="dc-btn primary" onclick="askNova('nasaRaw')">✨ Ask Nova</button>
      <a class="dc-btn" href="https://apod.nasa.gov" target="_blank">NASA Site ↗</a>
    </div>
  </div>

  <!-- Quote Card -->
  <div class="dc" id="quoteCard">
    <div class="dc-head">
      <span class="dc-badge" style="background:rgba(245,158,11,.12);color:#d97706">📜 Quote</span>
      <button class="dc-refresh" onclick="loadQuote()" title="New quote">
        <span class="material-symbols-rounded">refresh</span>
      </button>
    </div>
    <div class="quote-body" id="quoteBody">
      <div class="quote-mark">"</div>
      <div class="skel" style="height:14px;width:100%;margin-bottom:6px;"></div>
      <div class="skel" style="height:14px;width:80%;"></div>
    </div>
    <div class="dc-actions">
      <button class="dc-btn primary" onclick="askNova('quoteRaw')">✨ Nova explains</button>
    </div>
  </div>

  <!-- Number Fact Card -->
  <div class="dc" id="numCard">
    <div class="dc-head">
      <span class="dc-badge" style="background:rgba(99,102,241,.1);color:var(--brand)">🔢 Number Fact</span>
      <button class="dc-refresh" onclick="loadNumber()" title="New fact">
        <span class="material-symbols-rounded">refresh</span>
      </button>
    </div>
    <div class="dc-stat" id="numContent">
      <div class="dc-stat-icon">🔢</div>
      <div class="dc-stat-body">
        <div class="skel" style="height:28px;width:60px;margin-bottom:6px;"></div>
        <div class="skel" style="height:12px;width:200px;"></div>
      </div>
    </div>
    <div class="dc-actions">
      <button class="dc-btn primary" onclick="askNova('numRaw')">✨ Ask Nova about this</button>
    </div>
  </div>

  <!-- Trivia Card -->
  <div class="dc" id="triviaCard">
    <div class="dc-head">
      <span class="dc-badge" style="background:rgba(244,63,94,.08);color:#f43f5e">🎯 Trivia</span>
      <button class="dc-refresh" onclick="loadTrivia()" title="New question">
        <span class="material-symbols-rounded">refresh</span>
      </button>
    </div>
    <div id="triviaContent">
      <div class="dc-body">
        <div class="skel" style="height:14px;width:100%;margin-bottom:6px;"></div>
        <div class="skel" style="height:14px;width:70%;"></div>
      </div>
    </div>
  </div>

  <!-- Research Card -->
  <div class="dc" id="researchCard">
    <div class="dc-head">
      <span class="dc-badge" style="background:rgba(16,185,129,.1);color:#10b981">🔬 Research Spotlight</span>
      <button class="dc-refresh" onclick="loadResearch()" title="Refresh">
        <span class="material-symbols-rounded">refresh</span>
      </button>
    </div>
    <div id="researchContent">
      <div class="dc-body">
        <div class="skel" style="height:14px;width:100%;margin-bottom:8px;"></div>
        <div class="skel" style="height:12px;width:80%;margin-bottom:6px;"></div>
        <div class="skel" style="height:12px;width:60%;"></div>
      </div>
    </div>
    <div class="dc-actions">
      <button class="dc-btn primary" onclick="askNova('researchRaw')">✨ Ask Nova</button>
    </div>
  </div>

  <!-- Advice Card -->
  <div class="dc" id="adviceCard">
    <div class="dc-head">
      <span class="dc-badge" style="background:rgba(139,92,246,.1);color:#8b5cf6">💡 Daily Advice</span>
      <button class="dc-refresh" onclick="loadAdvice()" title="New advice">
        <span class="material-symbols-rounded">refresh</span>
      </button>
    </div>
    <div class="dc-body" id="adviceContent">
      <div class="skel" style="height:14px;width:100%;margin-bottom:6px;"></div>
      <div class="skel" style="height:14px;width:75%;"></div>
    </div>
    <div class="dc-actions">
      <button class="dc-btn primary" onclick="askNova('adviceRaw')">✨ Nova expands on this</button>
    </div>
  </div>

</div>

<div class="bottom-spacer"></div>

<nav class="bottom-nav">
  <a href="index.html"       class="nav-item"><span class="nav-icon material-symbols-rounded">home</span><span class="nav-label">Home</span></a>
  <a href="exam.html"        class="nav-item"><span class="nav-icon material-symbols-rounded">edit_note</span><span class="nav-label">Exam</span></a>
  <a href="discover.html"    class="nav-item nav-item--active"><span class="nav-icon material-symbols-rounded">explore</span><span class="nav-label">Discover</span></a>
  <a href="leaderboard.html" class="nav-item"><span class="nav-icon material-symbols-rounded">emoji_events</span><span class="nav-label">Ranks</span></a>
  <a href="profile.html"     class="nav-item"><span class="nav-icon material-symbols-rounded">person</span><span class="nav-label">Profile</span></a>
</nav>

<script>
var _t = localStorage.getItem('examora_theme') || 'light';
document.documentElement.setAttribute('data-theme', _t);

// Set today's date
(function() {
  var el = document.getElementById('todayDate');
  if (el) el.textContent = new Date().toLocaleDateString('en-NG', {weekday:'long',day:'numeric',month:'long'});
})();

// Store raw content for "Ask Nova" buttons
var _rawContent = {
  nasaRaw:'', quoteRaw:'', numRaw:'', researchRaw:'', adviceRaw:''
};

function askNova(key) {
  var text = _rawContent[key] || 'Tell me something interesting about today\'s discovery.';
  window.location.href = 'chat.html?q=' + encodeURIComponent('Tell me more about: ' + text.substring(0,200));
}

// ── NASA APOD ──────────────────────────────────────────────
async function loadNASA() {
  var el = document.getElementById('nasaContent');
  el.innerHTML = '<div class="nasa-img-placeholder">🔭</div><div class="dc-body"><div class="skel" style="height:16px;width:70%;margin-bottom:8px;"></div><div class="skel" style="height:12px;width:100%;"></div></div>';
  var NASA_KEY = 'pT3PK2O6megnHuLXuTWGhmXlQomVdrOFfEfqJAAo';
  try {
    var r = await fetch('https://api.nasa.gov/planetary/apod?api_key=' + NASA_KEY);
    var d = await r.json();
    var imgHtml = d.media_type === 'image'
      ? '<img class="nasa-img" src="' + d.url + '" alt="' + (d.title||'') + '" loading="lazy" onerror="this.style.display=\'none\'">'
      : '<div class="nasa-img-placeholder">🎬</div>';
    var expln = d.explanation || '';
    var short = expln.length > 300 ? expln.substring(0,300) + '…' : expln;
    el.innerHTML =
      imgHtml +
      '<div class="dc-body">' +
        '<div class="dc-title">' + (d.title || 'Astronomy Picture of the Day') + '</div>' +
        '<div class="dc-text dc-text-clamp" id="nasaExp">' + short + '</div>' +
        (expln.length > 300 ? '<button class="dc-expand" onclick="expandText(\'nasaExp\','+JSON.stringify(expln)+')">Read more ↓</button>' : '') +
        '<div style="font-size:.65rem;color:var(--ink-3);margin-top:6px;">' + (d.date||'') + (d.copyright ? ' · © ' + d.copyright : '') + '</div>' +
      '</div>';
    _rawContent.nasaRaw = (d.title || '') + '. ' + expln.substring(0,300);
  } catch(e) {
    el.innerHTML = '<div class="dc-body"><div class="dc-title">Astronomy Picture of the Day</div><div class="dc-text">The NASA Astronomy Picture of the Day showcases a different image or photograph of our universe each day. Today Nova couldn\'t load the image — check back later or visit apod.nasa.gov.</div></div>';
    _rawContent.nasaRaw = 'NASA Astronomy Picture of the Day — daily space images from NASA.';
  }
}

// ── Quote ──────────────────────────────────────────────────
async function loadQuote() {
  var el = document.getElementById('quoteBody');
  el.innerHTML = '<div class="quote-mark">"</div><div class="skel" style="height:14px;width:100%;margin-bottom:6px;"></div><div class="skel" style="height:14px;width:80%;"></div>';
  try {
    var r = await fetch('https://api.quotable.io/quotes/random?maxLength=200');
    var d = await r.json();
    var q = Array.isArray(d) ? d[0] : d;
    el.innerHTML = '<div class="quote-mark">"</div><div class="quote-text">' + q.content + '</div><div class="quote-author">— ' + q.author + '</div>';
    _rawContent.quoteRaw = q.content + ' — ' + q.author;
  } catch(_) {
    var fallbacks = [
      {content:'The secret of getting ahead is getting started.',author:'Mark Twain'},
      {content:'Education is not the filling of a pail, but the lighting of a fire.',author:'W.B. Yeats'},
      {content:'An investment in knowledge pays the best interest.',author:'Benjamin Franklin'}
    ];
    var q = fallbacks[Math.floor(Math.random()*fallbacks.length)];
    el.innerHTML = '<div class="quote-mark">"</div><div class="quote-text">' + q.content + '</div><div class="quote-author">— ' + q.author + '</div>';
    _rawContent.quoteRaw = q.content + ' — ' + q.author;
  }
}

// ── Number Fact ────────────────────────────────────────────
var _numList = [42,7,0,1,1000,365,3.14159,100,12,60,24,1000000,pi=3.14,googol=1];
async function loadNumber() {
  var el = document.getElementById('numContent');
  el.innerHTML = '<div class="dc-stat-icon">🔢</div><div class="dc-stat-body"><div class="skel" style="height:28px;width:60px;margin-bottom:6px;"></div><div class="skel" style="height:12px;width:200px;"></div></div>';
  var n = Math.floor(Math.random() * 1000) + 1;
  try {
    var r = await fetch('https://numbersapi.com/' + n + '/trivia?json');
    var d = await r.json();
    el.innerHTML = '<div class="dc-stat-icon">🔢</div><div class="dc-stat-body"><div class="dc-stat-num">' + n + '</div><div class="dc-text" style="margin-top:4px;font-size:.82rem;">' + (d.text || d.toString()) + '</div></div>';
    _rawContent.numRaw = n + ': ' + (d.text || '');
  } catch(_) {
    var facts = [
      {n:42,t:'42 is known as the "Answer to the Ultimate Question of Life, the Universe, and Everything" from The Hitchhiker\'s Guide.'},
      {n:1,t:'1 is the only number that is neither prime nor composite. It is the multiplicative identity.'},
      {n:7,t:'7 is considered the most universally popular "lucky" number across many cultures worldwide.'}
    ];
    var f = facts[Math.floor(Math.random()*facts.length)];
    el.innerHTML = '<div class="dc-stat-icon">🔢</div><div class="dc-stat-body"><div class="dc-stat-num">' + f.n + '</div><div class="dc-text" style="margin-top:4px;font-size:.82rem;">' + f.t + '</div></div>';
    _rawContent.numRaw = f.n + ': ' + f.t;
  }
}

// ── Trivia ─────────────────────────────────────────────────
var _triviaCorrect = '';
async function loadTrivia() {
  var el = document.getElementById('triviaContent');
  el.innerHTML = '<div class="dc-body"><div class="skel" style="height:14px;width:100%;margin-bottom:6px;"></div><div class="skel" style="height:14px;width:70%;"></div></div>';
  var cats = [9,17,18,22,23,20];
  var cat = cats[Math.floor(Math.random()*cats.length)];
  try {
    var r = await fetch('https://opentdb.com/api.php?amount=1&type=multiple&category=' + cat);
    var d = await r.json();
    var q = d.results[0];
    var question = q.question.replace(/&quot;/g,'"').replace(/&#039;/g,"'").replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&eacute;/g,'é');
    var correct = q.correct_answer.replace(/&quot;/g,'"').replace(/&#039;/g,"'").replace(/&amp;/g,'&');
    _triviaCorrect = correct;
    var allOpts = [...q.incorrect_answers, q.correct_answer].sort(() => Math.random() - .5);
    var optsHtml = allOpts.map(function(o) {
      var clean = o.replace(/&quot;/g,'"').replace(/&#039;/g,"'").replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
      return '<button class="tri-opt" onclick="selectTrivia(this,'+JSON.stringify(clean)+','+JSON.stringify(correct)+')">' + clean + '</button>';
    }).join('');
    el.innerHTML =
      '<div style="padding:6px 14px 2px;font-size:.62rem;font-weight:800;color:var(--ink-3);text-transform:uppercase;letter-spacing:.8px;">' + q.category + ' · ' + q.difficulty + '</div>' +
      '<div class="trivia-q">' + question + '</div>' +
      '<div class="trivia-opts">' + optsHtml + '</div>';
  } catch(_) {
    var fallQ = [
      {q:'What is the chemical symbol for Gold?',a:'Au',opts:['Go','Gd','Au','Ag']},
      {q:'Which planet is known as the Red Planet?',a:'Mars',opts:['Venus','Mars','Jupiter','Saturn']},
      {q:'How many continents are on Earth?',a:'7',opts:['5','6','7','8']}
    ];
    var fq = fallQ[Math.floor(Math.random()*fallQ.length)];
    _triviaCorrect = fq.a;
    var optsHtml = fq.opts.sort(()=>Math.random()-.5).map(function(o) {
      return '<button class="tri-opt" onclick="selectTrivia(this,'+JSON.stringify(o)+','+JSON.stringify(fq.a)+')">' + o + '</button>';
    }).join('');
    el.innerHTML = '<div class="trivia-q">' + fq.q + '</div><div class="trivia-opts">' + optsHtml + '</div>';
  }
}

function selectTrivia(btn, selected, correct) {
  var opts = btn.closest('.trivia-opts').querySelectorAll('.tri-opt');
  opts.forEach(function(b) {
    b.disabled = true;
    if (b.textContent.trim() === correct) b.classList.add('correct');
    else if (b === btn) b.classList.add('wrong');
  });
  // Add Nova explanation prompt
  var container = btn.closest('.dc');
  var existing = container.querySelector('.dc-actions');
  if (!existing) {
    var acts = document.createElement('div');
    acts.className = 'dc-actions';
    acts.innerHTML = '<button class="dc-btn primary" onclick="askNova(\'triviaQ\')">✨ Nova explains the answer</button>';
    container.appendChild(acts);
  }
  var qEl = container.querySelector('.trivia-q');
  _rawContent.triviaQ = (qEl ? qEl.textContent : '') + ' The answer is: ' + correct;
  _rawContent.numRaw = _rawContent.numRaw || ''; // keep
}

// ── Research ───────────────────────────────────────────────
var _researchTopics = ['photosynthesis','quantum physics','Nigerian history','human brain','climate change','machine learning','mathematics','biology cells','African literature'];
async function loadResearch() {
  var el = document.getElementById('researchContent');
  el.innerHTML = '<div class="dc-body"><div class="skel" style="height:14px;width:100%;margin-bottom:8px;"></div><div class="skel" style="height:12px;width:80%;margin-bottom:6px;"></div><div class="skel" style="height:12px;width:60%;"></div></div>';
  var topic = _researchTopics[Math.floor(Math.random() * _researchTopics.length)];
  try {
    var r = await fetch('https://api.crossref.org/works?query=' + encodeURIComponent(topic) + '&rows=3&sort=relevance');
    var d = await r.json();
    var items = d.message.items.slice(0,3);
    var html = items.map(function(item) {
      var title = Array.isArray(item.title) ? item.title[0] : (item.title || 'Research Paper');
      var authors = (item.author || []).slice(0,2).map(function(a){ return a.family; }).join(', ');
      var year = item.published && item.published['date-parts'] ? item.published['date-parts'][0][0] : '';
      var doi = item.DOI || '';
      return '<div class="research-item">' +
        '<div class="ri-title">' + title.substring(0,90) + (title.length > 90 ? '…' : '') + '</div>' +
        '<div class="ri-meta">' + (authors ? authors + ' · ' : '') + year + '</div>' +
        (doi ? '<a class="ri-doi" href="https://doi.org/' + doi + '" target="_blank">doi.org/' + doi.substring(0,20) + '… ↗</a>' : '') +
      '</div>';
    }).join('');
    el.innerHTML = '<div style="padding:10px 14px 4px;font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-3);">Topic: ' + topic + '</div>' + html;
    _rawContent.researchRaw = topic + ' — ' + items.map(function(i){ return Array.isArray(i.title)?i.title[0]:i.title; }).join('; ').substring(0,200);
  } catch(_) {
    el.innerHTML = '<div class="dc-body"><div class="dc-title">Research on: ' + topic + '</div><div class="dc-text">CrossRef indexes over 100 million research papers. Nova can explain any topic from this database. Ask me about ' + topic + '.</div></div>';
    _rawContent.researchRaw = 'Current research on: ' + topic;
  }
}

// ── Advice ─────────────────────────────────────────────────
async function loadAdvice() {
  var el = document.getElementById('adviceContent');
  el.innerHTML = '<div class="skel" style="height:14px;width:100%;margin-bottom:6px;"></div><div class="skel" style="height:14px;width:75%;"></div>';
  try {
    var r = await fetch('https://api.adviceslip.com/advice', {cache:'no-cache'});
    var d = await r.json();
    el.innerHTML = '<div class="dc-title" style="font-size:.95rem;">💡 ' + d.slip.advice + '</div>';
    _rawContent.adviceRaw = d.slip.advice;
  } catch(_) {
    var fallbackAdvice = ['Start before you feel ready. Momentum creates confidence.','Read something new every day — even five minutes changes your brain.','The people who are crazy enough to think they can change the world are the ones who do.'];
    var a = fallbackAdvice[Math.floor(Math.random()*fallbackAdvice.length)];
    el.innerHTML = '<div class="dc-title" style="font-size:.95rem;">💡 ' + a + '</div>';
    _rawContent.adviceRaw = a;
  }
}

function expandText(id, full) {
  var el = document.getElementById(id);
  if (el) { el.classList.remove('dc-text-clamp'); el.textContent = full; }
  var btn = el.nextElementSibling;
  if (btn && btn.classList.contains('dc-expand')) btn.remove();
}

// Load everything on page load
window.addEventListener('DOMContentLoaded', function() {
  loadNASA();
  loadQuote();
  loadNumber();
  loadTrivia();
  loadResearch();
  loadAdvice();
});
</script>
