<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign In — EXAMORA</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0" rel="stylesheet"/>
<style>
  /* ── overflow protection patch ── */
  * { box-sizing: border-box; max-width: 100%; min-width: 0; }
  p,span,div,h1,h2,h3,h4,h5,h6,a,li,td,th,label,button,small,strong,em {
    overflow-wrap: break-word; word-wrap: break-word;
  }
:root{--max-width:480px;}
.wrap{max-width:var(--max-width);margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;justify-content:center;padding:24px 20px 48px;}
.logo-wrap{text-align:center;margin-bottom:32px;}
.logo-icon{width:68px;height:68px;border-radius:22px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:inline-flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:12px;box-shadow:0 8px 32px rgba(99,102,241,0.35);}
.logo-name{font-family:var(--fd, 'Sora', sans-serif);font-weight:900;font-size:1.7rem;color:var(--text);letter-spacing:-0.5px;}
.logo-sub{font-size:0.78rem;color:var(--text-3);margin-top:3px;}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:24px;padding:24px 20px 20px;}
.tabs{display:flex;background:var(--bg-input);border-radius:12px;padding:3px;margin-bottom:20px;}
.tab{flex:1;padding:9px;text-align:center;border-radius:9px;font-family:var(--fd, 'Sora', sans-serif);font-weight:700;font-size:0.8rem;cursor:pointer;transition:all 0.18s;color:var(--text-3);}
.tab.on{background:var(--bg-card);color:var(--c-brand);box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.fg{margin-bottom:14px;}
.fl{display:block;font-weight:600;font-size:0.76rem;color:var(--text-2);margin-bottom:6px;}
.fi{width:100%;padding:12px 14px;background:var(--bg-input);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--fb, 'Outfit', sans-serif);font-size:0.88rem;transition:all 0.18s;outline:none;box-sizing:border-box;}
.fi:focus{border-color:var(--c-brand);background:var(--bg-card);box-shadow:0 0 0 3px rgba(99,102,241,0.12);}
.fi::placeholder{color:var(--text-3);}
.pw-wrap{position:relative;}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-3);padding:4px;font-size:0.9rem;}
.forgot{display:block;text-align:right;font-size:0.74rem;color:var(--c-brand);font-weight:600;cursor:pointer;margin-top:-6px;margin-bottom:16px;}
.btn-main{width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;border-radius:12px;font-family:var(--fd, 'Sora', sans-serif);font-weight:800;font-size:0.9rem;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px rgba(99,102,241,0.35);}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(99,102,241,0.45);}
.btn-main:active{transform:scale(0.98);}
.btn-main:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-txt{font-size:0.7rem;color:var(--text-3);font-weight:600;flex-shrink:0;}

.err{display:none;padding:10px 14px;background:rgba(244,63,94,0.08);border:1px solid rgba(244,63,94,0.25);border-radius:10px;font-size:0.78rem;color:var(--c-red);font-weight:600;margin-bottom:12px;line-height:1.5;}
.err.on{display:block;}
.ok{display:none;padding:10px 14px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.25);border-radius:10px;font-size:0.78rem;color:var(--c-green);font-weight:600;margin-bottom:12px;line-height:1.5;}
.ok.on{display:block;}
.tnote{font-size:0.68rem;color:var(--text-3);text-align:center;margin-top:14px;line-height:1.6;}
.tnote a{color:var(--c-brand);text-decoration:none;font-weight:600;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-wrap">
    <div class="logo-icon">📚</div>
    <div class="logo-name">EXAMORA</div>
    <div class="logo-sub">Nigeria's smartest exam prep — powered by AI</div>
  </div>

  <div class="card">
    <div class="tabs">
      <div class="tab on" id="tab-in" onclick="setMode('login')">Sign In</div>
      <div class="tab" id="tab-up" onclick="setMode('register')">Create Account</div>
    </div>

    <div class="err" id="errBox"></div>
    <div class="ok"  id="okBox"></div>

    <div class="fg">
      <label class="fl">Email address</label>
      <input class="fi" type="email" id="emailInput" placeholder="you@email.com" autocomplete="email"/>
    </div>
    <div class="fg">
      <label class="fl">Password</label>
      <div class="pw-wrap">
        <input class="fi" type="password" id="passInput" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuth()"/>
        <button class="pw-eye" onclick="togglePw()" type="button">👁</button>
      </div>
    </div>

    <span class="forgot" id="forgotBtn" onclick="forgotPw()">Forgot password?</span>

    <button class="btn-main" id="mainBtn" onclick="doAuth()">Sign In →</button>
    <div id="spamHint" style="display:none;margin-top:12px;padding:10px 14px;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);border-radius:10px;font-size:.75rem;color:#d97706;line-height:1.6;">
      📬 After signing up, check your <strong>inbox and spam/junk folder</strong> for the verification email. You must verify before you can sign in.
    </div>


    <div class="tnote">By continuing you agree to our <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a></div>
  </div>
</div>

<script>
const _t = localStorage.getItem('examora_theme') || 'light';
document.documentElement.setAttribute('data-theme', _t);

var _mode = 'login';

function setMode(m) {
  _mode = m;
  document.getElementById('tab-in').classList.toggle('on', m === 'login');
  document.getElementById('tab-up').classList.toggle('on', m === 'register');
  document.getElementById('mainBtn').textContent = m === 'login' ? 'Sign In →' : 'Create Account →';
  document.getElementById('forgotBtn').style.display = m === 'login' ? 'block' : 'none';
  var hint = document.getElementById('spamHint');
  if (hint) hint.style.display = m === 'register' ? 'block' : 'none';
  clearMsg();
}

function showErr(msg) {
  document.getElementById('errBox').textContent = msg;
  document.getElementById('errBox').classList.add('on');
  document.getElementById('okBox').classList.remove('on');
}
function showOk(msg) {
  document.getElementById('okBox').textContent = msg;
  document.getElementById('okBox').classList.add('on');
  document.getElementById('errBox').classList.remove('on');
}
function clearMsg() {
  document.getElementById('errBox').classList.remove('on');
  document.getElementById('okBox').classList.remove('on');
}

function togglePw() {
  var inp = document.getElementById('passInput');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function busy(on) {
  var btn = document.getElementById('mainBtn');
  btn.disabled = on;
  btn.textContent = on ? 'Please wait...' : (_mode === 'login' ? 'Sign In →' : 'Create Account →');
}

function doAuth() { _mode === 'login' ? signIn() : register(); }

var ERRS = {
  'auth/user-not-found': 'No account found with that email.',
  'auth/wrong-password': 'Incorrect password.',
  'auth/invalid-credential': 'Invalid email or password.',
  'auth/invalid-email': 'Invalid email address.',
  'auth/too-many-requests': 'Too many attempts. Try again later.',
  'auth/email-already-in-use': 'An account with this email already exists.',
  'auth/weak-password': 'Password must be at least 6 characters.',
  'auth/network-request-failed': 'No internet connection.'
};

async function signIn() {
  var email = document.getElementById('emailInput').value.trim();
  var pass  = document.getElementById('passInput').value;
  if (!email || !pass) { showErr('Please fill in all fields.'); return; }
  busy(true);
  try {
    var cred = await window._signIn(email, pass);
    if (!cred.user.emailVerified) {
      showErr('📧 Please verify your email before signing in. Check your inbox and spam/junk folder for the verification link.');
      busy(false); return;
    }
    localStorage.setItem('examora_user_display', cred.user.displayName || email.split('@')[0]);
    window.location.href = 'index.html';
  } catch(e) { showErr(ERRS[e.code] || e.message || 'Sign in failed.'); busy(false); }
}

async function register() {
  var email = document.getElementById('emailInput').value.trim();
  var pass  = document.getElementById('passInput').value;
  if (!email || !pass) { showErr('Please fill in all fields.'); return; }
  if (pass.length < 6) { showErr('Password must be at least 6 characters.'); return; }
  busy(true);
  try {
    var cred = await window._register(email, pass);
    await window._sendVerification(cred.user);
    await window._createDoc(cred.user);
    showOk('✅ Account created! A verification email has been sent. Please check your inbox — and your spam/junk folder just in case. Verify your email before signing in.');
    setMode('login');
  } catch(e) { showErr(ERRS[e.code] || e.message || 'Registration failed.'); }
  busy(false);
}

async function forgotPw() {
  var email = document.getElementById('emailInput').value.trim();
  if (!email) { showErr('Enter your email address first.'); return; }
  try {
    await window._resetPw(email);
    showOk('Password reset email sent! Check your inbox.');
  } catch(e) { showErr('Could not send reset email. Check the address.'); }
}

</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
         sendPasswordResetEmail, sendEmailVerification,
         onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyA5RUfGUA68-RNyMZPlxaVYj85h5OiJdJw",
  authDomain:"cbt-app-5907f.firebaseapp.com",
  projectId:"cbt-app-5907f",
  storageBucket:"cbt-app-5907f.firebasestorage.app",
  messagingSenderId:"705323924101",
  appId:"1:705323924101:web:ad9f153f25a0685a1287ec"
});
const auth = getAuth(app);
const db   = getFirestore(app);

onAuthStateChanged(auth, user => {
  if (user && user.emailVerified) window.location.href = 'index.html';
});

async function makeDoc(user) {
  const ref  = doc(db, 'users', user.uid);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      displayName: user.displayName || user.email.split('@')[0],
      email: user.email, photoURL: user.photoURL || '',
      plan: 'free', streak: 0, totalExams: 0,
      totalCorrect: 0, totalQuestions: 0,
      badges: [], xp: 0, createdAt: serverTimestamp(), onboarded: false
    }, { merge: true });
    return true;
  }
  return false;
}

window._signIn          = (e,p) => signInWithEmailAndPassword(auth, e, p);
window._register        = (e,p) => createUserWithEmailAndPassword(auth, e, p);
window._sendVerification = u => sendEmailVerification(u);
window._resetPw         = e => sendPasswordResetEmail(auth, e);
window._createDoc       = makeDoc;
</script>
<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
</script>
</body>
</html>
