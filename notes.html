<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Study Notes — EXAMORA</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0" rel="stylesheet"/>
  <style>
    .note-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;cursor:pointer;transition:var(--transition);position:relative;border-left:3px solid var(--note-color,var(--c-brand));}
    .note-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
    .note-title{font-family:var(--font-display);font-weight:700;font-size:0.85rem;margin-bottom:4px;color:var(--text);}
    .note-preview{font-size:0.76rem;color:var(--text-3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .note-meta{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:0.65rem;color:var(--text-3);}
    .note-tag{background:var(--bg-input);padding:2px 8px;border-radius:100px;font-weight:600;}
    /* Editor */
    #editor{display:none;flex-direction:column;height:100dvh;}
    .editor-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg-card);flex-shrink:0;}
    .editor-title{flex:1;border:none;outline:none;font-family:var(--font-display);font-weight:700;font-size:1rem;background:none;color:var(--text);}
    .editor-title::placeholder{color:var(--text-3);}
    .editor-body{flex:1;padding:16px;border:none;outline:none;resize:none;font-family:var(--font-body);font-size:0.86rem;line-height:1.75;background:var(--bg);color:var(--text);width:100%;}
    .editor-body::placeholder{color:var(--text-3);}
    .editor-footer{display:flex;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid var(--border);background:var(--bg-card);flex-shrink:0;flex-wrap:wrap;}
    .color-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:var(--transition);}
    .color-dot.active{border-color:white;transform:scale(1.2);}
    .toolbar-btn{background:none;border:none;color:var(--text-3);cursor:pointer;padding:6px;border-radius:8px;font-size:0.8rem;transition:var(--transition);}
    .toolbar-btn:hover{background:var(--bg-input);color:var(--text);}
    /* AI summarise button */
    .ai-summarise-btn{background:var(--c-brand-pale);color:var(--c-brand);border:1px solid rgba(99,102,241,0.25);border-radius:100px;padding:5px 12px;font-size:0.72rem;font-weight:700;cursor:pointer;transition:var(--transition);}
    .ai-summarise-btn:hover{background:var(--c-brand);color:white;}
    .filter-row{display:flex;gap:6px;overflow-x:auto;padding:0 0 8px;scrollbar-width:none;margin-bottom:4px;}
    .filter-row::-webkit-scrollbar{display:none;}
    .filter-chip{flex-shrink:0;padding:5px 12px;border-radius:100px;font-size:0.72rem;font-weight:600;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-2);cursor:pointer;transition:var(--transition);}
    .filter-chip.active{background:var(--c-brand);color:white;border-color:var(--c-brand);}
    .search-bar{position:relative;margin-bottom:10px;}
    .search-bar input{width:100%;padding:9px 14px 9px 36px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-full);font-size:0.82rem;color:var(--text);outline:none;transition:var(--transition);}
    .search-bar input:focus{border-color:var(--c-brand);}
    .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:1rem;}
  </style>
</head>
<body style="overflow:hidden;">
<div class="app-container" style="overflow:auto;height:100dvh;" id="listView">
  <div class="page-header">
    <button class="icon-btn" onclick="history.back()"><span class="material-symbols-rounded">arrow_back</span></button>
    <div class="page-title">Study Notes</div>
    <button class="icon-btn" onclick="openNote(null)"><span class="material-symbols-rounded">add</span></button>
  </div>
  <div style="padding:16px;">
    <div class="search-bar">
      <span class="material-symbols-rounded search-icon">search</span>
      <input type="text" placeholder="Search notes..." id="searchInput" oninput="renderNotes()"/>
    </div>
    <div class="filter-row" id="filterRow">
      <div class="filter-chip active" onclick="setFilter('',this)">All</div>
    </div>
    <div id="noteList"></div>
  </div>
</div>

<!-- Editor -->
<div id="editor">
  <div class="editor-bar">
    <button class="icon-btn" onclick="closeEditor()"><span class="material-symbols-rounded">arrow_back</span></button>
    <input class="editor-title" id="noteTitle" placeholder="Note title..."/>
    <button class="icon-btn" onclick="saveNote()"><span class="material-symbols-rounded">check</span></button>
    <button class="icon-btn" onclick="deleteCurrentNote()" style="color:var(--c-red);"><span class="material-symbols-rounded">delete</span></button>
  </div>
  <textarea class="editor-body" id="noteBody" placeholder="Start typing your notes here...&#10;&#10;Tips:&#10;• Use AI Summarise to condense long notes&#10;• Tag notes by subject for easy filtering&#10;• Notes are saved automatically"></textarea>
  <div class="editor-footer">
    <span style="font-size:0.7rem;color:var(--text-3);">Colour:</span>
    <div class="color-dot active" style="background:#6366f1;" onclick="setColor('#6366f1',this)"></div>
    <div class="color-dot" style="background:#10b981;" onclick="setColor('#10b981',this)"></div>
    <div class="color-dot" style="background:#f59e0b;" onclick="setColor('#f59e0b',this)"></div>
    <div class="color-dot" style="background:#f43f5e;" onclick="setColor('#f43f5e',this)"></div>
    <div class="color-dot" style="background:#3b82f6;" onclick="setColor('#3b82f6',this)"></div>
    <span style="flex:1;"></span>
    <span style="font-size:0.7rem;color:var(--text-3);" id="charCount">0 words</span>
    <button class="ai-summarise-btn" onclick="aiSummarise()">🤖 AI Summarise</button>
  </div>
  <!-- Tag row -->
  <div style="padding:6px 14px 10px;display:flex;align-items:center;gap:8px;background:var(--bg-card);border-top:1px solid var(--border);">
    <span style="font-size:0.7rem;color:var(--text-3);flex-shrink:0;">Subject:</span>
    <select class="form-select" id="noteSubject" style="flex:1;padding:5px 10px;font-size:0.76rem;border-radius:8px;">
      <option value="">None</option>
      <option>Mathematics</option><option>English Language</option><option>Physics</option>
      <option>Chemistry</option><option>Biology</option><option>Economics</option>
      <option>Government</option><option>Literature</option><option>Geography</option>
      <option>Commerce</option><option>History</option><option>Computer Studies</option>
      <option>Agricultural Science</option><option>Further Mathematics</option>
    </select>
    <span style="font-size:0.68rem;color:var(--text-3);" id="autoSaveMsg"></span>
  </div>
</div>

<div class="toast" id="toast"><span class="toast-icon" id="toastIcon"></span><span id="toastMsg"></span></div>

<script src="ai-engine.js"></script>
<script>
  const _t=localStorage.getItem('examora_theme')||'light';
  document.documentElement.setAttribute('data-theme',_t);

  function toast(msg,type){
    var t=document.getElementById('toast');
    document.getElementById('toastIcon').textContent={success:'✅',error:'❌',warning:'⚠️'}[type]||'ℹ️';
    document.getElementById('toastMsg').textContent=msg;
    t.className='toast show '+(type||'');
    setTimeout(()=>t.className='toast',3000);
  }

  var NOTES_KEY='examora_notes';
  function loadNotes(){try{return JSON.parse(localStorage.getItem(NOTES_KEY)||'[]');}catch(_){return[];}}
  function saveNotes(n){localStorage.setItem(NOTES_KEY,JSON.stringify(n));}

  var _editIdx=null, _noteColor='#6366f1', _activeFilter='';

  function setFilter(tag,el){
    _activeFilter=tag;
    document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
    renderNotes();
  }

  function renderNotes(){
    var notes=loadNotes();
    var q=document.getElementById('searchInput').value.toLowerCase();
    var filtered=notes.filter(n=>{
      var matchFilter=!_activeFilter||(n.subject||'')==_activeFilter;
      var matchSearch=!q||(n.title+n.body).toLowerCase().includes(q);
      return matchFilter&&matchSearch;
    });

    // Build subject filters
    var subjects=[...new Set(notes.map(n=>n.subject).filter(Boolean))];
    var fr=document.getElementById('filterRow');
    fr.innerHTML='<div class="filter-chip'+(!'_activeFilter'?' active':'')+'" onclick="setFilter(\'\',this)">All</div>';
    subjects.forEach(s=>{
      fr.innerHTML+='<div class="filter-chip'+(s===_activeFilter?' active':'')+'" onclick="setFilter(\''+s+'\',this)">'+s+'</div>';
    });
    if(_activeFilter) fr.querySelector('[onclick*="'+_activeFilter+'"]')&&fr.querySelector('[onclick*="'+_activeFilter+'"]').classList.add('active');
    else fr.querySelector('[onclick*="\'\',this"]')&&fr.querySelector('[onclick*="\'\',this"]').classList.add('active');

    if(!filtered.length){
      document.getElementById('noteList').innerHTML=
        '<div style="text-align:center;padding:40px;color:var(--text-3);"><div style="font-size:2rem;margin-bottom:8px;">📝</div>'
        +'<div style="font-size:0.82rem;">'+(notes.length?'No notes match your search':'No notes yet. Tap + to start writing')+'</div></div>';
      return;
    }
    document.getElementById('noteList').innerHTML=filtered.map(function(n,i){
      var realIdx=notes.indexOf(n);
      var date=new Date(n.updated||n.created).toLocaleDateString(undefined,{day:'numeric',month:'short'});
      return '<div class="note-card" style="--note-color:'+n.color+';" onclick="openNote('+realIdx+')">'
        +'<div class="note-title">'+(n.title||'Untitled')+'</div>'
        +'<div class="note-preview">'+n.body+'</div>'
        +'<div class="note-meta"><span class="note-tag">'+(n.subject||'General')+'</span><span>'+date+'</span>'
        +'<span>'+countWords(n.body)+' words</span>'
        +'</div></div>';
    }).join('');
  }

  function countWords(s){return (s||'').trim().split(/\s+/).filter(Boolean).length;}

  var _autoSaveTimer=null;
  function openNote(idx){
    _editIdx=idx;
    var note=idx!==null?loadNotes()[idx]:{title:'',body:'',color:'#6366f1',subject:'',created:Date.now()};
    _noteColor=note.color||'#6366f1';
    document.getElementById('noteTitle').value=note.title||'';
    document.getElementById('noteBody').value=note.body||'';
    document.getElementById('noteSubject').value=note.subject||'';
    document.querySelectorAll('.color-dot').forEach(d=>{d.classList.toggle('active',d.style.background===_noteColor||d.style.backgroundColor===_noteColor);});
    updateWordCount();
    document.getElementById('listView').style.display='none';
    document.getElementById('editor').style.display='flex';
    document.getElementById('noteBody').focus();
    // Auto-save every 3s
    _autoSaveTimer=setInterval(autoSave,3000);
  }

  function closeEditor(){
    clearInterval(_autoSaveTimer);
    saveNote();
    document.getElementById('editor').style.display='none';
    document.getElementById('listView').style.display='block';
    renderNotes();
  }

  function setColor(c,el){
    _noteColor=c;
    document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('active'));
    el.classList.add('active');
  }

  function updateWordCount(){
    var w=countWords(document.getElementById('noteBody').value);
    document.getElementById('charCount').textContent=w+' word'+(w!==1?'s':'');
  }
  document.addEventListener('DOMContentLoaded',function(){
    document.getElementById('noteBody').addEventListener('input',updateWordCount);
  });

  function autoSave(){
    saveNote(true);
    document.getElementById('autoSaveMsg').textContent='Saved ✓';
    setTimeout(()=>document.getElementById('autoSaveMsg').textContent='',2000);
  }

  function saveNote(silent){
    var notes=loadNotes();
    var note={
      title:document.getElementById('noteTitle').value||'Untitled',
      body:document.getElementById('noteBody').value,
      color:_noteColor,
      subject:document.getElementById('noteSubject').value,
      updated:Date.now()
    };
    if(_editIdx===null){note.created=Date.now();notes.unshift(note);_editIdx=0;}
    else{note.created=notes[_editIdx].created;notes[_editIdx]=note;}
    saveNotes(notes);
    if(!silent) toast('Note saved ✓','success');
  }

  function deleteCurrentNote(){
    if(_editIdx===null||!confirm('Delete this note?')) return;
    var notes=loadNotes();
    notes.splice(_editIdx,1);
    saveNotes(notes);
    clearInterval(_autoSaveTimer);
    document.getElementById('editor').style.display='none';
    document.getElementById('listView').style.display='block';
    renderNotes();
    toast('Note deleted','success');
  }

  async function aiSummarise(){
    var body=document.getElementById('noteBody').value.trim();
    if(body.length<50){toast('Note too short to summarise','warning');return;}
    var btn=document.querySelector('.ai-summarise-btn');
    btn.textContent='⏳ Summarising...'; btn.disabled=true;
    try{
      var r=await EXAMORA_AI.call([{role:'user',content:'Summarise these study notes into clear, concise bullet points that are easy to memorise. Keep all key facts:\n\n'+body}],400,0.3);
      var summary='\n\n── AI SUMMARY ──\n'+r.text+'\n── END SUMMARY ──';
      document.getElementById('noteBody').value+=summary;
      updateWordCount();
      toast('Summary added to note ✓','success');
    }catch(e){toast('AI error: '+(e.message||'Try again'),'error');}
    btn.textContent='🤖 AI Summarise'; btn.disabled=false;
  }

  renderNotes();
</script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const app=initializeApp({apiKey:"AIzaSyA5RUfGUA68-RNyMZPlxaVYj85h5OiJdJw",authDomain:"cbt-app-5907f.firebaseapp.com",projectId:"cbt-app-5907f",storageBucket:"cbt-app-5907f.appspot.com",messagingSenderId:"705323924101",appId:"1:705323924101:web:ad9f153f25a0685a1287ec"});
  const auth=getAuth(app),db=getFirestore(app);
  onAuthStateChanged(auth,async user=>{
    if(!user){window.location.href='login.html';return;}
    try{const s=await getDoc(doc(db,'users',user.uid));localStorage.setItem('examora_plan',(s.data()||{}).plan||'free');}catch(_){}
    const aiSnap=await getDoc(doc(db,'settings','ai')).catch(()=>null);
    if(aiSnap&&aiSnap.exists()){const k=aiSnap.data().openRouterKeys||[];if(k.length)localStorage.setItem('examora_ai_keys',JSON.stringify(k));}
  });
</script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});</script>
</body>
</html>
