<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EXAMORA — Saved Questions</title>
  <link rel="stylesheet" href="style.css"/>
    <link rel="icon" type="image/png" href="logo.png"/>
  <link rel="apple-touch-icon" href="logo.png"/>
  <link rel="manifest" href="manifest.json"/>
  <meta property="og:title" content="EXAMORA — The Smart Exam Prep Platform"/>
  <meta property="og:description" content="Prepare smarter for any exam — SAT, IELTS, GRE, JAMB, A-Levels and more. AI explanations and leaderboards."/>
  <meta property="og:image" content="og-image.png"/>
  <meta name="application-name" content="EXAMORA"/>
  <meta name="theme-color" content="#0f172a"/>
  <style>
    /* ── Hero ── */
    .bm-hero {
      background: linear-gradient(160deg, #0f172a 0%, #0c2340 60%, #0f172a 100%);
      padding: 28px 20px 24px;
      position: relative; overflow: hidden;
    }
    .bm-hero::before {
      content:''; position:absolute; top:-50px; right:-50px;
      width:160px; height:160px; border-radius:50%;
      background:rgba(59,130,246,0.12); pointer-events:none;
    }
    .bm-hero::after {
      content:''; position:absolute; bottom:-30px; left:-30px;
      width:100px; height:100px; border-radius:50%;
      background:rgba(16,185,129,0.08); pointer-events:none;
    }
    .bm-hero-title {
      font-family:'Plus Jakarta Sans',sans-serif; font-weight:800;
      font-size:1.4rem; color:white; letter-spacing:-0.5px;
      margin-bottom:4px; position:relative; z-index:1;
    }
    .bm-hero-sub {
      font-size:0.76rem; color:rgba(255,255,255,0.4);
      position:relative; z-index:1;
    }

    /* ── Bookmark card ── */
    .bm-card {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:16px; padding:14px;
      margin-bottom:10px; box-shadow:var(--shadow-sm);
      position:relative; overflow:hidden;
      transition:all 0.18s ease;
    }
    .bm-card:active { transform:scale(0.99); }
    .bm-card::before {
      content:''; position:absolute; left:0; top:0; bottom:0;
      width:3px; background:var(--c-brand); border-radius:0 2px 2px 0;
    }

    .bm-card-header {
      display:flex; align-items:flex-start; gap:10px; margin-bottom:10px;
    }
    .bm-cat-icon {
      width:36px; height:36px; border-radius:10px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:0.9rem; background:var(--c-brand-pale);
    }
    .bm-meta { flex:1; min-width:0; }
    .bm-subject {
      font-family:'Plus Jakarta Sans',sans-serif; font-weight:700;
      font-size:0.78rem; color:var(--text); margin-bottom:3px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .bm-tags { display:flex; gap:4px; flex-wrap:wrap; }
    .bm-tag {
      padding:2px 7px; border-radius:100px; font-size:0.6rem;
      font-weight:700; text-transform:uppercase; letter-spacing:0.4px;
    }
    .bm-tag-cat  { background:var(--c-brand-pale); color:var(--c-brand); }
    .bm-tag-year { background:var(--bg-input); color:var(--text-3); border:1px solid var(--border); }

    .bm-delete-btn {
      width:30px; height:30px; border-radius:9px; flex-shrink:0;
      background:var(--c-red-pale); border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:0.8rem; transition:all 0.15s ease; color:var(--c-red);
    }
    .bm-delete-btn:active { transform:scale(0.9); }

    .bm-question {
      font-size:0.84rem; font-weight:500; color:var(--text);
      line-height:1.6; margin-bottom:10px;
    }

    /* Options (collapsed by default, expand on tap) */
    .bm-options-wrap { overflow:hidden; max-height:0; transition:max-height 0.3s ease; }
    .bm-options-wrap.open { max-height:400px; }

    .bm-option {
      display:flex; align-items:flex-start; gap:8px;
      padding:7px 10px; border-radius:9px; margin-bottom:5px;
      font-size:0.78rem; border:1.5px solid var(--border);
      background:var(--bg-input); color:var(--text-2); line-height:1.4;
    }
    .bm-option.correct-ans {
      background:var(--c-green-pale); border-color:rgba(16,185,129,0.3);
      color:var(--c-green); font-weight:700;
    }
    .bm-opt-letter {
      font-family:'Plus Jakarta Sans',sans-serif; font-weight:800;
      font-size:0.7rem; flex-shrink:0; margin-top:1px; min-width:12px;
    }
    .bm-exp {
      display:none; padding:10px 12px; margin-top:6px;
      background:var(--c-brand-pale); border:1px solid rgba(99,102,241,0.15);
      border-left:3px solid var(--c-brand); border-radius:9px;
      font-size:0.78rem; color:var(--text-2); line-height:1.6;
    }
    .bm-exp.show { display:block; animation:fadeIn 0.2s ease; }

    .bm-footer {
      display:flex; align-items:center; gap:8px; margin-top:8px;
      padding-top:8px; border-top:1px solid var(--border);
    }
    .bm-expand-btn {
      flex:1; padding:6px 10px; border-radius:9px;
      border:1.5px solid var(--border); background:var(--bg-input);
      font-family:'Plus Jakarta Sans',sans-serif; font-weight:700;
      font-size:0.72rem; color:var(--text-2); cursor:pointer;
      transition:all 0.15s ease; text-align:center;
    }
    .bm-expand-btn:active { transform:scale(0.97); }
    .bm-expand-btn:hover { border-color:var(--c-brand); color:var(--c-brand); }

    .bm-practice-btn {
      padding:6px 14px; border-radius:9px;
      background:var(--c-brand-pale); color:var(--c-brand);
      border:1.5px solid rgba(99,102,241,0.25);
      font-family:'Plus Jakarta Sans',sans-serif; font-weight:700;
      font-size:0.72rem; cursor:pointer; transition:all 0.15s ease;
      text-decoration:none; white-space:nowrap;
    }
    .bm-practice-btn:active { transform:scale(0.97); }

    /* ── Search & filters ── */
    .bm-controls {
      padding:14px 16px 0;
      background:var(--bg);
    }
    .search-wrap { position:relative; margin-bottom:10px; }
    .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:0.9rem; color:var(--text-3); }
    .search-input {
      width:100%; padding:10px 12px 10px 36px;
      background:var(--bg-input); border:1.5px solid var(--border);
      border-radius:var(--radius-sm); font-family:var(--font-body);
      font-size:0.86rem; color:var(--text); outline:none;
      transition:var(--transition);
    }
    .search-input:focus { border-color:var(--c-brand); box-shadow:var(--shadow-glow); background:var(--bg-card); }
    .search-input::placeholder { color:var(--text-3); }

    /* ── Summary strip ── */
    .bm-summary {
      display:flex; gap:8px; margin-bottom:14px;
    }
    .bm-sum-chip {
      flex:1; background:var(--bg-card); border:1px solid var(--border);
      border-radius:12px; padding:10px 8px; text-align:center;
      box-shadow:var(--shadow-xs);
    }
    .bm-sum-n {
      font-family:'Plus Jakarta Sans',sans-serif; font-weight:800;
      font-size:1.1rem; display:block; margin-bottom:2px;
    }
    .bm-sum-l { font-size:0.6rem; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:0.5px; }

    /* ── Empty state ── */
    .bm-empty {
      text-align:center; padding:48px 20px;
    }
    .bm-empty .ei { font-size:3rem; margin-bottom:14px; display:block; }
    .bm-empty h4 {
      font-family:'Plus Jakarta Sans',sans-serif; font-weight:700;
      font-size:0.95rem; color:var(--text); margin-bottom:6px;
    }
    .bm-empty p { font-size:0.78rem; color:var(--text-3); line-height:1.6; }

    /* ── Swipe-to-delete hint ── */
    .swipe-hint {
      display:flex; align-items:center; gap:6px;
      font-size:0.68rem; color:var(--text-3); font-weight:600;
      padding:0 16px 10px; justify-content:flex-end;
    }

    /* Practice selected overlay */
    .practice-bar {
      position:fixed; bottom:64px; left:50%; transform:translateX(-50%);
      width:calc(100% - 32px); max-width:calc(var(--max-width) - 32px);
      background:var(--c-brand); border-radius:14px;
      padding:12px 16px; display:none; align-items:center; gap:10px;
      box-shadow:0 8px 24px rgba(99,102,241,0.5); z-index:50;
      animation:fadeInUp 0.3s ease;
    }
    .practice-bar.visible { display:flex; }
    .pb-text {
      font-family:'Plus Jakarta Sans',sans-serif; font-weight:700;
      font-size:0.82rem; color:white; flex:1;
    }
    .pb-btn {
      background:white; color:var(--c-brand);
      font-family:'Plus Jakarta Sans',sans-serif; font-weight:800;
      font-size:0.75rem; padding:7px 14px; border-radius:100px;
      border:none; cursor:pointer; flex-shrink:0;
    }
    .pb-clear {
      background:rgba(255,255,255,0.15); color:white; border:none;
      font-size:0.8rem; cursor:pointer; padding:4px; border-radius:6px;
    }
  </style>
</head>

    <img
      class="app-logo-img"
      src="logo.png"

<script>
  const _t=localStorage.getItem("examora_theme")||"light";
  document.documentElement.setAttribute("data-theme",_t);
  document.getElementById("themeBtn").textContent=_t==="dark"?"☀️":"🌙";
  document.getElementById("themeBtn").addEventListener("click",()=>{
    const c=document.documentElement.getAttribute("data-theme");
    const n=c==="dark"?"light":"dark";
    document.documentElement.setAttribute("data-theme",n);
    localStorage.setItem("examora_theme",n);
    document.getElementById("themeBtn").textContent=n==="dark"?"☀️":"🌙";
  });
  function toast(msg,dur=2600){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),dur);}

  const CAT_ICONS={JAMB:"🎓",WAEC:"📘",SAT:"🇺🇸",IELTS:"🌐","":"📝"};

  let allBookmarks=[], catFilter="", selectedIds=new Set();

  function setCatFilter(cat, btn){
    catFilter=cat;
    document.querySelectorAll(".filter-tab").forEach(t=>t.classList.remove("active"));
    btn.classList.add("active");
    render();
  }

  function filterBookmarks(){ render(); }

  function getFiltered(){
    const q=document.getElementById("searchInput").value.trim().toLowerCase();
    return allBookmarks.filter(b=>{
      const matchCat=!catFilter||(b.category||"")===catFilter;
      const matchQ=!q||
        (b.questionText||"").toLowerCase().includes(q)||
        (b.subject||"").toLowerCase().includes(q)||
        (b.category||"").toLowerCase().includes(q);
      return matchCat&&matchQ;
    });
  }

  function render(){
    const items=getFiltered();
    const list=document.getElementById("bmList");

    if(items.length===0){
      list.innerHTML=`<div class="bm-empty">
        <span class="ei">🔖</span>
        <h4>${allBookmarks.length===0?"No saved questions yet":"No results found"}</h4>
        <p>${allBookmarks.length===0
          ?"While practising, tap the 🔖 Save button on any question\nto add it to your revision library."
          :"Try a different search or filter."}</p>
        ${allBookmarks.length===0?`<a href="exam.html" class="btn btn-primary" style="max-width:200px;margin:16px auto 0;">📝 Start Practising</a>`:""}
      </div>`;
      return;
    }

    list.innerHTML=items.map(b=>{
      const icon=CAT_ICONS[b.category||""]||"📝";
      const opts=b.options?Object.entries(b.options):[];
      const isSel=selectedIds.has(b.id);
      return `<div class="bm-card animate-in ${isSel?"selected-card":""}"
        id="bmc_${b.id}"
        style="${isSel?"border-color:var(--c-brand);background:var(--c-brand-pale);":""}"
        onclick="toggleSelect('${b.id}')">
        <div class="bm-card-header">
          <div class="bm-cat-icon">${icon}</div>
          <div class="bm-meta">
            <div class="bm-subject">${b.subject||b.category||"General"}</div>
            <div class="bm-tags">
              ${b.category?`<span class="bm-tag bm-tag-cat">${b.category}</span>`:""}
              ${b.year?`<span class="bm-tag bm-tag-year">${b.year}</span>`:""}
            </div>
          </div>
          <button class="bm-delete-btn" onclick="event.stopPropagation();deleteBookmark('${b.id}')" title="Remove">🗑</button>
        </div>
        <div class="bm-question">${b.questionText||"Question not available"}</div>
        ${opts.length>0?`
          <div class="bm-footer">
            <button class="bm-expand-btn" id="expBtn_${b.id}"
              onclick="event.stopPropagation();toggleExpand('${b.id}')">
              👁 Show Options & Answer
            </button>
            ${isSel?"":`<a href="exam.html" class="bm-practice-btn" onclick="event.stopPropagation();">📝 Practice</a>`}
          </div>
          <div class="bm-options-wrap" id="optWrap_${b.id}">
            ${opts.map(([l,txt])=>{
              const isAns=l===b.correctAnswer;
              return `<div class="bm-option ${isAns?"correct-ans":""}">
                <span class="bm-opt-letter">${l}</span>
                <span>${txt}${isAns?" ✓":""}</span>
              </div>`;
            }).join("")}
            ${b.explanation?`
              <button class="exp-toggle" onclick="event.stopPropagation();toggleExp('${b.id}')"
                style="display:flex;align-items:center;gap:5px;font-size:0.74rem;font-weight:700;
                  color:var(--c-brand);cursor:pointer;padding:6px 0;background:none;border:none;">
                💡 Show explanation
              </button>
              <div class="bm-exp" id="exp_${b.id}">${b.explanation}</div>`:""}
          </div>`:""}
        <div style="font-size:0.65rem;color:var(--text-3);margin-top:6px;font-weight:600;">
          Saved ${formatDate(b.savedAt)}
        </div>
      </div>`;
    }).join("");
  }

  function toggleExpand(id){
    const wrap=document.getElementById("optWrap_"+id);
    const btn=document.getElementById("expBtn_"+id);
    if(!wrap) return;
    const open=wrap.classList.toggle("open");
    if(btn) btn.textContent=open?"🙈 Hide Options":"👁 Show Options & Answer";
  }

  function toggleExp(id){
    const box=document.getElementById("exp_"+id);
    if(box) box.classList.toggle("show");
  }

  function toggleSelect(id){
    // Don't select if tapping delete
    if(selectedIds.has(id)) selectedIds.delete(id);
    else selectedIds.add(id);
    updatePracticeBar();
    render();
  }

  function updatePracticeBar(){
    const bar=document.getElementById("practiceBar");
    const n=selectedIds.size;
    if(n>0){
      bar.classList.add("visible");
      document.getElementById("pbText").textContent=`${n} question${n!==1?"s":""} selected`;
    } else {
      bar.classList.remove("visible");
    }
  }

  function clearSelection(){ selectedIds.clear(); updatePracticeBar(); render(); }

  function practiceSelected(){
    if(selectedIds.size===0) return;
    const selected=allBookmarks.filter(b=>selectedIds.has(b.id));
    // Store as a mini exam and redirect
    const examData={
      questions: selected.map(b=>({
        id:b.questionId||b.id,
        text:b.questionText,
        question:b.questionText,
        options:b.options||{},
        answer:b.correctAnswer||"",
        explanation:b.explanation||"",
        category:b.category||"",
        subject:b.subject||""
      })),
      mode:"practice"
    };
    localStorage.setItem("examora_bookmark_exam", JSON.stringify(examData));
    toast("Starting practice session...");
    setTimeout(()=>window.location.href="exam.html?mode=bookmarks",500);
  }

  function formatDate(iso){
    if(!iso) return "";
    try{
      return new Date(iso).toLocaleDateString("undefined",{day:"numeric",month:"short",year:"numeric"});
    }catch{ return ""; }
  }

  function confirmClearAll(){
    if(confirm(`Remove all ${allBookmarks.length} saved questions?`)){
      window._clearAll();
    }
  }

  window._onBookmarksLoaded=function(bookmarks){
    document.getElementById("skeletons").style.display="none";
    allBookmarks=bookmarks;

    if(bookmarks.length===0){
      render();
      return;
    }

    // Show summary
    const subjects=new Set(bookmarks.map(b=>b.subject||"").filter(Boolean));
    const categories=new Set(bookmarks.map(b=>b.category||"").filter(Boolean));
    document.getElementById("bmSummary").style.display="flex";
    document.getElementById("sumTotal").textContent=bookmarks.length;
    document.getElementById("sumSubjects").textContent=subjects.size;
    document.getElementById("sumCategories").textContent=categories.size;
    document.getElementById("swipeHint").style.display="flex";
    document.getElementById("clearAllBtn").style.display="flex";
    document.getElementById("heroSub").textContent=
      `${bookmarks.length} question${bookmarks.length!==1?"s":""} saved for revision`;

    // Build category filter tabs
    const catTabsEl=document.getElementById("catTabs");
    ;[...categories].forEach(cat=>{
      const tab=document.createElement("div");
      tab.className="filter-tab";
      tab.textContent=CAT_ICONS[cat]+" "+cat;
      tab.onclick=()=>setCatFilter(cat,tab);
      catTabsEl.appendChild(tab);
    });

    render();
  };

  window.deleteBookmark=async function(id){
    toast("🗑 Removed from bookmarks");
    allBookmarks=allBookmarks.filter(b=>b.id!==id);
    selectedIds.delete(id);
    updatePracticeBar();
    // Update summary
    document.getElementById("sumTotal").textContent=allBookmarks.length;
    if(allBookmarks.length===0){
      document.getElementById("bmSummary").style.display="none";
      document.getElementById("swipeHint").style.display="none";
      document.getElementById("clearAllBtn").style.display="none";
      document.getElementById("heroSub").textContent="Your personal revision library";
    }
    render();
    await window._deleteFromFirestore(id);
  };
</script>

window.toast = toast;

  onAuthStateChanged(auth,async user=>{
    if(!user){window.location.href="login.html";return;}
    uid=user.uid;

    try{
      const snap=await getDocs(query(collection(db,"bookmarks"),where("userId","==",uid)));
      const bookmarks=[];
      snap.forEach(d=>{
        const data={id:d.id,...d.data()};
        bmDocIds[d.id]=d.id;
        bookmarks.push(data);
      });
      bookmarks.sort((a,b)=>(b.savedAt||"").localeCompare(a.savedAt||""));

      // Enrich with full question data where possible
      const enriched=await Promise.all(bookmarks.map(async b=>{
        if(b.questionId&&!b.options){
          try{
            const qSnap=await getDoc(doc(db,"questions",b.questionId));
            if(qSnap.exists()){
              const qd=qSnap.data();
              return {...b,
                options:qd.options||{},
                correctAnswer:qd.answer||"",
                explanation:qd.explanation||"",
                subject:b.subject||qd.subject||"",
                category:b.category||qd.category||""
              };
            }
          }catch(_){}
        }
        return b;
      }));

      window._onBookmarksLoaded(enriched);
    }catch(e){
      console.error("Bookmarks load error:",e);
      document.getElementById("skeletons").innerHTML=
        `<div style="text-align:center;padding:40px 20px;">
          <div style="font-size:2rem;margin-bottom:10px;">⚠️</div>
          <p style="font-size:0.82rem;color:var(--text-3);">Could not load bookmarks.<br/>Check your connection.</p>
        </div>`;
    }
  });

  window._deleteFromFirestore=async(id)=>{
    if(!uid||!id) return;
    try{ await deleteDoc(doc(db,"bookmarks",id)); }catch(e){console.error("Delete error:",e);}
  };

  window._clearAll=async()=>{
    if(!uid) return;
    try{
      const snap=await getDocs(query(collection(db,"bookmarks"),where("userId","==",uid)));
      const batch=writeBatch(db);
      snap.forEach(d=>batch.delete(d.ref));
      await batch.commit();
      allBookmarks=[]; selectedIds.clear();
      window._onBookmarksLoaded([]);
      window.toast("All bookmarks cleared");
    }catch(e){window.toast("Could not clear bookmarks");}
  };
</script>
<script>
  if("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(()=>{});
</script>
