<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EXAMORA — Formula Sheet</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" type="image/png" href="logo.png"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0f172a"/>
  <style>
    .fs-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }
    .icon-btn { width:36px;height:36px;border-radius:10px;border:none;background:var(--bg-input);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);flex-shrink:0; }
    .fs-title { font-family:var(--font-display);font-weight:800;font-size:1rem;color:var(--text);flex:1; }

    /* Search */
    .search-wrap { padding: 12px 16px; }
    .search-box {
      width: 100%; padding: 11px 14px 11px 40px;
      background: var(--bg-input); border: 1.5px solid var(--border);
      border-radius: 12px; color: var(--text); font-size: 0.88rem;
      font-family: var(--font-body); outline: none; box-sizing: border-box;
      transition: border-color 0.18s;
    }
    .search-box:focus { border-color: var(--c-brand); }
    .search-wrap { position: relative; padding: 12px 16px; }
    .search-ico { position: absolute; left: 28px; top: 50%; transform: translateY(-50%); color: var(--text-3); pointer-events: none; font-size: 1.1rem; }

    /* Subject tabs */
    .subject-tabs { display: flex; gap: 8px; padding: 0 16px 12px; overflow-x: auto; }
    .subject-tabs::-webkit-scrollbar { display: none; }
    .stab {
      padding: 7px 16px; border-radius: 100px; border: 1.5px solid var(--border);
      background: var(--bg-input); font-family: var(--font-display); font-weight: 700;
      font-size: 0.75rem; color: var(--text-2); cursor: pointer; white-space: nowrap; transition: all 0.15s;
    }
    .stab.on { background: var(--c-brand); color: white; border-color: var(--c-brand); }

    /* Formula sections */
    .section { margin: 0 16px 20px; }
    .sec-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 16px 16px 0 0;
      cursor: pointer; user-select: none;
    }
    .sec-icon { font-size: 1.2rem; }
    .sec-name { font-family: var(--font-display); font-weight: 800; font-size: 0.9rem; color: var(--text); flex: 1; }
    .sec-count { font-size: 0.68rem; color: var(--text-3); font-weight: 600; }
    .sec-arrow { color: var(--text-3); font-size: 1rem; transition: transform 0.2s; }
    .sec-header.open .sec-arrow { transform: rotate(90deg); }

    .formula-list { display: none; border: 1px solid var(--border); border-top: none; border-radius: 0 0 16px 16px; overflow: hidden; }
    .formula-list.open { display: block; }

    .formula-item {
      padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--bg-card);
      transition: background 0.15s; cursor: pointer;
    }
    .formula-item:last-child { border-bottom: none; }
    .formula-item:hover { background: var(--bg-input); }
    .formula-item.saved { background: rgba(16,185,129,0.05); }
    .fml-name { font-family: var(--font-display); font-weight: 700; font-size: 0.82rem; color: var(--text); margin-bottom: 5px; }
    .fml-eq {
      font-family: 'Courier New', monospace; font-size: 1rem; font-weight: 700;
      color: var(--c-brand); background: var(--c-brand-pale);
      padding: 5px 10px; border-radius: 8px; display: inline-block; margin-bottom: 6px;
    }
    .fml-desc { font-size: 0.75rem; color: var(--text-3); line-height: 1.5; }
    .fml-vars { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
    .fml-var {
      font-size: 0.65rem; padding: 2px 8px; border-radius: 100px;
      background: var(--bg-input); color: var(--text-2); font-weight: 600;
    }
    .fml-actions { display: flex; gap: 8px; margin-top: 8px; }
    .fml-btn {
      padding: 5px 12px; border-radius: 8px; border: 1.5px solid var(--border);
      font-size: 0.68rem; font-weight: 700; color: var(--text-2); background: var(--bg-input);
      cursor: pointer; font-family: var(--font-display);
    }
    .fml-btn.saved-btn { color: var(--c-green); border-color: var(--c-green); background: var(--c-green-pale); }

    /* No results */
    .no-results { text-align: center; padding: 50px 20px; color: var(--text-3); }
    .no-results .nr-icon { font-size: 2.5rem; margin-bottom: 10px; }
  </style>
</head>
<body>
<div style="max-width:480px;margin:0 auto;min-height:100dvh;padding-bottom:80px;">

  <div class="fs-header">
    <button class="icon-btn" onclick="history.back()">
      <span class="material-symbols-rounded">arrow_back</span>
    </button>
    <div class="fs-title">📋 Formula Sheet</div>
    <button class="icon-btn" onclick="showSaved()" title="Saved formulas">
      <span class="material-symbols-rounded">bookmark</span>
    </button>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <span class="material-symbols-rounded search-ico" style="position:absolute;left:28px;top:50%;transform:translateY(-50%);">search</span>
    <input class="search-box" type="text" id="searchInput" placeholder="Search formulas... e.g. velocity, quadratic"
      oninput="filterFormulas(this.value)" style="padding-left:40px;"/>
  </div>

  <!-- Subject tabs -->
  <div class="subject-tabs" id="subjectTabs">
    <div class="stab on" data-subj="all" onclick="filterSubject(this)">All</div>
    <div class="stab" data-subj="mathematics" onclick="filterSubject(this)">Mathematics</div>
    <div class="stab" data-subj="physics" onclick="filterSubject(this)">Physics</div>
    <div class="stab" data-subj="chemistry" onclick="filterSubject(this)">Chemistry</div>
    <div class="stab" data-subj="biology" onclick="filterSubject(this)">Biology</div>
  </div>

  <div id="formulaContainer"></div>
  <div id="noResults" class="no-results" style="display:none;">
    <div class="nr-icon">🔍</div>
    <div style="font-family:var(--font-display);font-weight:700;font-size:0.9rem;color:var(--text);">No formulas found</div>
    <div style="font-size:0.75rem;margin-top:4px;">Try a different search term</div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastIcon"></span><span id="toastMsg"></span></div>

<script>

// Group by section within subject
function groupBySection(items) {
  var groups = {};
  items.forEach(function(f) {
    if (!groups[f.section]) groups[f.section] = [];
    groups[f.section].push(f);
  });
  return groups;
}

function renderFormulas(items) {
  var container = document.getElementById('formulaContainer');
  var noRes = document.getElementById('noResults');

  if (items.length === 0) {
    container.innerHTML = '';
    noRes.style.display = '';
    return;
  }
  noRes.style.display = 'none';

  var groups = groupBySection(items);
  var sectionIcons = {
    'Algebra':'🔢','Trigonometry':'📐','Calculus':'∫','Statistics':'📊','Mensuration':'📏',
    'Mechanics':'⚡','Waves':'🌊','Electricity':'🔌','Thermodynamics':'🌡️','Light & Optics':'🔭','Nuclear Physics':'☢️',
    'Stoichiometry':'🧪','Thermochemistry':'🔥','Electrochemistry':'⚡','Acid-Base':'⚗️',
    'Genetics':'🧬','Ecology':'🌿'
  };

  container.innerHTML = Object.keys(groups).map(function(sec) {
    var fmls = groups[sec];
    var icon = sectionIcons[sec] || '📋';
    var open = _currentSearch.length > 0;
    return '<div class="section" data-section="'+esc(sec)+'">' +
      '<div class="sec-header'+(open?' open':'')+'" onclick="toggleSection(this)">' +
        '<span class="sec-icon">'+icon+'</span>' +
        '<span class="sec-name">'+esc(sec)+'</span>' +
        '<span class="sec-count">'+fmls.length+' formulas</span>' +
        '<span class="material-symbols-rounded sec-arrow">chevron_right</span>' +
      '</div>' +
      '<div class="formula-list'+(open?' open':'')+'">' +
        fmls.map(function(f) {
          var isSaved = _saved.includes(f.id);
          return '<div class="formula-item'+(isSaved?' saved':'')+'" id="fi-'+f.id+'">' +
            '<div class="fml-name">'+esc(f.name)+'</div>' +
            '<div class="fml-eq">'+esc(f.eq)+'</div>' +
            '<div class="fml-desc">'+esc(f.desc)+'</div>' +
            (f.vars.length > 0 ? '<div class="fml-vars">'+f.vars.map(function(v){ return '<span class="fml-var">'+esc(v)+'</span>'; }).join('')+'</div>' : '') +
            '<div class="fml-actions">' +
              '<button class="fml-btn'+(isSaved?' saved-btn':'')+'" onclick="toggleSave(\''+f.id+'\',event)">'+(isSaved?'✅ Saved':'🔖 Save')+'</button>' +
              '<button class="fml-btn" onclick="copyFormula(\''+esc(f.eq)+'\',event)">📋 Copy</button>' +
            '</div>' +
          '</div>';
        }).join('') +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleSection(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function filterSubject(tab) {
  document.querySelectorAll('.stab').forEach(function(t){ t.classList.remove('on'); });
  tab.classList.add('on');
  _currentSubj = tab.dataset.subj;
  applyFilters();
}

function filterFormulas(q) {
  _currentSearch = q.trim().toLowerCase();
  applyFilters();
}

function applyFilters() {
  var items = FORMULAS.filter(function(f) {
    var subjOk = _currentSubj === 'all' || f.subj === _currentSubj;
    if (!subjOk) return false;
    if (!_currentSearch) return true;
    return (f.name+f.eq+f.desc+f.section+f.vars.join('')).toLowerCase().includes(_currentSearch);
  });
  renderFormulas(items);
}

function toggleSave(id, e) {
  e.stopPropagation();
  var idx = _saved.indexOf(id);
  if (idx >= 0) { _saved.splice(idx,1); } else { _saved.push(id); }
  localStorage.setItem('examora_saved_formulas', JSON.stringify(_saved));
  applyFilters();
  toast(_saved.includes(id) ? 'Formula saved! 🔖' : 'Removed from saved', _saved.includes(id) ? 'success' : 'info');
}

function copyFormula(eq, e) {
  e.stopPropagation();
  navigator.clipboard.writeText(eq).then(function() {
    toast('Formula copied! 📋', 'success');
  }).catch(function() {
    toast(eq, 'info');
  });
}

function showSaved() {
  _currentSubj = 'all';
  _currentSearch = '';
  document.querySelectorAll('.stab').forEach(function(t){ t.classList.remove('on'); });
  document.querySelector('.stab[data-subj="all"]').classList.add('on');
  document.getElementById('searchInput').value = '';
  var saved = FORMULAS.filter(function(f){ return _saved.includes(f.id); });
  if (saved.length === 0) { toast('No saved formulas yet. Tap 🔖 to save any formula.', 'info'); return; }
  renderFormulas(saved);
}

function toast(msg, type) {
  var t = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = {success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'}[type]||'ℹ️';
  document.getElementById('toastMsg').textContent = msg;
  t.className = 'toast show '+(type||'info');
  setTimeout(function(){ t.className='toast'; }, 3000);
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Init
applyFilters();
// Open first section by default
setTimeout(function() {
  var first = document.querySelector('.sec-header');
  if (first) { first.classList.add('open'); first.nextElementSibling.classList.add('open'); }
}, 50);
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});</script>
