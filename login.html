<!DOCTYPE html>
<html lang="en">
<head>
<script src="click-guard.js"></script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign In — EXAMORA</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="logo.png"/>
<link rel="apple-touch-icon" href="logo.png"/>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
* { box-sizing:border-box; max-width:100%; min-width:0; }
:root { --max-width:480px; }
body { margin:0; background:var(--bg,#f1f5f9); }
.wrap { max-width:var(--max-width); margin:0 auto; min-height:100dvh; display:flex; flex-direction:column; justify-content:center; padding:24px 20px 48px; }
.logo-wrap { text-align:center; margin-bottom:28px; }
.logo-icon { width:72px; height:72px; border-radius:22px; background:linear-gradient(135deg,#6366f1,#8b5cf6); display:inline-flex; align-items:center; justify-content:center; margin-bottom:12px; box-shadow:0 8px 32px rgba(99,102,241,.35); overflow:hidden; }
.logo-icon img { width:72px; height:72px; object-fit:cover; border-radius:22px; display:block; }
.logo-fb { font-family:'Sora',sans-serif; font-weight:900; font-size:1.5rem; color:#fff; display:none; }
.logo-name { font-family:'Sora',sans-serif; font-weight:900; font-size:1.7rem; color:var(--text,#0f172a); letter-spacing:-.5px; }
.logo-sub  { font-size:.78rem; color:var(--text-3,#94a3b8); margin-top:3px; }
.card { background:var(--bg-card,#fff); border:1px solid var(--border,#e2e8f0); border-radius:24px; padding:24px 20px 20px; }
.tabs { display:flex; background:var(--bg-input,#f8fafc); border-radius:12px; padding:3px; margin-bottom:20px; }
.tab { flex:1; padding:9px; text-align:center; border-radius:9px; font-family:'Sora',sans-serif; font-weight:700; font-size:.8rem; cursor:pointer; transition:all .18s; color:var(--text-3,#94a3b8); border:none; background:none; }
.tab.on { background:var(--bg-card,#fff); color:#6366f1; box-shadow:0 2px 8px rgba(0,0,0,.08); }
.fg { margin-bottom:14px; }
.fl { display:block; font-weight:600; font-size:.76rem; color:var(--text-2,#475569); margin-bottom:6px; }
.fi { width:100%; padding:12px 14px; background:var(--bg-input,#f8fafc); border:1.5px solid var(--border,#e2e8f0); border-radius:12px; color:var(--text,#0f172a); font-family:'Outfit',sans-serif; font-size:.88rem; transition:all .18s; outline:none; }
.fi:focus { border-color:#6366f1; background:var(--bg-card,#fff); box-shadow:0 0 0 3px rgba(99,102,241,.12); }
.fi::placeholder { color:var(--text-3,#94a3b8); }
.pw-wrap { position:relative; }
.pw-eye { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--text-3,#94a3b8); padding:4px; font-size:.9rem; line-height:1; }
.forgot { display:block; text-align:right; font-size:.74rem; color:#6366f1; font-weight:600; cursor:pointer; margin-top:-6px; margin-bottom:16px; background:none; border:none; width:100%; }
.btn-main { width:100%; padding:13px; background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; border:none; border-radius:12px; font-family:'Sora',sans-serif; font-weight:800; font-size:.9rem; cursor:pointer; transition:all .2s; box-shadow:0 4px 16px rgba(99,102,241,.35); margin-bottom:4px; }
.btn-main:hover { transform:translateY(-1px); box-shadow:0 6px 24px rgba(99,102,241,.45); }
.btn-main:active { transform:scale(.98); }
.btn-main:disabled { opacity:.55; cursor:not-allowed; transform:none; box-shadow:none; }
.divider { display:flex; align-items:center; gap:10px; margin:14px 0; }
.divider-line { flex:1; height:1px; background:var(--border,#e2e8f0); }
.divider-txt { font-size:.7rem; color:var(--text-3,#94a3b8); font-weight:600; flex-shrink:0; }
.btn-google { width:100%; padding:12px 16px; border-radius:12px; border:1.5px solid var(--border,#e2e8f0); background:var(--bg-card,#fff); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; font-family:'Sora',sans-serif; font-weight:700; font-size:.88rem; color:var(--text,#0f172a); transition:all .18s; margin-bottom:8px; }
.btn-google:hover { border-color:#6366f1; background:rgba(99,102,241,.04); transform:translateY(-1px); }
.btn-google:active { transform:scale(.98); }
.btn-google:disabled { opacity:.55; cursor:not-allowed; transform:none; }
.btn-guest { width:100%; padding:11px; background:none; border:1.5px dashed var(--border,#e2e8f0); border-radius:10px; color:var(--text-2,#475569); font-family:'Outfit',sans-serif; font-weight:600; font-size:.8rem; cursor:pointer; margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:6px; transition:all .15s; }
.btn-guest:hover { border-color:#6366f1; color:#6366f1; }
.btn-guest:disabled { opacity:.55; cursor:not-allowed; }
.err { display:none; padding:10px 14px; background:rgba(244,63,94,.08); border:1px solid rgba(244,63,94,.25); border-radius:10px; font-size:.78rem; color:#f43f5e; font-weight:600; margin-bottom:12px; line-height:1.5; }
.err.on { display:block; }
.ok { display:none; padding:10px 14px; background:rgba(16,185,129,.08); border:1px solid rgba(16,185,129,.25); border-radius:10px; font-size:.78rem; color:#10b981; font-weight:600; margin-bottom:12px; line-height:1.5; }
.ok.on { display:block; }
.info-banner { display:none; padding:10px 14px; background:rgba(245,158,11,.07); border:1px solid rgba(245,158,11,.3); border-radius:10px; font-size:.76rem; color:#d97706; line-height:1.6; margin-top:10px; }
.info-banner.on { display:block; }
.tnote { font-size:.68rem; color:var(--text-3,#94a3b8); text-align:center; margin-top:14px; line-height:1.6; }
.tnote a { color:#6366f1; text-decoration:none; font-weight:600; }
/* Signup-only fields — hidden by default */
.signup-only { display:none; }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.two-col .fg { margin-bottom:0; }

/* Password strength bar */
.pw-strength { margin-top:6px; height:3px; border-radius:100px; background:var(--border,#e2e8f0); overflow:hidden; display:none; }
.pw-strength-fill { height:100%; border-radius:100px; transition:all .3s ease; width:0%; }
.pw-strength-text { font-size:.68rem; font-weight:600; margin-top:4px; display:none; }
/* Match indicator */
.pw-match { font-size:.7rem; font-weight:600; margin-top:4px; }
.pw-match.ok  { color:#10b981; }
.pw-match.bad { color:#f43f5e; }

/* Desktop: center the login card nicely */
@media (min-width: 768px) {
  body.no-sidebar { background: var(--bg, #f1f5f9); }
  .wrap {
    max-width: 460px;
    padding: 40px 24px 60px;
  }
  .card {
    box-shadow: 0 8px 40px rgba(0,0,0,0.10);
  }
  .logo-icon { width: 80px; height: 80px; border-radius: 24px; }
  .logo-icon img { width: 80px; height: 80px; }
  .logo-name { font-size: 1.9rem; }
}
</style>
</head>
<body class="no-sidebar">
<div class="wrap">

  <div class="logo-wrap">
    <div class="logo-icon">
      <img src="logo.png" alt="EXAMORA" onerror="this.style.display='none';document.querySelector('.logo-fb').style.display='block'"/>
      <span class="logo-fb">EX</span>
    </div>
    <div class="logo-name">EXAMORA</div>
    <div class="logo-sub">Nigeria's smartest exam prep — powered by AI</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab on" id="tab-in">Sign In</button>
      <button class="tab"    id="tab-up">Create Account</button>
    </div>

    <div class="err" id="errBox"></div>
    <div class="ok"  id="okBox"></div>

    <button class="btn-google" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google

    <button class="btn-guest" id="guestBtn">
      <span style="font-size:1rem;">👤</span> Try as Guest (no account needed)
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-txt">or use email</div>

          <option value="">State</option>
          <option>Abia</option><option>Adamawa</option><option>Akwa Ibom</option><option>Anambra</option><option>Bauchi</option><option>Bayelsa</option><option>Benue</option><option>Borno</option><option>Cross River</option><option>Delta</option><option>Ebonyi</option><option>Edo</option><option>Ekiti</option><option>Enugu</option><option>FCT Abuja</option><option>Gombe</option><option>Imo</option><option>Jigawa</option><option>Kaduna</option><option>Kano</option><option>Katsina</option><option>Kebbi</option><option>Kogi</option><option>Kwara</option><option>Lagos</option><option>Nasarawa</option><option>Niger</option><option>Ogun</option><option>Ondo</option><option>Osun</option><option>Oyo</option><option>Plateau</option><option>Rivers</option><option>Sokoto</option><option>Taraba</option><option>Yobe</option><option>Zamfara</option>

    <div class="pw-strength signup-only" id="pwStrengthBar"><div class="pw-strength-fill" id="pwStrengthFill"></div></div>

    <!-- Signup-only: Confirm password -->

    <button class="forgot" id="forgotBtn">Forgot password?</button>

    <button class="btn-main" id="mainBtn">Sign In →</button>

    <div class="info-banner" id="spamHint">
      📬 Check your <strong>inbox and spam/junk folder</strong> for the verification email.
    </div>

      📧 Email not verified yet.
      <button id="resendBtn" style="background:none;border:none;color:#d97706;font-weight:800;cursor:pointer;text-decoration:underline;font-size:.76rem;padding:0;">Resend email</button>

    <div class="tnote">

<script type="module">
import { initializeApp, getApps, getApp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getAuth, onAuthStateChanged,
  signInWithEmailAndPassword, createUserWithEmailAndPassword,
  sendPasswordResetEmail, sendEmailVerification,
  updateProfile,
  GoogleAuthProvider, signInWithPopup, signInWithRedirect,
  getRedirectResult, signInAnonymously
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── Init ─────────────────────────────────────────────────────
const FB = {
  apiKey:'AIzaSyA5RUfGUA68-RNyMZPlxaVYj85h5OiJdJw',
  authDomain:'cbt-app-5907f.firebaseapp.com',
  projectId:'cbt-app-5907f',
  storageBucket:'cbt-app-5907f.firebasestorage.app',
  messagingSenderId:'705323924101',
  appId:'1:705323924101:web:ad9f153f25a0685a1287ec'
};
const app  = getApps().length ? getApp() : initializeApp(FB);
const auth = getAuth(app);
const db   = getFirestore(app);
const gp   = new GoogleAuthProvider();
gp.setCustomParameters({ prompt:'select_account' });

// Theme
document.documentElement.setAttribute('data-theme', localStorage.getItem('examora_theme')||'light');

// ── State ─────────────────────────────────────────────────────
let _mode = 'login';
let _busy = false;

// ── DOM refs ──────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const emailInput   = $('emailInput');
const passInput    = $('passInput');
const confirmInput = $('confirmInput');
const nameInput    = $('nameInput');
const phoneInput   = $('phoneInput');
const examInput    = $('examInput');
const stateInput   = $('stateInput');
const mainBtn      = $('mainBtn');
const googleBtn    = $('googleBtn');
const guestBtn     = $('guestBtn');
const forgotBtn    = $('forgotBtn');
const errBox       = $('errBox');
const okBox        = $('okBox');

// ── Helpers ───────────────────────────────────────────────────
function showErr(m) {
  errBox.textContent = m;
  errBox.className = 'err on';
  okBox.className = 'ok';
  errBox.scrollIntoView({ behavior:'smooth', block:'nearest' });
}
function showOk(m) {
  okBox.textContent = m;
  okBox.className = 'ok on';
  errBox.className = 'err';
}
function clearMsg() {
  errBox.className = 'err';
  okBox.className  = 'ok';
}

function setBusy(on) {
  _busy = on;
  mainBtn.disabled  = on;
  googleBtn.disabled = on;
  guestBtn.disabled  = on;
  if (on) {
    mainBtn.textContent = 'Please wait…';
  } else {
    mainBtn.textContent = _mode === 'login' ? 'Sign In →' : 'Create Account →';
  }
}

const ERRS = {
  'auth/user-not-found':         'No account found with that email. Create one instead.',
  'auth/wrong-password':         'Incorrect password. Try again or reset it below.',
  'auth/invalid-credential':     'Incorrect email or password. Please check and try again.',
  'auth/invalid-email':          'Please enter a valid email address.',
  'auth/too-many-requests':      'Too many failed attempts — wait a few minutes and try again.',
  'auth/email-already-in-use':   'An account already exists with this email. Sign in instead.',
  'auth/weak-password':          'Password is too weak. Use at least 6 characters.',
  'auth/network-request-failed': 'No internet connection. Check your network and try again.',
  'auth/user-disabled':          'This account has been disabled. Contact support.',
  'auth/operation-not-allowed':  'Email/password sign-in is not enabled.',
  'auth/popup-closed-by-user':   '',
  'auth/cancelled-popup-request':'',
  'auth/popup-blocked':          'Popup blocked — trying redirect instead…'
};

// ── Mode switching ────────────────────────────────────────────
function setMode(m) {
  _mode = m;
  $('tab-in').classList.toggle('on', m === 'login');
  $('tab-up').classList.toggle('on', m === 'register');
  mainBtn.textContent = m === 'login' ? 'Sign In →' : 'Create Account →';
  forgotBtn.style.display = m === 'login' ? '' : 'none';
  $('spamHint').className = 'info-banner' + (m === 'register' ? ' on' : '');
  $('verifyBanner').className = 'info-banner';

  // Toggle signup-only fields
  document.querySelectorAll('.signup-only').forEach(el => {
    el.style.display = m === 'register' ? '' : 'none';
  });

  // Switch password autocomplete attribute
  passInput.setAttribute('autocomplete', m === 'login' ? 'current-password' : 'new-password');

  clearMsg();

  // Focus email on tab switch
  setTimeout(() => emailInput.focus(), 50);
}

// ── Firestore user doc ────────────────────────────────────────
async function makeDoc(user, extras) {
  try {
    const ref  = doc(db, 'users', user.uid);
    const snap = await getDoc(ref);
    const isNew = !snap.exists();

    const data = {
      displayName: (extras && extras.displayName) || user.displayName || user.email?.split('@')[0] || 'Learner',
      email:    user.email    || '',
      photoURL: user.photoURL || '',
      updatedAt: serverTimestamp()
    };

    if (extras) {
      if (extras.phone)      data.phone      = extras.phone;
      if (extras.targetExam) data.targetExam = extras.targetExam;
      if (extras.state)      data.state      = extras.state;
    }

    if (isNew) {
      Object.assign(data, {
        plan:'free', streak:0, totalExams:0, totalCorrect:0,
        totalQuestions:0, badges:[], xp:0, totalScore:0,
        createdAt:serverTimestamp(),
        onboarded: (extras && extras.onboarded === true) ? true : false
      });
    }

    await setDoc(ref, data, { merge:true });
    localStorage.setItem('examora_uid', user.uid);

    if (!isNew && snap.data()?.onboarded) {
      localStorage.setItem('examora_onboarded', 'true');
    }
  } catch(e) {
    console.warn('makeDoc:', e.message);
    localStorage.setItem('examora_uid', user.uid);
  }
}

function goHome() { window.location.href = 'index.html'; }

// ── Auth state — only redirect if already signed in and page loads fresh ──
// We do NOT auto-redirect; each handler calls goHome() explicitly.
// This prevents the form from vanishing when a user intentionally navigates here.

// Handle Google redirect result (back from signInWithRedirect)
getRedirectResult(auth).then(async r => {
  if (!r?.user) return;
  setBusy(true);
  await makeDoc(r.user);
  goHome();
}).catch(e => {
  if (e.code && e.code !== 'auth/no-auth-event') showErr(ERRS[e.code] || e.message);
});

// ── Email / Password ──────────────────────────────────────────
async function doAuth() {
  if (_busy) return;
  clearMsg();

  const email = emailInput.value.trim();
  const pass  = passInput.value;

  if (!email) { showErr('Please enter your email address.'); emailInput.focus(); return; }
  if (!pass)  { showErr('Please enter your password.'); passInput.focus(); return; }

  setBusy(true);
  try {
    if (_mode === 'login') {
      // ── Sign In ──────────────────────────────────────────────
      const cred = await signInWithEmailAndPassword(auth, email, pass);
      await makeDoc(cred.user);
      goHome();

    } else {
      // ── Create Account ───────────────────────────────────────
      if (pass.length < 6) {
        setBusy(false);
        showErr('Password must be at least 6 characters.');
        passInput.focus();
        return;
      }

      const confirm = confirmInput.value;
      if (pass !== confirm) {
        setBusy(false);
        showErr('Passwords do not match. Please re-enter both passwords.');
        confirmInput.focus();
        return;
      }

      const fullName = nameInput.value.trim();
      if (!fullName) {
        setBusy(false);
        showErr('Please enter your full name.');
        nameInput.focus();
        return;
      }

      const phone    = phoneInput.value.trim();
      const targetExam = examInput.value;
      const state    = stateInput.value;

      // Create account
      const cred = await createUserWithEmailAndPassword(auth, email, pass);

      // Set display name in Firebase Auth
      try { await updateProfile(cred.user, { displayName: fullName }); } catch(_){}

      // Send verification email
      try { await sendEmailVerification(cred.user); } catch(_){}

      // Save to Firestore
      await makeDoc(cred.user, { displayName:fullName, phone, targetExam, state });

      setBusy(false);
      showOk('✅ Account created! Please check your inbox (and spam folder) for a verification email.');

      // Reset form and switch to sign-in tab
      passInput.value    = '';
      confirmInput.value = '';
      setMode('login');
    }
  } catch(e) {
    setBusy(false);
    const msg = ERRS[e.code] || e.message || 'Something went wrong. Please try again.';
    showErr(msg);
  }
}

// ── Google ────────────────────────────────────────────────────
async function doGoogle() {
  if (_busy) return;
  _busy = true;
  googleBtn.disabled = true;
  clearMsg();
  try {
    const cred = await signInWithPopup(auth, gp);
    await makeDoc(cred.user);
    goHome();
  } catch(e) {
    _busy = false;
    googleBtn.disabled = false;
    if (e.code === 'auth/popup-blocked') {
      showErr(ERRS[e.code]);
      setTimeout(() => signInWithRedirect(auth, gp), 800);
    } else if (e.code !== 'auth/popup-closed-by-user' && e.code !== 'auth/cancelled-popup-request') {
      showErr(ERRS[e.code] || e.message || 'Google sign-in failed.');
    }
  }
}

// ── Guest ─────────────────────────────────────────────────────
async function doGuest() {
  if (_busy) return;
  if (!confirm("Guest accounts are temporary.\n\nYour progress won't be saved if you clear your browser. You can create a free account anytime.\n\nContinue as guest?")) return;
  _busy = true;
  guestBtn.disabled = true;
  clearMsg();
  try {
    const cred = await signInAnonymously(auth);
    localStorage.setItem('examora_user_display', 'Guest');
    localStorage.setItem('examora_onboarded', 'true');
    // Guests skip onboarding — pass extras with onboarded:true
    await makeDoc(cred.user, { displayName: 'Guest', onboarded: true });
    goHome();
  } catch(e) {
    _busy = false;
    guestBtn.disabled = false;
    showErr(e.message || 'Could not sign in as guest.');
  }
}

// ── Forgot password ───────────────────────────────────────────
async function doForgot() {
  clearMsg();
  const email = emailInput.value.trim();
  if (!email) {
    showErr('Enter your email address above, then click Forgot password.');
    emailInput.focus();
    return;
  }
  try {
    await sendPasswordResetEmail(auth, email);
    showOk('✅ Password reset email sent! Check your inbox and spam folder.');
  } catch(e) {
    showErr(ERRS[e.code] || e.message || 'Could not send reset email.');
  }
}

// ── Resend verification ───────────────────────────────────────
async function doResend() {
  try {
    if (auth.currentUser) await sendEmailVerification(auth.currentUser);
    showOk('Verification email sent!');
  } catch(e) {
    showErr('Could not resend: ' + e.message);
  }
}

// ── Event listeners — single source of truth, no onclick= attrs ──
$('tab-in')   .addEventListener('click', () => setMode('login'));
$('tab-up')   .addEventListener('click', () => setMode('register'));
mainBtn       .addEventListener('click', doAuth);
googleBtn     .addEventListener('click', doGoogle);
guestBtn      .addEventListener('click', doGuest);
forgotBtn     .addEventListener('click', doForgot);
$('resendBtn').addEventListener('click', doResend);

// Keyboard shortcuts
emailInput  .addEventListener('keydown', e => { if (e.key === 'Enter') passInput.focus(); });
passInput   .addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (_mode === 'register') confirmInput.focus();
    else doAuth();
  }
});
confirmInput.addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(); });

// Password visibility toggles
$('pwEye').addEventListener('click', () => {
  passInput.type = passInput.type === 'password' ? 'text' : 'password';
});
$('pwEye2').addEventListener('click', () => {
  confirmInput.type = confirmInput.type === 'password' ? 'text' : 'password';
});


// ── Password strength ────────────────────────────────────────
function checkStrength(pw) {
  let score = 0;
  if (pw.length >= 8)  score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  return score;
}

passInput.addEventListener('input', () => {
  if (_mode !== 'register') return;
  const pw = passInput.value;
  const bar  = document.getElementById('pwStrengthBar');
  const fill = document.getElementById('pwStrengthFill');
  const txt  = document.getElementById('pwStrengthText');
  if (!pw) { bar.style.display='none'; txt.style.display='none'; return; }
  bar.style.display='block'; txt.style.display='block';
  const s = checkStrength(pw);
  const colors = ['','#f43f5e','#f97316','#f59e0b','#10b981','#10b981'];
  const labels = ['','Weak','Fair','Good','Strong','Very strong'];
  fill.style.width  = (s/5*100) + '%';
  fill.style.background = colors[s] || colors[1];
  txt.textContent   = labels[s] || labels[1];
  txt.style.color   = colors[s] || colors[1];
  // Also check confirm match
  checkMatch();
});

function checkMatch() {
  const msg = document.getElementById('pwMatchMsg');
  if (!msg) return;
  const confirm = confirmInput.value;
  if (!confirm) { msg.textContent=''; return; }
  if (passInput.value === confirm) {
    msg.textContent = '✓ Passwords match';
    msg.className = 'pw-match signup-only ok';
  } else {
    msg.textContent = '✗ Passwords do not match';
    msg.className = 'pw-match signup-only bad';
  }
}

confirmInput.addEventListener('input', checkMatch);

// Expose for any legacy references
window.setMode = setMode;
window.doAuth  = doAuth;
</script>
