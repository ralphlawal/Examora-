<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Parent Dashboard — EXAMORA</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0" rel="stylesheet"/>
<style>
* { box-sizing:border-box; max-width:100%; min-width:0; }
p,span,div,h1,h2,h3,h4,h5,h6,a,li,label,button { overflow-wrap:break-word; word-wrap:break-word; }

/* Link child banner */
.link-banner {
  background:linear-gradient(135deg,rgba(91,94,244,.12),rgba(16,185,129,.08));
  border:1.5px solid rgba(91,94,244,.25); border-radius:var(--r-lg);
  padding:20px 18px; margin-bottom:18px;
}
.lb-title { font-family:var(--fd); font-weight:900; font-size:.95rem; color:var(--ink); margin-bottom:6px; }
.lb-sub   { font-size:.78rem; color:var(--ink-2); line-height:1.6; margin-bottom:14px; font-family:var(--fb); }
.link-input-row { display:flex; gap:8px; }

/* Child card */
.child-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); overflow:hidden; margin-bottom:14px;
}
.child-header {
  display:flex; align-items:center; gap:14px;
  padding:16px; background:linear-gradient(135deg,rgba(91,94,244,.08),rgba(16,185,129,.04));
  border-bottom:1px solid var(--border);
}
.child-avatar {
  width:52px; height:52px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,var(--brand),var(--violet));
  display:flex; align-items:center; justify-content:center;
  font-family:var(--fd); font-weight:900; font-size:1.2rem; color:#fff;
}
.child-name { font-family:var(--fd); font-weight:900; font-size:1rem; color:var(--ink); }
.child-meta { font-size:.72rem; color:var(--ink-3); margin-top:3px; font-family:var(--fb); }
.child-badge {
  margin-left:auto; padding:5px 12px; border-radius:100px;
  font-size:.68rem; font-weight:700; font-family:var(--fb); flex-shrink:0;
}
.badge-active   { background:var(--emerald-p); color:var(--emerald); }
.badge-inactive { background:var(--amber-p);   color:var(--amber);   }

.stat-grid-4 {
  display:grid; grid-template-columns:repeat(2,1fr); gap:10px;
  padding:14px;
}
.sg-item { text-align:center; padding:12px 8px; background:var(--surface-2); border-radius:var(--r-md); border:1px solid var(--border); }
.sg-val { font-family:var(--fd); font-weight:900; font-size:1.3rem; color:var(--brand); letter-spacing:-1px; }
.sg-lbl { font-size:.65rem; color:var(--ink-3); text-transform:uppercase; letter-spacing:.6px; margin-top:3px; font-family:var(--fb); }

.activity-list { padding:0 14px 14px; }
.act-item {
  display:flex; align-items:center; gap:10px; padding:10px 12px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-md); margin-bottom:7px;
}
.act-icon { width:34px; height:34px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1rem; }
.act-title { font-family:var(--fd); font-weight:700; font-size:.8rem; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.act-meta  { font-size:.66rem; color:var(--ink-3); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.act-score { font-family:var(--fd); font-weight:900; font-size:.9rem; flex-shrink:0; }

.remove-child-btn {
  display:flex; align-items:center; gap:6px; padding:8px 14px;
  background:none; border:1px solid rgba(244,63,94,.3); border-radius:var(--r-sm);
  color:var(--rose); font-size:.72rem; font-weight:700; cursor:pointer;
  font-family:var(--fb); margin:0 14px 14px; transition:all .18s ease;
}
.remove-child-btn:hover { background:var(--rose-p); }

/* Progress bar mini */
.mini-progress { padding:0 14px 14px; }
.mp-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.mp-label { font-size:.74rem; color:var(--ink-2); width:100px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:var(--fb); font-weight:600; }
.mp-track { flex:1; height:7px; background:var(--surface-2); border-radius:100px; overflow:hidden; }
.mp-fill  { height:100%; border-radius:100px; transition:width .4s ease; }
.mp-pct   { font-family:var(--fd); font-weight:800; font-size:.72rem; width:36px; text-align:right; flex-shrink:0; }

/* Streak display */
.streak-display {
  display:flex; align-items:center; gap:10px; padding:12px 14px;
  background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(245,158,11,.04));
  border-top:1px solid var(--border);
}
.streak-flame { font-size:1.6rem; }
.streak-val { font-family:var(--fd); font-weight:900; font-size:1.4rem; color:var(--amber); letter-spacing:-1px; }
.streak-lbl { font-size:.72rem; color:var(--ink-3); font-family:var(--fb); }

.no-children {
  text-align:center; padding:48px 20px;
}
.nc-icon { font-size:3rem; margin-bottom:14px; }
.nc-title { font-family:var(--fd); font-weight:800; font-size:1rem; color:var(--ink); margin-bottom:8px; }
.nc-sub   { font-size:.8rem; color:var(--ink-3); line-height:1.6; font-family:var(--fb); }
</style>
</head>
<body>

<header class="app-header">
  <a class="app-logo" href="index.html" style="text-decoration:none;display:flex;align-items:center;gap:9px;">
    <img class="app-logo-img" src="logo.png" alt="EXAMORA" style="width:34px;height:34px;border-radius:10px;object-fit:contain;display:block;"
      onerror="(function(i){i.style.display='none';var p=i.parentElement;var f=p&&p.querySelector('.app-logo-icon');if(f)f.style.display='flex';})(this)"/>
    <div class="app-logo-icon" style="display:none;">EX</div>
    <div><div class="app-logo-name">Parent Dashboard</div></div>
  </a>
  <div class="header-actions">
    <button class="header-btn" id="themeBtn" title="Toggle theme">
      <span class="material-symbols-rounded">light_mode</span>
    </button>
  </div>
</header>

<div class="page-wrapper">

  <!-- Link a child -->
  <div class="link-banner">
    <div class="lb-title">🔗 Link a Student Account</div>
    <div class="lb-sub">Ask your child to share their Student ID from their Profile page, then enter it below to monitor their progress.</div>
    <div class="link-input-row">
      <input id="linkCodeInput" class="form-input" type="text" placeholder="Enter Student ID (e.g. EX-123456)" style="flex:1;font-size:.85rem;"/>
      <button class="btn btn-primary" onclick="linkChild()" id="linkBtn">Link</button>
    </div>
    <div id="linkError" style="display:none;margin-top:8px;font-size:.74rem;color:var(--rose);font-family:var(--fb);"></div>
  </div>

  <!-- Children list -->
  <div id="childrenArea">
    <div class="skeleton skeleton-card" style="margin-bottom:12px;height:220px;"></div>
  </div>

</div>

<div id="toastEl" class="toast"><span class="toast-icon" id="toastIcon">✓</span><span id="toastMsg">Done</span></div>

<script type="module">
import { initializeApp }        from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {
  getFirestore, doc, getDoc, collection, query,
  where, orderBy, limit, getDocs, setDoc, deleteDoc, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app  = initializeApp({
  apiKey:'AIzaSyA5RUfGUA68-RNyMZPlxaVYj85h5OiJdJw',
  authDomain:'cbt-app-5907f.firebaseapp.com',
  projectId:'cbt-app-5907f',
  storageBucket:'cbt-app-5907f.firebasestorage.app',
  messagingSenderId:'705323924101',
  appId:'1:705323924101:web:ad9f153f25a0685a1287ec'
});
const auth = getAuth(app);
const db   = getFirestore(app);

let parentUid = null;
let linkedChildren = []; // array of { childUid, data, results }

// ── Theme ──────────────────────────────────────────────────────────────────
const _t = localStorage.getItem('examora_theme') || 'light';
document.documentElement.setAttribute('data-theme', _t);
const themeBtn = document.getElementById('themeBtn');
if (themeBtn) {
  themeBtn.querySelector('span').textContent = _t === 'dark' ? 'light_mode' : 'dark_mode';
  themeBtn.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const nxt = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', nxt);
    localStorage.setItem('examora_theme', nxt);
    themeBtn.querySelector('span').textContent = nxt === 'dark' ? 'light_mode' : 'dark_mode';
  });
}

// ── Auth ───────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = 'login.html'; return; }
  parentUid = user.uid;
  await loadLinkedChildren();
});

// ── Load linked children ───────────────────────────────────────────────────
async function loadLinkedChildren() {
  const area = document.getElementById('childrenArea');
  try {
    const linksSnap = await getDocs(collection(db, 'users', parentUid, 'linked_children'));
    if (linksSnap.empty) {
      renderNoChildren();
      return;
    }
    linkedChildren = [];
    const promises = linksSnap.docs.map(async (linkDoc) => {
      const childUid = linkDoc.id;
      try {
        const childSnap = await getDoc(doc(db, 'users', childUid));
        const childData = childSnap.exists() ? childSnap.data() : { displayName:'Unknown Student', email:'' };

        // Get recent results
        const resultsSnap = await getDocs(
          query(collection(db,'results'), where('userId','==',childUid), orderBy('completedAt','desc'), limit(5))
        );
        const results = resultsSnap.docs.map(d => ({ id:d.id, ...d.data() }));
        linkedChildren.push({ childUid, data:childData, results });
      } catch (_) {
        linkedChildren.push({ childUid, data:{ displayName:'Student' }, results:[] });
      }
    });
    await Promise.all(promises);
    renderChildren();
  } catch (err) {
    area.innerHTML = `<div class="alert alert-error show">Error loading: ${err.message}</div>`;
  }
}

// ── Render children ────────────────────────────────────────────────────────
function renderNoChildren() {
  document.getElementById('childrenArea').innerHTML = `
    <div class="no-children">
      <div class="nc-icon">👨‍👩‍👧</div>
      <div class="nc-title">No students linked yet</div>
      <div class="nc-sub">Enter your child's Student ID above to start monitoring their exam preparation progress.</div>
    </div>`;
}

function renderChildren() {
  const area = document.getElementById('childrenArea');
  if (!linkedChildren.length) { renderNoChildren(); return; }

  area.innerHTML = '';
  linkedChildren.forEach(({ childUid, data, results }) => {
    const name    = data.displayName || data.email || 'Student';
    const initials= name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase() || 'ST';
    const streak  = data.streak || 0;
    const total   = data.totalExams || results.length || 0;
    const correct = data.totalCorrect || 0;
    const totalQ  = data.totalQuestions || 1;
    const avgScore= totalQ > 0 ? Math.round(correct/totalQ*100) : 0;
    const plan    = data.plan || 'free';
    const lastSeen= data.lastSeen ? fmtRelDate(data.lastSeen) : 'Unknown';
    const isActive= streak > 0;

    // Subject scores from results
    const subjectMap = {};
    results.forEach(r => {
      const subj = r.subject || r.category || 'General';
      if (!subjectMap[subj]) subjectMap[subj] = { total:0, correct:0 };
      subjectMap[subj].total   += (r.totalQuestions || 10);
      subjectMap[subj].correct += (r.correct || 0);
    });

    const card = document.createElement('div');
    card.className = 'child-card';
    card.innerHTML = `
      <div class="child-header">
        <div class="child-avatar">${initials}</div>
        <div style="flex:1;min-width:0;">
          <div class="child-name">${esc(name)}</div>
          <div class="child-meta">${esc(data.email || '')} · ${plan} plan</div>
          <div class="child-meta">Last active: ${lastSeen}</div>
        </div>
        <div class="child-badge ${isActive?'badge-active':'badge-inactive'}">${isActive?'🟢 Active':'🟡 Inactive'}</div>
      </div>

      <div class="stat-grid-4">
        <div class="sg-item"><div class="sg-val">${total}</div><div class="sg-lbl">Exams Done</div></div>
        <div class="sg-item"><div class="sg-val" style="color:var(--emerald);">${avgScore}%</div><div class="sg-lbl">Avg Score</div></div>
        <div class="sg-item"><div class="sg-val" style="color:var(--brand);">${totalQ}</div><div class="sg-lbl">Questions</div></div>
        <div class="sg-item"><div class="sg-val" style="color:var(--amber);">${data.xp || 0}</div><div class="sg-lbl">XP Earned</div></div>
      </div>

      <div class="streak-display">
        <div class="streak-flame">🔥</div>
        <div>
          <div class="streak-val">${streak}</div>
          <div class="streak-lbl">day streak</div>
        </div>
        <div style="margin-left:auto;text-align:right;">
          <div style="font-family:var(--fd);font-weight:800;font-size:.82rem;color:var(--ink);">
            ${data.badges?.length || 0} badges
          </div>
          <div style="font-size:.68rem;color:var(--ink-3);">earned</div>
        </div>
      </div>

      ${Object.keys(subjectMap).length ? `
        <div style="padding:14px 14px 4px;">
          <div style="font-family:var(--fd);font-weight:800;font-size:.8rem;color:var(--ink);margin-bottom:10px;">Subject Performance</div>
        </div>
        <div class="mini-progress">
          ${Object.entries(subjectMap).map(([subj, sc]) => {
            const pct = sc.total ? Math.round(sc.correct/sc.total*100) : 0;
            const col = pct>=70?'var(--emerald)':pct>=50?'var(--brand)':'var(--rose)';
            return `
              <div class="mp-row">
                <div class="mp-label" title="${esc(subj)}">${esc(subj.replace(/[🧬⚗️📐⚡🌍📖]/g,'').trim())}</div>
                <div class="mp-track"><div class="mp-fill" style="width:${pct}%;background:${col};"></div></div>
                <div class="mp-pct" style="color:${col};">${pct}%</div>
              </div>`;
          }).join('')}
        </div>` : ''}

      ${results.length ? `
        <div style="padding:14px 14px 4px;">
          <div style="font-family:var(--fd);font-weight:800;font-size:.8rem;color:var(--ink);margin-bottom:10px;">Recent Activity</div>
        </div>
        <div class="activity-list">
          ${results.slice(0,4).map(r => {
            const sc  = getScore(r);
            const col = sc>=70?'var(--emerald)':sc>=50?'var(--brand)':'var(--rose)';
            const subj= r.subject || r.category || 'Practice';
            return `
              <div class="act-item">
                <div class="act-icon" style="background:${col}22;">📝</div>
                <div style="flex:1;min-width:0;">
                  <div class="act-title">${esc(subj)}</div>
                  <div class="act-meta">${fmtDate(r.completedAt)} · ${r.totalQuestions||10} questions</div>
                </div>
                <div class="act-score" style="color:${col};">${sc}%</div>
              </div>`;
          }).join('')}
        </div>` : ''}

      <button class="remove-child-btn" onclick="removeChild('${childUid}')">
        <span class="material-symbols-rounded" style="font-size:1rem;">link_off</span> Unlink student
      </button>`;

    area.appendChild(card);
  });
}

// ── Link child ─────────────────────────────────────────────────────────────
async function linkChild() {
  const code = (document.getElementById('linkCodeInput').value || '').trim().toUpperCase();
  const errEl = document.getElementById('linkError');
  errEl.style.display = 'none';

  if (!code) { showLinkErr('Enter a Student ID'); return; }

  // Extract UID from code (format: EX-UID or just UID)
  const rawId = code.startsWith('EX-') ? code.slice(3) : code;
  if (rawId.length < 6) { showLinkErr('Invalid Student ID format'); return; }

  const btn = document.getElementById('linkBtn');
  btn.disabled = true; btn.textContent = 'Linking…';

  try {
    // Check if student exists
    const studentSnap = await getDoc(doc(db, 'users', rawId));
    if (!studentSnap.exists()) {
      // Try searching by referralCode field
      const q = query(collection(db,'users'), where('referralCode','==',code), limit(1));
      const qs = await getDocs(q);
      if (qs.empty) { showLinkErr('Student not found. Check the ID and try again.'); btn.disabled=false; btn.textContent='Link'; return; }
      const foundUid = qs.docs[0].id;
      await saveLink(foundUid, qs.docs[0].data());
    } else {
      await saveLink(rawId, studentSnap.data());
    }
  } catch (err) {
    showLinkErr('Error: ' + err.message);
    btn.disabled = false; btn.textContent = 'Link';
  }
}
window.linkChild = linkChild;

async function saveLink(childUid, childData) {
  if (childUid === parentUid) { showLinkErr('You cannot link your own account'); document.getElementById('linkBtn').disabled=false; document.getElementById('linkBtn').textContent='Link'; return; }
  try {
    await setDoc(doc(db,'users',parentUid,'linked_children',childUid), {
      linkedAt: serverTimestamp(),
      name: childData.displayName || childData.email || 'Student'
    });
    document.getElementById('linkCodeInput').value = '';
    document.getElementById('linkBtn').disabled = false;
    document.getElementById('linkBtn').textContent = 'Link';
    toast('Student linked successfully! ✓', 'success');
    await loadLinkedChildren();
  } catch (err) {
    showLinkErr('Could not save link: ' + err.message);
    document.getElementById('linkBtn').disabled=false;
    document.getElementById('linkBtn').textContent='Link';
  }
}

function showLinkErr(msg) {
  const el = document.getElementById('linkError');
  el.textContent = msg; el.style.display = 'block';
}

// ── Remove child ───────────────────────────────────────────────────────────
async function removeChild(childUid) {
  if (!confirm('Unlink this student? You can re-link them anytime.')) return;
  try {
    await deleteDoc(doc(db,'users',parentUid,'linked_children',childUid));
    toast('Student unlinked','info');
    await loadLinkedChildren();
  } catch (err) {
    toast('Error: ' + err.message,'error');
  }
}
window.removeChild = removeChild;

// ── Helpers ────────────────────────────────────────────────────────────────
function getScore(r) {
  if (r.percentage !== undefined) return Math.round(r.percentage);
  if (r.score !== undefined && r.score <= 100) return Math.round(r.score);
  if (r.correct !== undefined && r.totalQuestions) return Math.round(r.correct/r.totalQuestions*100);
  return 0;
}
function fmtDate(ts) {
  if (!ts) return '';
  try { const d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString('en-NG',{day:'numeric',month:'short'}); } catch { return ''; }
}
function fmtRelDate(ts) {
  if (!ts) return 'unknown';
  try {
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const diff = Date.now() - d.getTime();
    const mins = Math.floor(diff/60000);
    if (mins < 60)  return mins + 'm ago';
    if (mins < 1440) return Math.floor(mins/60) + 'h ago';
    return Math.floor(mins/1440) + 'd ago';
  } catch { return ''; }
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Toast ──────────────────────────────────────────────────────────────────
function toast(msg, type='info') {
  const icons={ success:'✓', error:'✕', info:'ℹ', warning:'⚠' };
  const el=document.getElementById('toastEl');
  el.className='toast toast-'+type;
  document.getElementById('toastIcon').textContent=icons[type]||'ℹ';
  document.getElementById('toastMsg').textContent=msg;
  void el.offsetWidth; el.classList.add('show');
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>el.classList.remove('show'),2800);
}
</script>

<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});</script>
</body>
</html>
