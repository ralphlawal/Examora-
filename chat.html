<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Nova AI · EXAMORA</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0" rel="stylesheet"/>
<style>
*{box-sizing:border-box;}
/* ── Full-screen chat shell — body is the flex container ── */
html{height:100%;}
body{
  margin:0;padding:0;
  font-family:var(--font-body,'Outfit',sans-serif);
  background:var(--bg,#f4f5fb);
  color:var(--ink,#0d1030);
  /* Critical fix: display flex column, no overflow on body */
  display:flex;flex-direction:column;
  height:100dvh;height:100vh; /* fallback first, dvh second */
  overflow:hidden;
}
/* Desktop: leave room for sidebar */
@media(min-width:768px){body{padding-left:232px;}}

/* ── Header (fixed height, never shrinks) ── */
.ch{
  background:var(--surface,#fff);
  border-bottom:1px solid var(--border,#e2e5f1);
  padding:0 14px;height:58px;
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;z-index:10;
  box-shadow:0 1px 6px rgba(10,15,60,.05);
}
.ch-back{
  width:36px;height:36px;border-radius:50%;
  background:none;border:none;cursor:pointer;
  color:var(--ink-2,#454c7a);
  display:flex;align-items:center;justify-content:center;
}
.ch-back .material-symbols-rounded{font-size:1.2rem;}
.nova-av{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#6366f1,#8b5cf6,#06b6d4);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 2px #fff,0 0 0 4px rgba(99,102,241,.25);
  position:relative;
}
.nova-online{
  position:absolute;bottom:1px;right:1px;
  width:9px;height:9px;border-radius:50%;
  background:#10b981;border:2px solid #fff;
}
.ch-info{flex:1;min-width:0;}
.ch-name{font-family:'Sora',sans-serif;font-weight:700;font-size:.91rem;color:var(--ink,#0d1030);}
.ch-status{font-size:.65rem;color:#10b981;font-weight:600;display:flex;align-items:center;gap:3px;margin-top:1px;}
.ch-dot{width:5px;height:5px;border-radius:50%;background:#10b981;}
.ch-actions{display:flex;align-items:center;gap:4px;}
.ch-icon-btn{
  width:34px;height:34px;border-radius:50%;
  background:none;border:none;cursor:pointer;
  color:var(--ink-3,#9399c2);
  display:flex;align-items:center;justify-content:center;
}
.ch-icon-btn .material-symbols-rounded{font-size:1.1rem;}
.hub-link{
  width:32px;height:32px;border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#06b6d4);
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;flex-shrink:0;
}

/* ── Level/persona banner ── */
.persona-bar{
  padding:6px 16px;font-size:.71rem;
  background:var(--brand-pale,rgba(91,94,244,.07));
  border-bottom:1px solid rgba(99,102,241,.1);
  display:flex;align-items:center;gap:7px;flex-shrink:0;
  color:var(--ink-2,#454c7a);
}
.persona-badge{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 9px;border-radius:100px;
  font-family:'Sora',sans-serif;font-weight:700;font-size:.63rem;
}

/* ── Suggestions strip ── */
.sug-strip{
  display:flex;gap:6px;overflow-x:auto;padding:7px 12px 4px;
  flex-shrink:0;scrollbar-width:none;
}
.sug-strip::-webkit-scrollbar{display:none;}
.sug-chip{
  flex-shrink:0;background:var(--surface,#fff);
  border:1px solid var(--border,#e2e5f1);border-radius:100px;
  padding:6px 13px;font-size:.72rem;font-weight:500;
  color:var(--ink-2,#454c7a);cursor:pointer;white-space:nowrap;
  transition:all .15s;font-family:'Outfit',sans-serif;
}
.sug-chip:hover{background:var(--brand-pale,rgba(91,94,244,.1));border-color:var(--brand,#5b5ef4);color:var(--brand,#5b5ef4);}

/* ── Memory strip ── */
.mem-strip{
  display:flex;gap:5px;flex-wrap:wrap;
  padding:4px 14px 6px;flex-shrink:0;
}
.mem-chip{
  display:inline-flex;align-items:center;gap:3px;
  background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.18);
  color:#059669;border-radius:100px;padding:2px 8px;
  font-size:.64rem;font-weight:700;
}

/* ── Messages (ONLY thing that scrolls) ── */
.msgs{
  flex:1;overflow-y:auto;
  padding:12px 14px 6px;
  display:flex;flex-direction:column;gap:2px;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}
.msgs::-webkit-scrollbar{width:3px;}
.msgs::-webkit-scrollbar-thumb{background:var(--border,#e2e5f1);border-radius:3px;}
@media(min-width:768px){.msgs{padding:16px 28px 10px;}}

.msg-date{
  text-align:center;margin:6px 0 4px;font-size:.62rem;
  color:var(--ink-3,#9399c2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;
}
.msg-row{display:flex;align-items:flex-end;gap:6px;margin-bottom:1px;}
.msg-row.user{flex-direction:row-reverse;}
.msg-av{
  width:27px;height:27px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:2px;
}
.msg-av.hide{visibility:hidden;}
.msg-wrap{display:flex;flex-direction:column;max-width:83%;}
.msg-row.user .msg-wrap{align-items:flex-end;}
.msg-row.bot  .msg-wrap{align-items:flex-start;}
@media(min-width:768px){.msg-wrap{max-width:70%;}}
.msg-bubble{
  padding:10px 14px;border-radius:18px;
  font-size:.85rem;line-height:1.72;word-break:break-word;
  animation:bubIn .18s ease;
}
@keyframes bubIn{from{opacity:0;transform:translateY(5px) scale(.97)}to{opacity:1;transform:none}}
.msg-row.user .msg-bubble{
  background:var(--brand,#5b5ef4);color:#fff;
  border-bottom-right-radius:4px;
}
.msg-row.bot .msg-bubble{
  background:var(--surface,#fff);color:var(--ink,#0d1030);
  border:1px solid var(--border,#e2e5f1);
  border-bottom-left-radius:4px;
}
.msg-time{font-size:.59rem;color:var(--ink-3,#9399c2);margin-top:2px;padding:0 3px;}

/* typing dots */
.typing-bub{
  background:var(--surface,#fff);border:1px solid var(--border,#e2e5f1);
  border-radius:18px;border-bottom-left-radius:4px;
  padding:12px 16px;display:flex;align-items:center;gap:5px;
}
.tdot{
  width:7px;height:7px;border-radius:50%;
  background:var(--ink-3,#9399c2);
  animation:tdot 1.3s infinite ease-in-out;
}
.tdot:nth-child(2){animation-delay:.18s;}
.tdot:nth-child(3){animation-delay:.36s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* ── Input bar (fixed height, never shrinks) ── */
.input-bar{
  background:var(--surface,#fff);
  border-top:1px solid var(--border,#e2e5f1);
  /* THIS is the fix: safe-area + explicit bottom nav height on mobile */
  padding:10px 12px;
  padding-bottom:max(10px, env(safe-area-inset-bottom));
  display:flex;align-items:flex-end;gap:8px;
  flex-shrink:0;
  /* On mobile, also account for bottom-nav (62px) being fixed */
  margin-bottom:62px;
}
/* On desktop, sidebar nav means no bottom offset needed */
@media(min-width:768px){.input-bar{margin-bottom:0;padding:12px 24px 16px;}}

.input-wrap{
  flex:1;display:flex;align-items:center;gap:6px;
  background:var(--surface-2,#eef0fa);
  border:1.5px solid var(--border,#e2e5f1);
  border-radius:24px;padding:8px 14px;
  transition:border-color .18s,box-shadow .18s;
}
.input-wrap:focus-within{
  border-color:var(--brand,#5b5ef4);
  box-shadow:0 0 0 3px var(--brand-pale,rgba(91,94,244,.1));
}
#chatInput{
  flex:1;background:none;border:none;outline:none;
  font-family:'Outfit',sans-serif;font-size:.87rem;
  color:var(--ink,#0d1030);resize:none;
  max-height:120px;line-height:1.5;scrollbar-width:none;
}
#chatInput::placeholder{color:var(--ink-3,#9399c2);}
.voice-btn{
  background:none;border:none;cursor:pointer;
  color:var(--ink-3,#9399c2);padding:2px;
  display:flex;align-items:center;justify-content:center;
  transition:color .15s;flex-shrink:0;
}
.voice-btn .material-symbols-rounded{font-size:1.15rem;}
.voice-btn.listening{color:#f43f5e;animation:pulse .7s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.send-btn{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border:none;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .18s,box-shadow .18s;
  box-shadow:0 4px 14px rgba(99,102,241,.4);
}
.send-btn:hover{transform:scale(1.08);box-shadow:0 6px 20px rgba(99,102,241,.5);}
.send-btn:active{transform:scale(.9);}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.send-btn .material-symbols-rounded{font-size:1.1rem;}

/* gate card */
.gate-card{
  background:var(--surface,#fff);border:1px solid var(--border,#e2e5f1);
  border-radius:16px;padding:18px;text-align:center;
  max-width:290px;align-self:center;margin:6px 0;
}
.gate-card a{
  display:inline-block;background:var(--brand,#5b5ef4);color:#fff;
  padding:9px 22px;border-radius:100px;font-weight:700;font-size:.8rem;text-decoration:none;margin-top:10px;
}
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="ch">

    <span class="material-symbols-rounded">arrow_back</span>

  <div class="nova-av">
    <svg width="22" height="22" viewBox="0 0 52 52" fill="none">

<div class="msgs" id="msgs">

<script src="ai-engine.js"></script>
<script>
// ── Theme ──────────────────────────────────────────────────────
(function(){var t=localStorage.getItem('examora_theme')||'light';document.documentElement.setAttribute('data-theme',t);})();

// ── User context ───────────────────────────────────────────────
var _name  = localStorage.getItem('examora_user_display') || '';
var _level = localStorage.getItem('examora_user_level')   || 'secondary';
var _exam  = localStorage.getItem('examora_target_exam')  || '';

var LEVELS = {
  primary:    {label:'Primary School',   emoji:'🎒',color:'#f59e0b',
    chips:['What is photosynthesis?','Tell me a fun science fact','Help me with fractions','What causes rainfall?','What is photosynthesis?']},
  secondary:  {label:'Secondary School', emoji:'📚',color:'#6366f1',
    chips:['Explain JAMB Maths topic','WAEC Biology — Cell Division','Define osmosis step by step','Government: Types of federalism','Help me outline an essay']},
  university: {label:'University',       emoji:'🎓',color:'#10b981',
    chips:['Explain linear algebra','Help structure my research paper','What is monetary policy?','Explain thermodynamics 2nd law','Help with my assignment outline']},
  phd:        {label:'PhD Researcher',   emoji:'🔬',color:'#8b5cf6',
    chips:['Help me find research gaps','Draft a literature review outline','Explain Bayesian inference','Critique this argument','Recent developments in my field']}
};
function cfg(){return LEVELS[_level]||LEVELS.secondary;}

// ── Personalized welcome ───────────────────────────────────────
function buildWelcome(){
  var h=new Date().getHours();
  var g=h<12?'Good morning':h<17?'Good afternoon':'Good evening';
  var n=_name?' '+_name.split(' ')[0]:'';
  var ex=_exam?'\n\nI see you\'re preparing for **'+_exam+'** — I\'ll tailor everything around that. 🎯':'';
  var msgs={
    primary:g+n+'! 👋 I\'m **Nova** — your super-smart study friend!\n\nI love explaining things in a fun, simple way. Ask me about anything — science, maths, English, stories, animals, space… anything!\n\nWhat do you want to learn today? 🌟'+ex,
    secondary:g+n+'! I\'m **Nova**, your AI tutor for **JAMB, WAEC, NECO and Post-UTME**.\n\nI explain topics step by step, give practice questions, and help you understand — not just memorize. I also help with essays, definitions, and spotting exam patterns.\n\nWhat subject are we tackling? 🚀'+ex,
    university:g+n+'! I\'m **Nova**, your academic AI partner.\n\nI help with **assignments, research, complex concepts, literature reviews, GPA calculations** and deep topic explanations across any field — engineering, medicine, law, business, arts.\n\nWhat are we working on today? 🎓'+ex,
    phd:g+n+'! I\'m **Nova** — your AI research companion.\n\nI\'m here for **literature synthesis, thesis writing, statistical methodology, research gap identification** and critical academic discussion.\n\nI connect to CrossRef\'s 100M+ paper database. What\'s your current research focus? 🔬'+ex
  };
  return msgs[_level]||msgs.secondary;
}

// ── Render welcome & UI on load ────────────────────────────────
document.addEventListener('DOMContentLoaded',function(){
  var c=cfg();
  // Persona banner
  if(_name||_level!=='secondary'){
    var bar=document.getElementById('personaBar');bar.style.display='flex';
    var badge=document.getElementById('personaBadge');
    badge.textContent=c.emoji+' '+c.label;
    badge.style.background=c.color+'18';badge.style.color=c.color;
    document.getElementById('personaText').textContent=
      _exam?'Preparing for '+_exam+' · Nova adapts to your level':'Nova tailors explanations for '+c.label+' level';
  }
  // Suggestion chips
  var sr=document.getElementById('sugStrip');
  c.chips.forEach(function(s){
    var b=document.createElement('button');b.className='sug-chip';b.textContent=s;
    b.onclick=function(){document.getElementById('chatInput').value=s;doSend();};
    sr.appendChild(b);
  });
  // Memory chips
  renderMem();
  // Welcome message with typewriter
  var el=document.getElementById('welcomeBubble');
  document.getElementById('welcomeTime').textContent=now();
  var urlQ=(new URLSearchParams(window.location.search)).get('q');
  if(urlQ){el.innerHTML=fmtMsg(buildWelcome());setTimeout(function(){document.getElementById('chatInput').value=urlQ;doSend();},600);}
  else typewrite(el,buildWelcome(),16);
});

// ── Typewriter ─────────────────────────────────────────────────
function typewrite(el,text,speed){
  var html=fmtMsg(text);
  var plain=text.replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*/g,'').split('');
  var i=0;el.innerHTML='';
  (function tick(){
    if(i>=plain.length){el.innerHTML=html;return;}
    el.innerHTML=fmtMsg(plain.slice(0,i+1).join(''))+'<span style="opacity:0">|</span>';
    i++;setTimeout(tick,speed);
  })();
}

// ── Message formatter ──────────────────────────────────────────
function fmtMsg(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code style="background:rgba(99,102,241,.1);padding:1px 5px;border-radius:4px;font-size:.85em;font-family:monospace">$1</code>')
    .replace(/^### (.+)$/gm,'<strong style="display:block;margin-top:8px;color:var(--brand,#5b5ef4)">$1</strong>')
    .replace(/^- (.+)$/gm,'<div style="padding-left:8px;margin:1px 0">• $1</div>')
    .replace(/\n/g,'<br>');
}

// ── Time ───────────────────────────────────────────────────────
function now(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

// ── Auto-grow textarea ─────────────────────────────────────────
function autoGrow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}}

// ── Conversation history + memory ─────────────────────────────
var _hist=[];var _prevBot=false;
var MK='examora_nova_mem';
function getMem(){try{return JSON.parse(localStorage.getItem(MK)||'[]');}catch(e){return[];}}
function saveMem(m){localStorage.setItem(MK,JSON.stringify(m.slice(-10)));}
function addFact(f){var m=getMem();if(!m.includes(f)){m.push(f);saveMem(m);}renderMem();}
function renderMem(){
  var m=getMem().slice(-4);var el=document.getElementById('memStrip');
  if(!m.length){el.innerHTML='';return;}
  el.innerHTML='<span style="font-size:.63rem;color:var(--ink-3,#9399c2);font-weight:700;margin-right:2px;align-self:center;">Nova remembers:</span>'+
    m.map(function(f){return '<span class="mem-chip">✓ '+f.substring(0,26)+(f.length>26?'…':'')+'</span>';}).join('');
}

// ── Add bubble ─────────────────────────────────────────────────
function addBub(role,text,isTyping){
  var msgs=document.getElementById('msgs');
  var row=document.createElement('div');row.className='msg-row '+role;
  var isBot=(role==='bot');
  if(isBot){
    var av=document.createElement('div');
    av.className='msg-av'+((!_prevBot&&isBot)?'':' hide');
    av.innerHTML='<svg width="15" height="15" viewBox="0 0 52 52" fill="none"><circle cx="13" cy="11" r="3.5" fill="white"/><circle cx="13" cy="41" r="3.5" fill="white"/><circle cx="39" cy="11" r="3.5" fill="white"/><circle cx="39" cy="41" r="3.5" fill="white"/><line x1="13" y1="11" x2="13" y2="41" stroke="white" stroke-width="2.5" stroke-linecap="round"/><line x1="13" y1="11" x2="39" y2="41" stroke="white" stroke-width="2.5" stroke-linecap="round"/><line x1="39" y1="11" x2="39" y2="41" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>';
    row.appendChild(av);
  }
  var wrap=document.createElement('div');wrap.className='msg-wrap';
  var bub=document.createElement('div');
  var time=document.createElement('div');time.className='msg-time';
  if(isTyping){
    bub.className='typing-bub';
    bub.innerHTML='<div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>';
  } else {
    bub.className='msg-bubble';
    bub.innerHTML=fmtMsg(text);
    time.textContent=now();
  }
  wrap.appendChild(bub);if(!isTyping)wrap.appendChild(time);
  row.appendChild(wrap);
  msgs.appendChild(row);
  msgs.scrollTop=msgs.scrollHeight;
  _prevBot=isBot;
  return {bub,time};
}

// ── AI gate ────────────────────────────────────────────────────
function aiOk(){
  var p=localStorage.getItem('examora_plan')||'free';
  if(p==='premium'||p==='trial')return true;
  if(!sessionStorage.getItem('examora_s_ai')){sessionStorage.setItem('examora_s_ai','1');return true;}
  return false;
}

// ── Extract memory facts ───────────────────────────────────────
function extractFacts(msg){
  var l=msg.toLowerCase();
  if(/(jamb|waec|neco|post.utme|ielts|gre|gmat|sat)/i.test(l)){
    var m=l.match(/(jamb|waec|neco|post.utme|ielts|gre|gmat|sat)/i);
    if(m)addFact(m[1].toUpperCase()+' prep');
  }
  if(/i.m (studying|doing|taking) ([a-z ]+)/i.test(l)){
    var m=l.match(/i.m (studying|doing|taking) ([a-z ]+)/i);
    if(m)addFact(m[2].trim().substring(0,25));
  }
  if(/my (subject|course|major) is ([a-z ]+)/i.test(l)){
    var m=l.match(/my (subject|course|major) is ([a-z ]+)/i);
    if(m)addFact(m[2].trim().substring(0,25));
  }
}

// ── Send ───────────────────────────────────────────────────────
async function doSend(){
  var input=document.getElementById('chatInput');
  var msg=input.value.trim();
  if(!msg)return;
  // Hide suggestions after first message
  document.getElementById('sugStrip').style.opacity='0.4';
  document.getElementById('memStrip').innerHTML='';
  input.value='';input.style.height='auto';
  document.getElementById('sendBtn').disabled=true;
  _prevBot=false;
  addBub('user',msg);
  extractFacts(msg);
  if(!aiOk()){
    var gc=document.createElement('div');gc.className='gate-card';
    gc.innerHTML='<div style="font-size:1.8rem;margin-bottom:8px;">🔒</div><h4 style="font-family:Sora,sans-serif;font-weight:800;font-size:.9rem;margin-bottom:6px;">Unlock Unlimited Nova</h4><p style="font-size:.75rem;color:var(--ink-3,#9399c2);line-height:1.55;margin-bottom:10px;">You\'ve used your free session. Upgrade for unlimited conversations.</p><a href="upgrade.html">🚀 Start Free Trial</a>';
    document.getElementById('msgs').appendChild(gc);
    document.getElementById('msgs').scrollTop=99999;
    document.getElementById('sendBtn').disabled=false;return;
  }
  var c=cfg();
  var sysExtra='This student is at '+c.label+' level'
    +(_name?' and their name is '+_name:'')
    +(_exam?', preparing for '+_exam:'')+'.'
    +(_level==='primary'?' Use very simple words, short sentences, fun examples. Be warm and encouraging. Avoid jargon completely.':'')
    +(_level==='university'?' Use proper academic language, be precise, suggest further reading when relevant.':'')
    +(_level==='phd'?' Be highly technical, discuss methodology and research implications, reference academic conventions.':'');
  _hist.push({role:'user',content:msg});
  var typing=addBub('bot','',true);
  try{
    var res=await EXAMORA_AI.chat(msg,sysExtra,_hist.slice(-14));
    _hist.push({role:'assistant',content:res.text});
    typing.bub.className='msg-bubble';
    typing.bub.innerHTML=fmtMsg(res.text);
    typing.time.textContent=now();
  }catch(e){
    typing.bub.className='msg-bubble';
    typing.bub.textContent=(e.message||'').includes('AI_KEY_MISSING')
      ?'🔑 AI key not set. Admin needs to add OpenRouter key in Firestore settings.'
      :'⚠️ Nova couldn\'t respond right now. Please try again.';
    typing.time.textContent=now();
  }
  document.getElementById('sendBtn').disabled=false;
  document.getElementById('msgs').scrollTop=99999;
}

// ── Voice input ────────────────────────────────────────────────
var _rec=null,_listening=false;
function toggleVoice(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Voice input works in Chrome on Android/desktop. Try that browser!');return;}
  if(_listening){_rec.stop();return;}
  _rec=new SR();_rec.continuous=false;_rec.interimResults=true;_rec.lang='en-NG';
  _rec.onstart=function(){_listening=true;document.getElementById('voiceBtn').classList.add('listening');document.getElementById('chatInput').placeholder='🎙️ Listening…';};
  _rec.onresult=function(e){
    var t=Array.from(e.results).map(function(r){return r[0].transcript;}).join('');
    document.getElementById('chatInput').value=t;
    autoGrow(document.getElementById('chatInput'));
  };
  _rec.onend=function(){
    _listening=false;
    document.getElementById('voiceBtn').classList.remove('listening');
    document.getElementById('chatInput').placeholder='Ask Nova anything…';
    if(document.getElementById('chatInput').value.trim())doSend();
  };
  _rec.onerror=function(){_listening=false;document.getElementById('voiceBtn').classList.remove('listening');document.getElementById('chatInput').placeholder='Ask Nova anything…';};
  _rec.start();
}

// ── Clear chat ─────────────────────────────────────────────────
function clearChat(){
  if(!confirm('Start a fresh conversation?'))return;
  _hist=[];_prevBot=false;
  var msgs=document.getElementById('msgs');
  msgs.innerHTML='<div class="msg-date">Today</div>';
  document.getElementById('sugStrip').style.opacity='1';
  renderMem();
  var ref=addBub('bot','');
  typewrite(ref.bub,buildWelcome(),16);
  ref.time.textContent=now();
}
</script>
